<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellFix Admin — Login</title>
<link rel="icon" href="../frontend/assets/images/WELLFIX-FAVICON.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green-900:#012a1c;--green-800:#023d29;--green-700:#034732;--green-600:#045a3f;
  --gold-400:#e8b429;--gold-300:#f0c842;
  --gray-900:#111;--gray-600:#404040;--gray-400:#767676;--gray-100:#ebebeb;--gray-50:#f5f5f5;
  --white:#fff;--red-500:#e74c3c;--red-100:#fdecea;
  --font-display:'Plus Jakarta Sans',sans-serif;--font-body:'Outfit',sans-serif;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
  --shadow-lg:0 20px 60px rgba(0,0,0,.15);
  --t:200ms cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;}
body{font-family:var(--font-body);background:var(--green-900);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}

/* Background pattern */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(3,71,50,.6) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(232,180,41,.08) 0%,transparent 50%);pointer-events:none;}

.login-card{
  width:100%;max-width:420px;
  background:var(--white);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  position:relative;z-index:1;
}
.login-top{
  background:var(--green-700);
  padding:32px 32px 28px;
  text-align:center;
}
.login-logo{
  width:64px;height:64px;
  background:rgba(255,255,255,.1);
  border-radius:16px;
  border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
}
.login-logo img{width:44px;height:44px;object-fit:contain;filter:brightness(0) invert(1);}
.login-logo-fallback{display:none;font-family:var(--font-display);font-size:22px;font-weight:800;color:#fff;}
.login-title{font-family:var(--font-display);font-size:20px;font-weight:800;color:#fff;margin-bottom:4px;}
.login-sub{font-size:13px;color:rgba(255,255,255,.55);}

.login-body{padding:28px 32px 32px;}

.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:6px;letter-spacing:.01em;}
.form-input{
  width:100%;height:44px;
  border:1.5px solid var(--gray-100);
  border-radius:var(--r-md);
  padding:0 14px;
  font-family:var(--font-body);font-size:14px;
  color:var(--gray-900);background:var(--gray-50);
  transition:all var(--t);outline:none;
}
.form-input:focus{border-color:var(--green-600);background:#fff;box-shadow:0 0 0 3px rgba(3,71,50,.08);}
.form-input::placeholder{color:#bbb;}
.form-input.error{border-color:var(--red-500);background:var(--red-100);}

.password-wrap{position:relative;}
.toggle-pw{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--gray-400);
  padding:4px;
}
.toggle-pw svg{width:16px;height:16px;}

.form-error{font-size:12px;color:var(--red-500);margin-top:5px;display:none;}
.form-error.show{display:block;}

.alert{
  padding:12px 14px;border-radius:var(--r-sm);
  font-size:13px;margin-bottom:16px;display:none;
}
.alert.error{background:var(--red-100);color:var(--red-500);border:1px solid #f5c6c2;display:block;}
.alert.success{background:#f0faf5;color:var(--green-700);border:1px solid var(--green-100);display:block;}

.btn-login{
  width:100%;height:46px;
  background:var(--green-700);color:#fff;
  border:none;border-radius:var(--r-md);
  font-family:var(--font-display);font-size:15px;font-weight:700;
  cursor:pointer;transition:all var(--t);
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:16px;
}
.btn-login:hover{background:var(--green-600);}
.btn-login:active{transform:scale(.98);}
.btn-login:disabled{background:var(--gray-100);color:var(--gray-400);cursor:not-allowed;transform:none;}
.btn-login svg{width:16px;height:16px;}

.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

.forgot-link{display:block;text-align:center;font-size:13px;color:var(--green-700);font-weight:500;text-decoration:none;transition:color var(--t);}
.forgot-link:hover{color:var(--green-600);text-decoration:underline;}

.login-footer{padding:16px 32px;border-top:1px solid var(--gray-100);text-align:center;font-size:11px;color:var(--gray-400);}

/* Forgot password panel */
.panel{display:none;}
.panel.active{display:block;}
#loginPanel{display:block;}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-top">
    <div class="login-logo">
      <img src="../frontend/assets/images/WELLFIX-MAIN-LOGO.png" alt="WellFix"
        onerror="this.style.display='none';document.querySelector('.login-logo-fallback').style.display='block'">
      <span class="login-logo-fallback">W</span>
    </div>
    <div class="login-title">WellFix Admin</div>
    <div class="login-sub">Sign in to your dashboard</div>
  </div>

  <div class="login-body">

    <!-- Login Panel -->
    <div id="loginPanel" class="panel active">
      <div class="alert" id="loginAlert"></div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="emailInput" placeholder="admin@wellfixappliances.com" autocomplete="email">
        <div class="form-error" id="emailError">Please enter a valid email</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password">
          <button class="toggle-pw" id="togglePw" type="button" tabindex="-1">
            <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="form-error" id="passwordError">Password is required</div>
      </div>
      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
      <a href="#" class="forgot-link" onclick="showForgot(event)">Forgot your password?</a>
    </div>

    <!-- Forgot Password Panel -->
    <div id="forgotPanel" class="panel">
      <div class="alert" id="forgotAlert"></div>
      <p style="font-size:13px;color:var(--gray-600);margin-bottom:16px;line-height:1.6;">Enter your email address and we'll send you a link to reset your password.</p>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="forgotEmail" placeholder="admin@wellfixappliances.com">
      </div>
      <button class="btn-login" id="forgotBtn" onclick="handleForgot()">
        Send Reset Link
      </button>
      <a href="#" class="forgot-link" onclick="showLogin(event)" style="margin-top:4px;">← Back to sign in</a>
    </div>

  </div>
  <div class="login-footer">© 2025 WellFix Appliances. All rights reserved.</div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../backend/config/supabase.js"></script>
<script>
// Check if already logged in
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
})();

function showForgot(e) {
  e.preventDefault();
  document.getElementById('loginPanel').classList.remove('active');
  document.getElementById('forgotPanel').classList.add('active');
  clearAlerts();
}
function showLogin(e) {
  e.preventDefault();
  document.getElementById('forgotPanel').classList.remove('active');
  document.getElementById('loginPanel').classList.add('active');
  clearAlerts();
}
function clearAlerts() {
  document.querySelectorAll('.alert').forEach(a => { a.className = 'alert'; a.textContent = ''; });
  document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.form-input').forEach(i => i.classList.remove('error'));
}

// Toggle password visibility
document.getElementById('togglePw').addEventListener('click', () => {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

// Enter key
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('emailInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('passwordInput').focus();
});

async function handleLogin() {
  clearAlerts();
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  let valid = true;
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('emailInput').classList.add('error');
    document.getElementById('emailError').classList.add('show');
    valid = false;
  }
  if (!password) {
    document.getElementById('passwordInput').classList.add('error');
    document.getElementById('passwordError').classList.add('show');
    valid = false;
  }
  if (!valid) return;

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in…';

  try {
    await WF.auth.login(email, password);
    btn.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Success!';
    btn.style.background = '#056b4b';
    setTimeout(() => window.location.href = 'dashboard.html', 600);
  } catch (err) {
    const alert = document.getElementById('loginAlert');
    alert.textContent = err.message === 'Invalid login credentials'
      ? 'Incorrect email or password. Please try again.'
      : err.message;
    alert.className = 'alert error';
    btn.disabled = false;
    btn.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
  }
}

async function handleForgot() {
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) return;
  const btn = document.getElementById('forgotBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending…';
  try {
    await WF.auth.resetPassword(email);
    const alert = document.getElementById('forgotAlert');
    alert.textContent = 'Reset link sent! Check your email inbox.';
    alert.className = 'alert success';
    btn.innerHTML = 'Email Sent ✓';
    btn.style.background = '#056b4b';
  } catch (err) {
    const alert = document.getElementById('forgotAlert');
    alert.textContent = err.message;
    alert.className = 'alert error';
    btn.disabled = false;
    btn.innerHTML = 'Send Reset Link';
  }
}
</script>
</body>
</html>
