<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellFix Admin — Login</title>
<link rel="icon" href="/wellfix-website/assets/images/WELLFIX-FAVICON.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-900:#012a1c;--green-800:#023728;--green-700:#034732;--green-600:#045a3f;--green-500:#0a6b4b;
  --gold:#F0C419;
  --font:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
}
html,body{height:100%}
body{font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;background:var(--green-900);position:relative;overflow:hidden}

/* dreamy brand-coloured blurred backdrop */
body::before{content:'';position:fixed;inset:-25%;z-index:0;filter:blur(85px);
  background:
    radial-gradient(closest-side at 22% 26%,#0c7d57 0,transparent 70%),
    radial-gradient(closest-side at 82% 14%,rgba(240,196,25,.55) 0,transparent 70%),
    radial-gradient(closest-side at 12% 86%,#02402d 0,transparent 70%),
    radial-gradient(closest-side at 88% 84%,#067a55 0,transparent 70%),
    var(--green-900);}
body::after{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(120% 120% at 50% 50%,transparent 40%,rgba(1,42,28,.55) 100%)}

/* glass card */
.card{position:relative;z-index:1;width:386px;max-width:92vw;padding:46px 40px 40px;border-radius:28px;
  background:rgba(255,255,255,.1);backdrop-filter:blur(24px) saturate(130%);-webkit-backdrop-filter:blur(24px) saturate(130%);
  border:1px solid rgba(255,255,255,.2);box-shadow:0 34px 80px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18);
  color:#fff;animation:pop .55s cubic-bezier(.2,.8,.2,1)}
@keyframes pop{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}

.avatar{width:108px;height:108px;border-radius:50%;margin:0 auto 30px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.28);box-shadow:0 12px 34px rgba(0,0,0,.3),inset 0 0 22px rgba(240,196,25,.12)}
.avatar img{width:64px;height:64px;object-fit:contain}

.alert{display:none;align-items:center;gap:8px;font-size:12.5px;font-weight:600;padding:10px 13px;border-radius:11px;margin-bottom:18px;line-height:1.45}
.alert.show{display:flex}
.alert.error{background:rgba(226,61,46,.2);border:1px solid rgba(226,61,46,.45);color:#ffdad4}
.alert.success{background:rgba(10,107,75,.28);border:1px solid rgba(240,196,25,.45);color:#eafff5}
.alert svg{width:15px;height:15px;flex-shrink:0}

.fld{position:relative;margin-bottom:26px}
.fi{position:absolute;left:2px;top:50%;transform:translateY(-50%);color:#fff;opacity:.85;pointer-events:none}
.fi svg{width:18px;height:18px;display:block}
.fld input{width:100%;background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,.42);
  padding:9px 34px 9px 32px;color:#fff;font-family:var(--font);font-size:15px;font-weight:500;outline:none;transition:border-color .2s}
.fld input::placeholder{color:rgba(255,255,255,.72);font-weight:500}
.fld input:focus{border-bottom-color:var(--gold)}
.fld input:-webkit-autofill{-webkit-text-fill-color:#fff;transition:background-color 9999s ease}
.eye{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#fff;opacity:.7;padding:5px;transition:.2s}
.eye:hover{opacity:1;color:var(--gold)}
.eye svg{width:17px;height:17px;display:block}

.row{display:flex;align-items:center;justify-content:space-between;margin:2px 0 26px;font-size:12.5px}
.remember{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.88);cursor:pointer;user-select:none}
.remember input{width:15px;height:15px;accent-color:var(--gold);cursor:pointer}
.forgot{color:rgba(255,255,255,.82);font-style:italic;text-decoration:none;font-weight:600}
.forgot:hover{color:var(--gold)}

.btn{width:100%;height:50px;border:none;border-radius:13px;cursor:pointer;
  background:linear-gradient(135deg,var(--green-800),var(--green-500));color:#fff;
  font-family:var(--font);font-weight:800;font-size:13.5px;letter-spacing:1.8px;
  display:flex;align-items:center;justify-content:center;gap:9px;transition:.22s;
  box-shadow:0 14px 32px rgba(0,0,0,.32),inset 0 1px 0 rgba(240,196,25,.35)}
.btn:hover{transform:translateY(-2px);box-shadow:0 18px 42px rgba(10,107,75,.5),inset 0 1px 0 rgba(240,196,25,.5)}
.btn:active{transform:translateY(0)}
.btn:disabled{background:rgba(255,255,255,.18);color:rgba(255,255,255,.55);cursor:not-allowed;box-shadow:none;transform:none}
.btn svg{width:16px;height:16px}
.spinner{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.panel{display:none}
.panel.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ftitle{font-size:19px;font-weight:800;text-align:center;margin-bottom:6px}
.fdesc{font-size:12.5px;text-align:center;color:rgba(255,255,255,.7);margin-bottom:24px;line-height:1.5}
.back{display:block;text-align:center;margin-top:18px;font-size:12.5px;color:rgba(255,255,255,.8);text-decoration:none;font-weight:600}
.back:hover{color:var(--gold)}

@media(max-width:420px){.card{padding:38px 26px 32px}.avatar{width:92px;height:92px;margin-bottom:24px}.avatar img{width:54px;height:54px}}
</style>
</head>
<body>

<div class="card">

  <div id="loginPanel" class="panel active">
    <div class="avatar">
      <img src="/wellfix-website/assets/images/wellfix-icon-white.png" alt="WellFix"
        onerror="this.onerror=null;this.src=&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,6 88,28 88,72 50,94 12,72 12,28' fill='none' stroke='%23F0C419' stroke-width='8'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23F0C419'/%3E%3C/svg%3E&quot;">
    </div>

    <div class="alert error" id="loginAlert">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="loginAlertMsg"></span>
    </div>

    <div class="fld">
      <span class="fi"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
      <input type="email" id="emailInput" placeholder="Email ID" autocomplete="email">
    </div>

    <div class="fld">
      <span class="fi"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <button class="eye" id="togglePw" type="button" tabindex="-1">
        <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="row">
      <label class="remember"><input type="checkbox" id="rememberMe" checked> Remember me</label>
      <a href="#" class="forgot" onclick="showForgot(event)">Forgot Password?</a>
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">LOGIN</button>
  </div>

  <div id="forgotPanel" class="panel">
    <div class="ftitle">Reset Password</div>
    <div class="fdesc">Enter your email and we'll send a reset link.</div>
    <div class="alert" id="forgotAlert"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="forgotAlertMsg"></span></div>
    <div class="fld">
      <span class="fi"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
      <input type="email" id="forgotEmail" placeholder="Email ID">
    </div>
    <button class="btn" id="forgotBtn" onclick="handleForgot()">SEND RESET LINK</button>
    <a href="#" class="back" onclick="showLogin(event)">Back to Login</a>
  </div>

</div>

<!-- Load Supabase FIRST, then config, then page script -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/wellfix-website/backend/config/supabase.js"></script>
<script>
const BASE = '/wellfix-website';

// Check if already logged in
(async () => {
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session) window.location.href = BASE + '/admin/dashboard.html';
  } catch(e) { console.log('Session check:', e.message); }
})();

// Toggle password
document.getElementById('togglePw').addEventListener('click', () => {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

// Enter key
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('emailInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('passwordInput').focus(); });

function showForgot(e) { e.preventDefault(); document.getElementById('loginPanel').classList.remove('active'); document.getElementById('forgotPanel').classList.add('active'); }
function showLogin(e) { e.preventDefault(); document.getElementById('forgotPanel').classList.remove('active'); document.getElementById('loginPanel').classList.add('active'); }

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  const msgEl = document.getElementById(id + 'Msg');
  if (msgEl) msgEl.textContent = msg;
  el.className = 'alert ' + type + ' show';
}
function hideAlert(id) { document.getElementById(id).className = 'alert error'; }

async function handleLogin() {
  hideAlert('loginAlert');
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  if (!email || !password) { showAlert('loginAlert', 'Please enter email and password', 'error'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in…';

  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) throw error;
    btn.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Success!';
    setTimeout(() => { window.location.href = BASE + '/admin/dashboard.html'; }, 600);
  } catch (err) {
    showAlert('loginAlert', err.message === 'Invalid login credentials' ? 'Wrong email or password. Please try again.' : err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'LOGIN';
  }
}

async function handleForgot() {
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) return;
  const btn = document.getElementById('forgotBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending…';
  try {
    const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo: 'https://wellfixappliances.github.io/wellfix-website/admin/login.html' });
    if (error) throw error;
    showAlert('forgotAlert', 'Reset link sent! Check your inbox.', 'success');
    btn.innerHTML = 'Email Sent';
  } catch (err) {
    showAlert('forgotAlert', err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'SEND RESET LINK';
  }
}
</script>
</body>
</html>
