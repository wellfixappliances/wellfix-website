<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Settings — WellFix Admin</title>
<link rel="icon" href="../assets/images/WELLFIX-FAVICON.png">
<link rel="stylesheet" href="assets/css/admin.css"></head>
<body>
<div class="admin-shell"><div id="adminShell"></div>
<div class="main-wrap" id="mainWrap"><div class="page-content">
  <div class="pg-hd"><div><h1>Settings</h1><p>Store configuration</p></div>
    <div class="pg-hd__actions"><button class="btn btn-primary" onclick="saveSettings()">Save All Settings</button></div>
  </div>
<style>
  /* Standardizing navigation button layout and state styling */
  .settings-nav-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #4B5563; /* Medium gray */
    transition: all 0.2s ease;
  }

  .settings-nav-btn:hover {
    background-color: #F3F4F6;
    color: #1F2937;
  }

  .settings-nav-btn.is-active {
    background-color: #EEF2FF; /* Soft blue active background */
    color: #4F46E5; /* Active primary color */
  }

  /* Ensures SVG icons inherit the text color dynamically */
  .settings-nav-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
</style>

<div style="display:grid; grid-template-columns: 220px 1fr; gap: 20px;">
  <div class="card" style="padding: 8px; height: fit-content; border: 1px solid #E5E7EB; border-radius: 8px;">
    <div style="display: flex; flex-direction: column; gap: 4px;" id="settingsNav">
      
      <!-- Store Info -->
      <div class="settings-nav-btn is-active" onclick="showSection('store', this)">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Store Info
      </div>
      
      <!-- Contact -->
      <div class="settings-nav-btn" onclick="showSection('contact', this)">
        <svg viewBox="0 0 24 24">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        Contact
      </div>
      
      <!-- Shipping -->
      <div class="settings-nav-btn" onclick="showSection('shipping', this)">
        <svg viewBox="0 0 24 24">
          <rect x="1" y="3" width="15" height="13"></rect>
          <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
          <circle cx="5.5" cy="18.5" r="2.5"></circle>
          <circle cx="18.5" cy="18.5" r="2.5"></circle>
        </svg>
        Shipping
      </div>
      
      <!-- Payment -->
      <div class="settings-nav-btn" onclick="showSection('payment', this)">
        <svg viewBox="0 0 24 24">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
        Payment
      </div>
      
      <!-- Social Media -->
      <div class="settings-nav-btn" onclick="showSection('social', this)">
        <svg viewBox="0 0 24 24">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        Social Media
      </div>

    </div>
  </div>
  <div>
    <!-- Section content goes here -->
  </div>
</div>
      <div id="section-store" class="settings-section card">
        <div class="card-hd"><span class="card-title">Store Information</span></div>
        <div class="card-body"><div class="form-grid form-2" style="gap:14px;">
          <div class="form-group"><label class="form-label">Store Name</label><input class="form-input" id="s_store_name" value="WellFix Appliances"></div>
          <div class="form-group"><label class="form-label">Tagline</label><input class="form-input" id="s_tagline" value="Kerala's Trusted Appliance Store"></div>
          <div class="form-group" style="grid-column:1/-1;"><label class="form-label">Address</label><textarea class="form-textarea" id="s_store_address" style="min-height:60px;">Kerala, India</textarea></div>
          <div class="form-group"><label class="form-label">Business Hours</label><input class="form-input" id="s_store_hours" value="Mon–Sat: 9:00 AM – 7:00 PM"></div>
          <div class="form-group"><label class="form-label">Currency Symbol</label><input class="form-input" id="s_currency_symbol" value="₹"></div>
        </div></div>
      </div>
      <div id="section-contact" class="settings-section card" style="display:none;">
        <div class="card-hd"><span class="card-title">Contact Details</span></div>
        <div class="card-body"><div class="form-grid form-2" style="gap:14px;">
          <div class="form-group"><label class="form-label">Phone Number</label><input class="form-input" id="s_store_phone" value="+91 85900 04349"></div>
          <div class="form-group"><label class="form-label">WhatsApp Number</label><input class="form-input" id="s_store_whatsapp" value="+91 85900 04349"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="s_store_email" value="info@wellfixappliances.com"></div>
          <div class="form-group"><label class="form-label">Support Email</label><input class="form-input" id="s_support_email" value="support@wellfixappliances.com"></div>
        </div></div>
      </div>
      <div id="section-shipping" class="settings-section card" style="display:none;">
        <div class="card-hd"><span class="card-title">Shipping Settings</span></div>
        <div class="card-body"><div class="form-grid form-2" style="gap:14px;">
          <div class="form-group"><label class="form-label">Free Shipping Above (₹)</label><input class="form-input" type="number" id="s_free_shipping_above" value="999"></div>
          <div class="form-group"><label class="form-label">Default Shipping Fee (₹)</label><input class="form-input" type="number" id="s_shipping_fee" value="60"></div>
          <div class="form-group" style="grid-column:1/-1;"><label class="form-label">Delivery Areas</label><textarea class="form-textarea" id="s_delivery_areas" style="min-height:60px;">Thrissur, Ernakulam, Calicut, Trivandrum, Palakkad</textarea></div>
        </div></div>
      </div>
      <div id="section-payment" class="settings-section card" style="display:none;">
        <div class="card-hd"><span class="card-title">Payment Methods</span></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">
          <label style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--gray-25);border:1.5px solid var(--gray-100);border-radius:var(--r-md);">
            <div><div style="font-weight:600;">Cash on Delivery (COD)</div><div style="font-size:12px;color:var(--gray-400);">Customer pays at delivery</div></div>
            <label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label>
          </label>
          <label style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--gray-25);border:1.5px solid var(--gray-100);border-radius:var(--r-md);">
            <div><div style="font-weight:600;">UPI / Online Payment</div><div style="font-size:12px;color:var(--gray-400);">Via payment gateway</div></div>
            <label class="toggle"><input type="checkbox"><span class="toggle-track"></span></label>
          </label>
        </div>
      </div>
      <div id="section-social" class="settings-section card" style="display:none;">
        <div class="card-hd"><span class="card-title">Social Media Links</span></div>
        <div class="card-body"><div class="form-grid" style="gap:12px;">
          <div class="form-group"><label class="form-label">Facebook</label><input class="form-input" placeholder="https://facebook.com/wellfixappliances"></div>
          <div class="form-group"><label class="form-label">Instagram</label><input class="form-input" placeholder="https://instagram.com/wellfixappliances"></div>
          <div class="form-group"><label class="form-label">YouTube</label><input class="form-input" placeholder="https://youtube.com/wellfixappliances"></div>
        </div></div>
      </div>
    </div>
  </div>
</div></div></div>
<style>
.settings-nav-btn{padding:9px 12px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--gray-600);cursor:pointer;transition:all var(--t);}
.settings-nav-btn:hover{background:var(--gray-50);color:var(--gray-900);}
.settings-nav-btn.is-active{background:var(--green-50);color:var(--green-700);font-weight:600;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../backend/config/supabase.js"></script>
<script src="assets/js/shell.js"></script>
<script>
(async()=>{
  await AdminShell.init('Settings');
  const settings=await WF.settings.getAll();
  Object.keys(settings).forEach(key=>{
    const el=document.getElementById('s_'+key);
    if(el)el.value=settings[key];
  });
})();
function showSection(id,btn){
  document.querySelectorAll('.settings-section').forEach(s=>s.style.display='none');
  document.querySelectorAll('.settings-nav-btn').forEach(b=>b.classList.remove('is-active'));
  document.getElementById('section-'+id).style.display='block';
  btn.classList.add('is-active');
}
async function saveSettings(){
  const fields=['store_name','tagline','store_address','store_hours','currency_symbol','store_phone','store_whatsapp','store_email','free_shipping_above','shipping_fee'];
  try{
    for(const key of fields){
      const el=document.getElementById('s_'+key);
      if(el)await WF.settings.set(key,el.value);
    }
    toast('Settings saved! Store updated.');
  }catch(e){toast('Error: '+e.message,true);}
}
</script>
</body></html>
