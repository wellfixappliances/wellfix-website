<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banners — WellFix Admin</title>
<link rel="icon" href="../frontend/assets/images/WELLFIX-FAVICON.png">
<link rel="stylesheet" href="assets/css/admin.css">
<style>
.pos-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
.ptab{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--gray-150,#e0e0e0);background:#fff;color:var(--gray-500);transition:all .15s;white-space:nowrap;}
.ptab.on{border-color:var(--green-700);background:var(--green-700);color:#fff;}
.ptab-cnt{font-size:10px;margin-left:3px;opacity:.75;}
.b-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:700px){.b-kpi{grid-template-columns:repeat(2,1fr);}}
.bk{background:#fff;border:1px solid var(--gray-100);border-radius:10px;padding:12px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04);position:relative;overflow:hidden;}
.bk::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:10px 0 0 10px;}
.bk.gn::before{background:#22c55e;}.bk.bl::before{background:#3b82f6;}.bk.am::before{background:#f59e0b;}.bk.rd::before{background:#ef4444;}
.bk-val{font-size:22px;font-weight:800;color:var(--gray-900);font-family:var(--font-display);line-height:1;}
.bk-lbl{font-size:11px;color:var(--gray-400);margin-top:3px;}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.bcrd{background:#fff;border:1px solid var(--gray-100);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .2s;}
.bcrd:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.bcrd-img{position:relative;overflow:hidden;background:var(--gray-50);}
.bcrd-img img{width:100%;display:block;object-fit:cover;transition:transform .4s;}
.bcrd:hover .bcrd-img img{transform:scale(1.04);}
.bcrd-noimg{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--gray-300);height:120px;}
.bcrd-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%);pointer-events:none;}
.bcrd-badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:rgba(0,0,0,.5);color:#fff;padding:2px 7px;border-radius:3px;backdrop-filter:blur(4px);}
.bcrd-title{position:absolute;bottom:10px;left:12px;right:12px;font-size:13px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.bcrd-foot{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.bcrd-name{font-weight:700;font-size:13px;color:var(--gray-900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.bcrd-meta{font-size:10px;color:var(--gray-400);margin-top:2px;}
.bcrd-acts{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.bact{width:26px;height:26px;border-radius:5px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.bact:hover{background:var(--gray-50);}
.bact svg{width:12px;height:12px;stroke:var(--gray-500);fill:none;stroke-width:2;}
.bact.del:hover{background:#fef2f2;border-color:#fecaca;}
.bact.del:hover svg{stroke:#dc2626;}
.bcrd-add{border:2px dashed var(--gray-200);background:var(--gray-25);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;min-height:160px;border-radius:10px;transition:all .2s;}
.bcrd-add:hover{border-color:var(--green-400);background:var(--green-50);}
.tog{display:flex;align-items:center;cursor:pointer;}
.tog input{display:none;}
.tog-tr{width:28px;height:16px;background:var(--gray-200);border-radius:99px;position:relative;transition:background .2s;flex-shrink:0;}
.tog input:checked+.tog-tr{background:var(--green-500);}
.tog-tr::after{content:'';width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog input:checked+.tog-tr::after{transform:translateX(12px);}
.b-split{display:grid;grid-template-columns:1fr 300px;min-height:400px;}
@media(max-width:800px){.b-split{grid-template-columns:1fr;}}
.b-split-l{padding:16px;border-right:1px solid var(--gray-100);}
.b-split-r{padding:16px;background:var(--gray-25);}
@media(max-width:800px){.b-split-l{border-right:none;border-bottom:1px solid var(--gray-100);}.b-split-r{background:#fff;}}
.sec-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400);margin-bottom:8px;margin-top:16px;padding-bottom:5px;border-bottom:1px solid var(--gray-50);}
.sec-hd:first-child{margin-top:0;}
.up-zone{border:2px dashed var(--gray-200);border-radius:8px;background:#fff;cursor:pointer;transition:all .2s;text-align:center;padding:16px;position:relative;}
.up-zone:hover,.up-zone.over{border-color:var(--green-400);background:var(--green-50);}
.up-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.up-preview{width:100%;border-radius:6px;max-height:110px;object-fit:cover;margin-bottom:6px;display:none;}
.up-preview.show{display:block;}
.lp-wrap{border:1px solid var(--gray-100);border-radius:8px;overflow:hidden;background:var(--gray-50);}
.lp-img{width:100%;display:block;object-fit:cover;}
.lp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);text-align:center;padding:4px;background:#fff;border-top:1px solid var(--gray-100);}
.sk{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:6px;}
@keyframes sk{to{background-position:-200% 0;}}
.empty-b{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;text-align:center;grid-column:1/-1;color:var(--gray-400);}
.empty-b svg{width:36px;height:36px;opacity:.2;margin-bottom:10px;}
</style>
</head>
<body>
<div class="admin-shell"><div id="adminShell"></div>
<div class="main-wrap" id="mainWrap">
<div class="page-content">

<div class="pg-hd">
  <div>
    <h1>Banner Management</h1>
    <p id="bSub" style="font-size:12px;color:var(--gray-400);margin-top:2px;">Loading…</p>
  </div>
  <div class="pg-hd__actions">
    <button class="btn btn-outline" onclick="exportCSV()">Export</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add Banner</button>
  </div>
</div>

<div class="b-kpi" id="bKpi">
  <div class="bk gn"><div class="sk" style="height:44px;"></div></div>
  <div class="bk bl"><div class="sk" style="height:44px;"></div></div>
  <div class="bk am"><div class="sk" style="height:44px;"></div></div>
  <div class="bk rd"><div class="sk" style="height:44px;"></div></div>
</div>

<div class="pos-tabs" id="posTabs"></div>

<div class="bgrid" id="bGrid">
  <div class="bcrd"><div class="sk" style="height:180px;border-radius:10px;"></div></div>
  <div class="bcrd"><div class="sk" style="height:180px;border-radius:10px;"></div></div>
  <div class="bcrd"><div class="sk" style="height:180px;border-radius:10px;"></div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="mOvl" onclick="if(event.target===this)closeModal()" style="display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;">
<div class="modal" style="max-width:760px;width:100%;margin:auto;max-height:92vh;overflow-y:auto;">
  <div class="modal-hd"><h3 id="mTitle">Add Banner</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="b-split">
    <div class="b-split-l">
      <div class="sec-hd">Content</div>
      <div class="form-grid form-2" style="margin-bottom:10px;">
        <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="fTitle" oninput="updatePrev()"></div>
        <div class="form-group"><label class="form-label">Badge Text</label><input class="form-input" id="fBadge" oninput="updatePrev()"></div>
      </div>
      <div class="form-group" style="margin-bottom:10px;"><label class="form-label">Subtitle</label><input class="form-input" id="fSub" oninput="updatePrev()"></div>
      <div class="form-grid form-2" style="margin-bottom:10px;">
        <div class="form-group"><label class="form-label">CTA Button</label><input class="form-input" id="fCTA" placeholder="Shop Now"></div>
        <div class="form-group"><label class="form-label">CTA Link</label><input class="form-input" id="fURL" placeholder="/pages/products.html"></div>
      </div>
      <div class="sec-hd">Settings</div>
      <div class="form-grid form-2" style="margin-bottom:10px;">
        <div class="form-group"><label class="form-label">Position</label>
          <select class="form-input" id="fPos" onchange="updatePrev()">
            <option value="hero">Hero Main</option>
            <option value="hero_card">Hero Card (square)</option>
            <option value="promo">Promo Banner</option>
            <option value="promo_side">Promo Side</option>
            <option value="category">Category Banner</option>
            <option value="flash_sale">Flash Sale</option>
            <option value="offer_strip">Offer Strip</option>
            <option value="popup">Popup</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-input" id="fStatus">
            <option value="true">Active — live on website</option>
            <option value="false">Inactive — hidden</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Sort Order</label><input class="form-input" type="number" id="fSort" value="0" min="0"></div>
        <div class="form-group"><label class="form-label">Image Fit</label>
          <select class="form-input" id="fFit" onchange="updatePrev()">
            <option value="cover">Cover (fill)</option>
            <option value="contain">Contain (full image)</option>
          </select>
        </div>
      </div>
      <div class="form-grid form-2" style="margin-bottom:10px;">
        <div class="form-group"><label class="form-label">Schedule Start</label><input class="form-input" type="datetime-local" id="fStart"></div>
        <div class="form-group"><label class="form-label">Schedule End</label><input class="form-input" type="datetime-local" id="fEnd"></div>
      </div>
      <div class="form-group"><label class="form-label">Alt Text (SEO)</label><input class="form-input" id="fAlt"></div>
    </div>
    <div class="b-split-r">
      <div class="sec-hd">Image — <span id="dimHint" style="font-weight:400;color:var(--green-700);">Hero: full-width × 380px</span></div>
      <div class="up-zone" id="upZ" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">
        <input type="file" accept="image/*" onchange="onFile(this)">
        <img id="upPrev" class="up-preview">
        <svg id="upIco" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="24" height="24" style="opacity:.2;margin-bottom:5px;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <div style="font-size:12px;font-weight:600;color:var(--gray-600);" id="upLbl">Drop or click to upload</div>
        <div style="font-size:10px;color:var(--gray-400);margin-top:2px;">Auto-converted to WebP · Auto-fit</div>
        <div id="upProg" style="display:none;margin-top:8px;">
          <div style="height:3px;background:var(--gray-100);border-radius:99px;overflow:hidden;"><div id="upFill" style="height:100%;background:var(--green-500);border-radius:99px;width:0%;transition:width .2s;"></div></div>
          <div id="upMsg" style="font-size:10px;color:var(--gray-400);margin-top:3px;"></div>
        </div>
      </div>
      <button id="upRm" onclick="removeImg()" style="display:none;margin-top:5px;width:100%;height:24px;border:1px solid #fecaca;background:#fef2f2;color:#dc2626;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;">Remove Image</button>

      <div class="sec-hd">Live Preview</div>
      <div style="display:flex;gap:4px;margin-bottom:8px;">
        <button onclick="setPrevDev('desktop',this)" style="flex:1;height:26px;border:1px solid var(--gray-200);border-radius:4px;font-size:10px;font-weight:700;background:#fff;cursor:pointer;" class="pdev-btn on">Desktop</button>
        <button onclick="setPrevDev('mobile',this)" style="flex:1;height:26px;border:1px solid var(--gray-200);border-radius:4px;font-size:10px;font-weight:700;background:#fff;cursor:pointer;" class="pdev-btn">Mobile</button>
      </div>
      <div class="lp-wrap">
        <div id="lpBox" style="position:relative;overflow:hidden;background:var(--gray-100);">
          <img id="lpImg" class="lp-img" src="" alt="" style="display:none;">
          <div id="lpEmpty" style="display:flex;align-items:center;justify-content:center;height:100px;font-size:11px;color:var(--gray-300);">Upload image to preview</div>
          <div id="lpOvl" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%);pointer-events:none;display:none;"></div>
          <div id="lpText" style="position:absolute;bottom:10px;left:12px;right:12px;"></div>
        </div>
        <div class="lp-lbl" id="lpLbl">Desktop Preview</div>
      </div>

      <div id="sizeNote" style="font-size:10px;color:var(--gray-500);background:var(--gray-50);border-radius:5px;padding:6px 8px;margin-top:8px;"></div>
    </div>
  </div>
  <div class="modal-ft">
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button id="delBtn" style="display:none;" class="btn" onclick="deleteBanner()" style="background:#fef2f2;color:#dc2626;">Delete</button>
    <button id="dupBtn" style="display:none;" class="btn btn-outline" onclick="dupBanner()">Duplicate</button>
    <button class="btn btn-primary" onclick="saveBanner()">Save Banner</button>
  </div>
</div>
</div>

</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../backend/config/supabase.js"></script>
<script src="assets/js/shell.js"></script>
<script>
'use strict';
let all=[], curPos='all', editId=null, imgUrl=null, prevDev='desktop';

const LABELS={all:'All',hero:'Hero Main',hero_card:'Hero Card',promo:'Promo Large',promo_side:'Promo Side',category:'Category',flash_sale:'Flash Sale',offer_strip:'Offer Strip',popup:'Popup'};
const DIMS={
  hero:      {d:'1920×380px',m:'750×200px',ar:'aspect-ratio:16/4.2'},
  hero_card: {d:'400×400px (square)',m:'130×130px',ar:'aspect-ratio:1;max-width:180px;margin:0 auto'},
  promo:     {d:'1000×300px',m:'375×200px',ar:'aspect-ratio:16/5'},
  promo_side:{d:'500×300px',m:'375×200px',ar:'aspect-ratio:5/3'},
  category:  {d:'1200×240px',m:'750×200px',ar:'aspect-ratio:5/1'},
  flash_sale:{d:'1200×200px',m:'750×160px',ar:'aspect-ratio:6/1'},
  offer_strip:{d:'1200×80px',m:'750×80px',ar:'aspect-ratio:15/1'},
  popup:     {d:'480×480px (square)',m:'320×320px',ar:'aspect-ratio:1;max-width:180px;margin:0 auto'},
};

(async()=>{
  await AdminShell.init('Banners','banners');
  await loadAll();
})();

async function loadAll(){
  try{
    let data;
    // Try WF.banners first (exists in supabase.js), fall back to direct db call
    try{ data = await WF.banners.getAll(); }
    catch(e){ const r=await db.from('banners').select('*').order('sort_order'); data=r.data||[]; }
    all=data||[];
  }catch(e){
    toast('Error: '+e.message,true);
    all=[];
  }
  renderKPIs();renderTabs();renderGrid();
  document.getElementById('bSub').textContent=`${all.length} banners · ${all.filter(b=>b.is_active).length} active`;
}

function renderKPIs(){
  const t=all.length,a=all.filter(b=>b.is_active).length,s=all.filter(b=>b.starts_at||b.ends_at).length,n=all.filter(b=>!b.desktop_image_url).length;
  document.getElementById('bKpi').innerHTML=[
    {c:'gn',v:t,l:'Total Banners'},{c:'bl',v:a,l:'Active Now'},{c:'am',v:s,l:'Scheduled'},{c:'rd',v:n,l:'No Image'}
  ].map(k=>`<div class="bk ${k.c}"><div class="bk-val">${k.v}</div><div class="bk-lbl">${k.l}</div></div>`).join('');
}

function renderTabs(){
  const cnt={};all.forEach(b=>{cnt[b.position]=(cnt[b.position]||0)+1;});
  document.getElementById('posTabs').innerHTML=['all','hero','hero_card','promo','promo_side','category','flash_sale','offer_strip','popup'].map(p=>`
    <div class="ptab ${curPos===p?'on':''}" onclick="setPos('${p}')">${LABELS[p]}<span class="ptab-cnt">${p==='all'?all.length:(cnt[p]||0)}</span></div>`).join('');
}

function setPos(p){curPos=p;renderTabs();renderGrid();}

function imgH(pos){
  return pos==='offer_strip'?'50px':pos==='flash_sale'||pos==='category'?'80px':pos==='hero'?'130px':'100px';
}

function renderGrid(){
  const el=document.getElementById('bGrid');
  const list=curPos==='all'?all:all.filter(b=>b.position===curPos);
  if(!list.length){
    el.innerHTML=`<div class="empty-b" style="grid-column:1/-1"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><b>No ${curPos==='all'?'':LABELS[curPos]+' '}banners</b><p style="font-size:11px;margin-top:4px;">Add your first banner</p><button class="btn btn-primary btn-sm" style="margin-top:10px;" onclick="openModal()">Add Banner</button></div>
    <div class="bcrd-add" onclick="openModal()"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="24" height="24" style="color:var(--gray-300);"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span style="font-size:11px;font-weight:600;color:var(--gray-400);">Add Banner</span></div>`;
    return;
  }
  el.innerHTML=list.map(b=>{
    const h=imgH(b.position);
    const fit=b.image_fit||'cover';
    const pos=b.image_position||'center';
    return`<div class="bcrd">
      <div class="bcrd-img" style="height:${h};">
        ${b.desktop_image_url
          ?`<img src="${b.desktop_image_url}" alt="${b.title||''}" loading="lazy" style="width:100%;height:${h};object-fit:${fit};object-position:${pos};">`
          :`<div class="bcrd-noimg"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="24" height="24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span style="font-size:10px;">No image</span></div>`}
        <div class="bcrd-overlay"></div>
        <span class="bcrd-badge">${LABELS[b.position]||b.position}</span>
        ${b.title?`<div class="bcrd-title">${b.title}</div>`:''}
      </div>
      <div class="bcrd-foot">
        <div style="flex:1;min-width:0;">
          <div class="bcrd-name">${b.title||'Untitled'}</div>
          <div class="bcrd-meta">Sort: ${b.sort_order||0} · ${b.cta_text||'No CTA'}</div>
        </div>
        <div class="bcrd-acts">
          <label class="tog" onclick="event.stopPropagation()"><input type="checkbox" ${b.is_active?'checked':''} onchange="toggleBanner('${b.id}',this.checked)"><span class="tog-tr"></span></label>
          <button class="bact" title="Copy URL" onclick="event.stopPropagation();copyURL('${b.desktop_image_url||''}')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          <button class="bact" title="Edit" onclick="event.stopPropagation();editBanner('${b.id}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg></button>
          <button class="bact del" title="Delete" onclick="event.stopPropagation();deleteById('${b.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
        </div>
      </div>
    </div>`;
  }).join('')+`<div class="bcrd-add" onclick="openModal()"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="22" height="22" style="color:var(--gray-300);"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span style="font-size:11px;font-weight:600;color:var(--gray-400);">Add Banner</span></div>`;
}

// MODAL
function openModal(){
  editId=null;imgUrl=null;clearForm();
  if(curPos!=='all')document.getElementById('fPos').value=curPos;
  document.getElementById('mTitle').textContent='Add Banner';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('dupBtn').style.display='none';
  document.getElementById('mOvl').style.display='flex';
  updatePrev();updateDimHint();
}
function editBanner(id){
  const b=all.find(x=>x.id===id);if(!b)return;
  editId=id;imgUrl=b.desktop_image_url||null;
  document.getElementById('fTitle').value=b.title||'';
  document.getElementById('fBadge').value=b.badge_text||'';
  document.getElementById('fSub').value=b.subtitle||'';
  document.getElementById('fCTA').value=b.cta_text||'';
  document.getElementById('fURL').value=b.cta_url||'';
  document.getElementById('fPos').value=b.position||'hero';
  document.getElementById('fStatus').value=String(b.is_active!==false);
  document.getElementById('fSort').value=b.sort_order||0;
  document.getElementById('fFit').value=b.image_fit||'cover';
  document.getElementById('fStart').value=b.starts_at?b.starts_at.slice(0,16):'';
  document.getElementById('fEnd').value=b.ends_at?b.ends_at.slice(0,16):'';
  document.getElementById('fAlt').value=b.alt_text||'';
  if(imgUrl){showPreviewImg(imgUrl);}else{resetUpZone();}
  document.getElementById('mTitle').textContent='Edit Banner';
  document.getElementById('delBtn').style.display='inline-flex';
  document.getElementById('dupBtn').style.display='inline-flex';
  document.getElementById('mOvl').style.display='flex';
  updatePrev();updateDimHint();
}
function closeModal(){document.getElementById('mOvl').style.display='none';}
function clearForm(){
  ['fTitle','fBadge','fSub','fCTA','fURL','fStart','fEnd','fAlt'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fSort').value=0;
  document.getElementById('fStatus').value='true';
  document.getElementById('fFit').value='cover';
  resetUpZone();updatePrev();
}

// SAVE
async function saveBanner(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){toast('Title required',true);return;}
  const btn=document.querySelector('#mOvl .btn-primary');
  btn.textContent='Saving…';btn.disabled=true;
  const payload={
    title,
    subtitle:document.getElementById('fSub').value||null,
    cta_text:document.getElementById('fCTA').value||null,
    cta_url:document.getElementById('fURL').value||null,
    badge_text:document.getElementById('fBadge').value||null,
    position:document.getElementById('fPos').value,
    sort_order:parseInt(document.getElementById('fSort').value)||0,
    is_active:document.getElementById('fStatus').value==='true',
    starts_at:document.getElementById('fStart').value||null,
    ends_at:document.getElementById('fEnd').value||null,
    desktop_image_url:imgUrl||null,
  };
  // Add optional columns safely
  const fit=document.getElementById('fFit').value;
  const alt=document.getElementById('fAlt').value;
  if(fit)payload.image_fit=fit;
  if(alt)payload.alt_text=alt;

  try{
    if(editId){ await db.from('banners').update(payload).eq('id',editId); }
    else { await db.from('banners').insert(payload); }
    toast(editId?'Banner updated':'Banner added — live on website');
    closeModal();loadAll();
  }catch(e){
    // If column error, retry without optional columns
    delete payload.image_fit;delete payload.alt_text;
    try{
      if(editId){ await db.from('banners').update(payload).eq('id',editId); }
      else { await db.from('banners').insert(payload); }
      toast('Banner saved (run banners_columns_v2.sql for extra features)');
      closeModal();loadAll();
    }catch(e2){ toast('Error: '+e2.message,true); }
  }
  btn.textContent='Save Banner';btn.disabled=false;
}

async function toggleBanner(id,val){
  await db.from('banners').update({is_active:val}).eq('id',id);
  const b=all.find(x=>x.id===id);if(b)b.is_active=val;
  renderKPIs();renderGrid();
  document.getElementById('bSub').textContent=`${all.length} banners · ${all.filter(b=>b.is_active).length} active`;
  toast(val?'Banner activated — showing on website':'Banner deactivated');
}
async function deleteBanner(){
  if(!editId||!confirm('Delete this banner?'))return;
  await db.from('banners').delete().eq('id',editId);
  toast('Deleted');closeModal();loadAll();
}
async function deleteById(id){
  if(!confirm('Delete this banner?'))return;
  await db.from('banners').delete().eq('id',id);
  all=all.filter(x=>x.id!==id);renderKPIs();renderTabs();renderGrid();
  document.getElementById('bSub').textContent=`${all.length} banners · ${all.filter(b=>b.is_active).length} active`;
  toast('Deleted');
}
async function dupBanner(){
  if(!editId)return;
  const b=all.find(x=>x.id===editId);if(!b)return;
  await db.from('banners').insert({...b,id:undefined,title:b.title+' (Copy)',is_active:false,sort_order:(b.sort_order||0)+1,created_at:undefined,updated_at:undefined});
  toast('Duplicated as inactive');closeModal();loadAll();
}

// UPLOAD
function dzOver(e){e.preventDefault();document.getElementById('upZ').classList.add('over');}
function dzLeave(){document.getElementById('upZ').classList.remove('over');}
function dzDrop(e){e.preventDefault();dzLeave();const f=e.dataTransfer.files[0];if(f)processImg(f);}
function onFile(input){const f=input.files[0];if(f)processImg(f);}

async function processImg(file){
  const pos=document.getElementById('fPos').value;
  const prog=document.getElementById('upProg');
  const fill=document.getElementById('upFill');
  const msg=document.getElementById('upMsg');
  prog.style.display='block';fill.style.width='15%';msg.textContent='Processing…';
  try{
    const blob=await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=e=>{
        const img=new Image();
        img.onload=()=>{
          // Target size per position
          const sizes={hero:[1920,380],hero_card:[400,400],promo:[1000,300],promo_side:[500,300],popup:[480,480],category:[1200,240],flash_sale:[1200,200],offer_strip:[1200,80]};
          const [W,H]=sizes[pos]||[1200,400];
          const canvas=document.createElement('canvas');
          canvas.width=W;canvas.height=H;
          const ctx=canvas.getContext('2d');
          ctx.fillStyle='#f5f5f5';ctx.fillRect(0,0,W,H);
          // Square positions: cover. Others: cover
          const sq=pos==='hero_card'||pos==='popup';
          const scale=sq?Math.min((W*.92)/img.width,(H*.92)/img.height):Math.max(W/img.width,H/img.height);
          const sw=img.width*scale,sh=img.height*scale;
          ctx.drawImage(img,(W-sw)/2,(H-sh)/2,sw,sh);
          canvas.toBlob(b=>res(b),'image/webp',.88);
        };
        img.src=e.target.result;
      };
      reader.readAsDataURL(file);
    });
    fill.style.width='60%';msg.textContent='Uploading…';
    const fname=`banners/${pos}-${Date.now()}-${Math.random().toString(36).slice(2)}.webp`;
    let url=null;
    for(const bucket of['media','products','public']){
      const{error}=await db.storage.from(bucket).upload(fname,blob,{cacheControl:'3600',upsert:false,contentType:'image/webp'});
      if(!error){url=db.storage.from(bucket).getPublicUrl(fname).data.publicUrl;break;}
    }
    if(!url)throw new Error('No storage bucket available');
    imgUrl=url;fill.style.width='100%';msg.textContent='Done';
    showPreviewImg(url);updatePrev();
    setTimeout(()=>{prog.style.display='none';fill.style.width='0%';},1500);
  }catch(e){toast('Upload error: '+e.message,true);prog.style.display='none';}
}
function showPreviewImg(url){
  const p=document.getElementById('upPrev');
  p.src=url;p.classList.add('show');
  document.getElementById('upIco').style.display='none';
  document.getElementById('upLbl').textContent='Click to replace';
  document.getElementById('upRm').style.display='block';
}
function removeImg(){
  imgUrl=null;resetUpZone();updatePrev();
}
function resetUpZone(){
  const p=document.getElementById('upPrev');p.src='';p.classList.remove('show');
  document.getElementById('upIco').style.display='block';
  document.getElementById('upLbl').textContent='Drop or click to upload';
  document.getElementById('upRm').style.display='none';
}

// PREVIEW
function setPrevDev(dev,el){
  prevDev=dev;
  document.querySelectorAll('.pdev-btn').forEach(b=>{b.style.background=b===el?'var(--green-700)':'#fff';b.style.color=b===el?'#fff':'';b.style.borderColor=b===el?'var(--green-700)':'var(--gray-200)';});
  document.getElementById('lpLbl').textContent=dev==='desktop'?'Desktop Preview':'Mobile Preview';
  updatePrev();
}
function updatePrev(){
  const pos=document.getElementById('fPos').value;
  const fit=document.getElementById('fFit').value;
  const title=document.getElementById('fTitle').value;
  const badge=document.getElementById('fBadge').value;
  const dim=DIMS[pos]||DIMS.hero;
  const box=document.getElementById('lpBox');
  const ar=prevDev==='mobile'?'aspect-ratio:4/3':'';
  box.style.cssText=ar||(prevDev==='desktop'?dim.ar:'aspect-ratio:4/3');
  const lpImg=document.getElementById('lpImg');
  const lpEmpty=document.getElementById('lpEmpty');
  if(imgUrl){
    lpImg.src=imgUrl;lpImg.style.cssText=`display:block;width:100%;height:100%;object-fit:${fit};object-position:center;`;
    lpEmpty.style.display='none';
    document.getElementById('lpOvl').style.display='block';
  }else{
    lpImg.style.display='none';lpEmpty.style.display='flex';
    document.getElementById('lpOvl').style.display='none';
  }
  document.getElementById('lpText').innerHTML=`${badge?`<div style="font-size:9px;font-weight:700;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:3px;">${badge}</div>`:''}${title?`<div style="font-size:13px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);">${title}</div>`:''}`;
  updateDimHint();
}
function updateDimHint(){
  const pos=document.getElementById('fPos').value;
  const dim=DIMS[pos]||DIMS.hero;
  document.getElementById('dimHint').textContent=prevDev==='mobile'?`Mobile: ${dim.m}`:`Desktop: ${dim.d}`;
  document.getElementById('sizeNote').textContent=`Upload recommended size: ${dim.d} (desktop) · ${dim.m} (mobile). Square positions auto-fit with cover mode.`;
  // Auto-set fit for square
  const fitSel=document.getElementById('fFit');
  if(pos==='hero_card'||pos==='popup') fitSel.value='cover';
  else if(!editId) fitSel.value='cover';
}

// COPY URL
function copyURL(url){if(!url){toast('No image URL',true);return;}navigator.clipboard.writeText(url).then(()=>toast('URL copied'));}

// EXPORT
function exportCSV(){
  const rows=[['Title','Position','Status','CTA','URL','Sort','Image URL']];
  all.forEach(b=>rows.push([`"${b.title||''}"`,b.position||'',b.is_active?'Active':'Inactive',b.cta_text||'',b.cta_url||'',b.sort_order||0,b.desktop_image_url||'']));
  const a=document.createElement('a');a.href='data:text/csv,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download='banners.csv';a.click();toast('Exported');
}
