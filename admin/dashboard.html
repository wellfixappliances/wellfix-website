<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — WellFix Admin</title>
<link rel="icon" href="../frontend/assets/images/WELLFIX-FAVICON.png">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-shell">
  <!-- Shell injected here by AdminShell.init() -->
  <div id="adminShell"></div>

  <!-- Main content -->
  <div class="main-wrap" id="mainWrap">
    <div class="page-content">

      <div class="pg-hd">
        <div>
          <h1>Dashboard</h1>
          <p>Welcome back — here's your store overview</p>
        </div>
        <div class="pg-hd__actions">
          <button class="btn btn-secondary" onclick="exportReport()">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
          <a href="products.html" class="btn btn-primary">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Product
          </a>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <!-- Skeleton -->
        <div class="stat-card"><div class="skeleton" style="height:90px;border-radius:8px;"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:90px;border-radius:8px;"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:90px;border-radius:8px;"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:90px;border-radius:8px;"></div></div>
      </div>

      <!-- Charts + Panels -->
      <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;" id="dashGrid">

        <!-- Left column -->
        <div style="display:flex;flex-direction:column;gap:20px;">

          <!-- Revenue chart -->
          <div class="card">
            <div class="card-hd">
              <span class="card-title">Revenue Overview</span>
              <select class="filter-select" style="width:auto;" onchange="loadRevenueChart(this.value)">
                <option value="30">Last 30 days</option>
                <option value="7">Last 7 days</option>
                <option value="90">Last 3 months</option>
              </select>
            </div>
            <div class="card-body">
              <div style="display:flex;gap:24px;margin-bottom:16px;" id="revenueNums">
                <div><div style="font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--gray-900);" id="revMonth">—</div><div style="font-size:11px;color:var(--gray-400);">This Month</div></div>
                <div><div style="font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--gray-200);" id="revLast">—</div><div style="font-size:11px;color:var(--gray-400);">Last Month</div></div>
              </div>
              <div style="display:flex;align-items:flex-end;gap:4px;height:100px;padding-bottom:20px;position:relative;" id="revChart">
                <div class="skeleton" style="flex:1;height:100%;border-radius:4px;"></div>
              </div>
            </div>
          </div>

          <!-- Recent orders -->
          <div class="card">
            <div class="card-hd">
              <span class="card-title">Recent Orders</span>
              <a href="orders.html" class="btn btn-secondary btn-sm">View All</a>
            </div>
            <div class="card-body-0">
              <div class="tbl-wrap">
                <table>
                  <thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                  <tbody id="recentOrdersTbody">
                    <tr><td colspan="5" style="text-align:center;padding:20px;color:var(--gray-300);">Loading…</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <!-- Right column -->
        <div style="display:flex;flex-direction:column;gap:20px;">

          <!-- Live activity -->
          <div class="card">
            <div class="card-hd"><span class="card-title">Live Activity</span></div>
            <div class="card-body" id="activityFeed" style="max-height:240px;overflow-y:auto;">
              <div class="skeleton" style="height:60px;border-radius:8px;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:60px;border-radius:8px;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:60px;border-radius:8px;"></div>
            </div>
          </div>

          <!-- Low stock alert -->
          <div class="card" id="lowStockCard" style="display:none;">
            <div class="card-hd">
              <span class="card-title" style="color:var(--orange-500);">⚠ Low Stock Alerts</span>
              <a href="inventory.html" class="btn btn-secondary btn-sm">Manage</a>
            </div>
            <div class="card-body-0">
              <div class="tbl-wrap">
                <table>
                  <thead><tr><th>Product</th><th>Stock</th></tr></thead>
                  <tbody id="lowStockTbody"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Top categories -->
          <div class="card">
            <div class="card-hd"><span class="card-title">Sales by Category</span></div>
            <div class="card-body" id="catProgress"></div>
          </div>

          <!-- Quick actions -->
          <div class="card">
            <div class="card-hd"><span class="card-title">Quick Actions</span></div>
            <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <a href="products.html?action=add" class="btn btn-primary btn-sm" style="justify-content:flex-start;">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Product
              </a>
              <a href="orders.html" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg>
                Orders
              </a>
              <a href="services.html" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
                Bookings
              </a>
              <a href="banners.html" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                Banners
              </a>
            </div>
          </div>
        </div>
      </div><!-- /dashGrid -->

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../backend/config/supabase.js"></script>
<script src="assets/js/shell.js"></script>
<script>
(async () => {
  await AdminShell.init('Dashboard');
  await loadDashboard();
  // Auto-refresh every 2 min
  setInterval(loadDashboard, 2 * 60 * 1000);
})();

async function loadDashboard() {
  try {
    const stats = await getDashboardStats();
    renderStats(stats);
    await Promise.all([
      loadRecentOrders(),
      loadActivity(),
      loadLowStock(),
      loadCategoryProgress(),
      loadRevenueChart()
    ]);
  } catch (e) {
    toast('Error loading dashboard: ' + e.message, true);
  }
}

// Build stats from real DB — no WF.analytics dependency
async function getDashboardStats() {
  const [ordersRes, prodsRes, custsRes] = await Promise.all([
    db.from('orders').select('total,status,created_at').order('created_at',{ascending:false}),
    db.from('products').select('id,stock_qty,low_stock_threshold').eq('is_active',true),
    db.from('customers').select('id',{count:'exact',head:true}),
  ]);
  const orders = ordersRes.data || [];
  const prods  = prodsRes.data  || [];
  const now = new Date(); const mStart = new Date(now.getFullYear(),now.getMonth(),1);
  const PAID = ['confirmed','processing','packed','shipped','out_for_delivery','delivered'];
  const monthOrders = orders.filter(o=>new Date(o.created_at)>=mStart);
  const revenue = monthOrders.filter(o=>PAID.includes(o.status)).reduce((s,o)=>s+(parseFloat(o.total)||0),0);
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayRev = orders.filter(o=>new Date(o.created_at)>=todayStart&&PAID.includes(o.status)).reduce((s,o)=>s+(parseFloat(o.total)||0),0);
  return {
    revenue, todayRev,
    total_orders: orders.length,
    month_orders: monthOrders.length,
    customers_count: custsRes.count || 0,
    low_stock_count: prods.filter(p=>(p.stock_qty||0)<=(p.low_stock_threshold||5)).length,
    out_of_stock: prods.filter(p=>(p.stock_qty||0)===0).length,
    pending_orders: orders.filter(o=>o.status==='pending').length,
    pending_pay: orders.filter(o=>o.payment_status==='pending_verification').length,
    cancelled: orders.filter(o=>o.status==='cancelled').length,
  };
}

function renderStats(s) {
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-card__top">
        <div class="stat-card__icon green">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        </div>
        <span class="stat-card__badge up">This Month</span>
      </div>
      <div class="stat-card__val">${formatCurrency(s.revenue)}</div>
      <div class="stat-card__label">Monthly Revenue</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__top">
        <div class="stat-card__icon blue">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        </div>
        ${s.pending_orders > 0 ? `<span class="stat-card__badge down">${s.pending_orders} pending</span>` : `<span class="stat-card__badge up">All clear</span>`}
      </div>
      <div class="stat-card__val">${s.total_orders}</div>
      <div class="stat-card__label">Total Orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__top">
        <div class="stat-card__icon gold">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
      </div>
      <div class="stat-card__val">${Number(s.customers_count).toLocaleString('en-IN')}</div>
      <div class="stat-card__label">Total Customers</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__top">
        <div class="stat-card__icon purple">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        </div>
        ${s.low_stock_count > 0 ? `<span class="stat-card__badge down">${s.low_stock_count} low stock</span>` : ''}
      </div>
      <div class="stat-card__val">${s.bookings_count}</div>
      <div class="stat-card__label">Service Bookings</div>
    </div>`;

  document.getElementById('revMonth').textContent = formatCurrency(s.revenue);
}

async function loadRecentOrders() {
  const {data} = await db.from('orders').select('order_number,customer_name,total,status,payment_method,created_at').order('created_at',{ascending:false}).limit(8);
  const orders = data || [];
  const tbody = document.getElementById('recentOrdersTbody');
  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--gray-300);">No orders yet</td></tr>`;
    return;
  }
  tbody.innerHTML = orders.map(o => `<tr>
    <td class="td-bold">${o.order_number}</td>
    <td>${o.customer_name}</td>
    <td style="font-weight:700;">${formatCurrency(o.total)}</td>
    <td>${renderBadge(o.status)}</td>
    <td>${formatDate(o.created_at)}</td>
  </tr>`).join('');
}

async function loadActivity() {
  const feed = document.getElementById('activityFeed');
  const {data:ordData} = await db.from('orders').select('order_number,customer_name,total,status,created_at').order('created_at',{ascending:false}).limit(6);
  const orders = ordData || [];
  const items = orders.map(o => ({
    dot: o.status==='delivered'?'green':o.status==='cancelled'?'red':'blue',
    text: `<strong>Order ${o.order_number}</strong> · ${o.customer_name} · ${formatCurrency(o.total)}`,
    time: formatDate(o.created_at)
  }));
  if (!items.length) { feed.innerHTML = '<div style="font-size:12px;color:var(--gray-300);text-align:center;padding:10px;">No recent activity</div>'; return; }
  feed.innerHTML = items.map(a => `
    <div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-50);">
      <div style="width:7px;height:7px;border-radius:99px;background:var(--${a.dot === 'green' ? 'green-500' : 'blue-500'});margin-top:5px;flex-shrink:0;"></div>
      <div><div style="font-size:12px;color:var(--gray-600);line-height:1.5;">${a.text}</div><div style="font-size:11px;color:var(--gray-300);margin-top:2px;">${a.time}</div></div>
    </div>`).join('');
}

async function loadLowStock() {
  const {data} = await db.from('products')
    .select('name,stock_qty,low_stock_threshold').eq('is_active',true).order('stock_qty',{ascending:true}).limit(10);
  const low = (data||[]).filter(p=>(p.stock_qty||0)<=(p.low_stock_threshold||5));
  if (!low.length) return;
  document.getElementById('lowStockCard').style.display = 'block';
  document.getElementById('lowStockTbody').innerHTML = low.map(p => `
    <tr>
      <td class="td-bold">${p.name.substring(0, 28)}…</td>
      <td><span class="badge ${p.stock_qty === 0 ? 'badge-danger' : 'badge-pending'}">${p.stock_qty} left</span></td>
    </tr>`).join('');
}

async function loadCategoryProgress() {
  const {data} = await db.from('products')
    .select('category:categories(name),stock_qty').eq('is_active',true);
  const map={};
  (data||[]).forEach(p=>{
    const n=p.category?.name||'Other';
    map[n]=(map[n]||0)+1;
  });
  const total=Object.values(map).reduce((s,v)=>s+v,0)||1;
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const el=document.getElementById('catProgress');
  if(!sorted.length){el.innerHTML='<div style="font-size:12px;color:var(--gray-300);text-align:center;padding:10px;">No products yet</div>';return;}
  el.innerHTML=sorted.map(([name,cnt])=>{
    const pct=Math.round(cnt/total*100);
    return`<div class="progress-row">
      <div class="progress-label">${name.length>20?name.slice(0,20)+'…':name}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-val">${pct}%</div>
    </div>`;
  }).join('');
}

async function loadRevenueChart() {
  const PAID=['confirmed','processing','packed','shipped','out_for_delivery','delivered'];
  const {data} = await db.from('orders').select('total,status,created_at').order('created_at',{ascending:true});
  const orders=data||[];
  // Last 6 months
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({label:d.toLocaleDateString('en-IN',{month:'short'}),year:d.getFullYear(),month:d.getMonth(),rev:0});
  }
  orders.filter(o=>PAID.includes(o.status)).forEach(o=>{
    const d=new Date(o.created_at);
    const m=months.find(m=>m.year===d.getFullYear()&&m.month===d.getMonth());
    if(m)m.rev+=parseFloat(o.total)||0;
  });
  const maxRev=Math.max(...months.map(m=>m.rev),1);
  const el=document.getElementById('revChart');
  if(!el)return;
  el.innerHTML=months.map(m=>{
    const h=Math.max(Math.round((m.rev/maxRev)*100),m.rev>0?4:1);
    return`<div style="flex:1;border-radius:3px 3px 0 0;background:${m.rev===maxRev&&m.rev>0?'var(--green-600)':'var(--green-100)'};height:${h}%;min-width:6px;transition:background .2s;position:relative;cursor:pointer;" title="${m.label}: ${formatCurrency(m.rev)}">
      <span style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--gray-300);white-space:nowrap;">${m.label}</span>
    </div>`;
  }).join('');
}

function setupRealtime() {
  // WF.realtime removed — auto-refresh handles updates
}

function exportReport() {
  toast('Generating export… check your downloads');
}
</script>
</body>
</html>
