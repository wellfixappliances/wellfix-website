<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>POS — WellFix Admin</title>
<link rel="icon" href="../assets/images/WELLFIX-FAVICON.png">
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
/* ═══════════════════════════════════════════════════
   WELLFIX POS — ENTERPRISE BILLING SYSTEM
   ═══════════════════════════════════════════════════ */
:root{--pos-left:58%;--pos-right:42%;}

/* POS layout overrides — full height, no scroll on body */
.main-wrap{padding:0!important;height:calc(100vh - var(--topbar-h));overflow:hidden;}
.page-content{padding:0!important;height:100%;display:flex;flex-direction:column;}

/* Header bar */
.pos-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid var(--gray-100);flex-shrink:0;gap:8px;flex-wrap:wrap;}
.pos-hd-l,.pos-hd-r{display:flex;align-items:center;gap:6px;}
.pos-mode-seg{display:flex;background:var(--gray-50);border:1px solid var(--gray-150,#dedede);border-radius:6px;padding:2px;gap:1px;}
.pos-mode-btn{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:700;color:var(--gray-500);cursor:pointer;border:none;background:none;transition:all .15s;}
.pos-mode-btn.on{background:#fff;color:var(--gray-900);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.pos-shift{font-size:11px;color:var(--gray-400);padding:4px 10px;background:var(--green-50);border-radius:4px;border:1px solid var(--green-100);}

/* Two-panel layout */
.pos-body{display:grid;grid-template-columns:var(--pos-left) var(--pos-right);flex:1;overflow:hidden;min-height:0;}
@media(max-width:900px){.pos-body{grid-template-columns:1fr;}.pos-right{display:none;}.pos-body.show-bill .pos-left{display:none;}.pos-body.show-bill .pos-right{display:flex;}}

/* LEFT — Product browser */
.pos-left{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--gray-100);}
.pos-search-bar{padding:10px 12px;background:#fff;border-bottom:1px solid var(--gray-100);display:flex;gap:8px;align-items:center;flex-shrink:0;}
.pos-search-inp{flex:1;height:36px;border:1.5px solid var(--gray-200);border-radius:7px;padding:0 12px 0 34px;font-size:13px;font-family:var(--font-body);background:var(--gray-25);transition:border .15s;}
.pos-search-inp:focus{outline:none;border-color:var(--green-400);background:#fff;}
.pos-search-wrap{position:relative;flex:1;}
.pos-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--gray-400);pointer-events:none;}
.pos-barcode-btn{width:36px;height:36px;border-radius:7px;border:1.5px solid var(--gray-200);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.pos-barcode-btn:hover{border-color:var(--green-400);background:var(--green-50);}
.pos-barcode-btn svg{width:16px;height:16px;stroke:var(--gray-500);}

/* Category tabs */
.pos-cats{display:flex;gap:4px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:#fff;border-bottom:1px solid var(--gray-100);}
.pos-cats::-webkit-scrollbar{display:none;}
.pos-cat{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--gray-150,#dedede);background:#fff;color:var(--gray-500);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.pos-cat:hover{border-color:var(--gray-300);}
.pos-cat.on{border-color:var(--green-700);background:var(--green-700);color:#fff;}

/* Product grid */
.pos-products{flex:1;overflow-y:auto;padding:10px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;align-content:start;}
.pos-products::-webkit-scrollbar{width:4px;}
.pos-products::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:99px;}

.pcard{background:#fff;border:1.5px solid var(--gray-100);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .15s;user-select:none;}
.pcard:hover{border-color:var(--green-300);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.pcard:active{transform:scale(.97);}
.pcard.out{opacity:.5;cursor:not-allowed;}
.pcard-img{width:100%;aspect-ratio:1;background:var(--gray-50);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.pcard-img img{width:100%;height:100%;object-fit:contain;padding:6px;}
.pcard-img svg{width:28px;height:28px;color:var(--gray-200);}
.pcard-body{padding:7px 8px;}
.pcard-name{font-size:11px;font-weight:700;color:var(--gray-900);line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.pcard-sku{font-size:9px;color:var(--gray-400);margin-top:2px;font-family:monospace;}
.pcard-price{font-family:var(--font-display);font-size:13px;font-weight:800;color:var(--green-700);margin-top:3px;}
.pcard-mrp{font-size:10px;text-decoration:line-through;color:var(--gray-400);}
.pcard-stock{font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;margin-top:3px;display:inline-block;}
.pcard-stock.ok{background:#f0fdf4;color:#16a34a;}
.pcard-stock.low{background:#fff7ed;color:#c2410c;}
.pcard-stock.out{background:#fef2f2;color:#dc2626;}
.pcard-add{width:100%;height:28px;background:var(--green-700);color:#fff;border:none;border-radius:0 0 6px 6px;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:6px;}
.pcard-add:hover{background:var(--green-600);}

/* Empty state */
.pos-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--gray-300);grid-column:1/-1;}
.pos-empty svg{width:36px;height:36px;margin-bottom:10px;}
.pos-empty p{font-size:12px;}

/* RIGHT — Bill panel */
.pos-right{display:flex;flex-direction:column;background:#fff;overflow:hidden;}

/* Customer strip */
.pos-cust-strip{padding:8px 12px;border-bottom:1px solid var(--gray-100);flex-shrink:0;}
.pos-cust-row{display:flex;align-items:center;gap:6px;}
.pos-cust-inp{flex:1;height:32px;border:1.5px solid var(--gray-200);border-radius:6px;padding:0 10px;font-size:12px;background:var(--gray-25);}
.pos-cust-inp:focus{outline:none;border-color:var(--green-400);}
.pos-cust-found{background:var(--green-50);border:1px solid var(--green-100);border-radius:6px;padding:5px 10px;margin-top:5px;font-size:11px;display:none;}

/* Cart items */
.pos-cart{flex:1;overflow-y:auto;padding:8px 0;}
.pos-cart::-webkit-scrollbar{width:3px;}
.pos-cart::-webkit-scrollbar-thumb{background:var(--gray-100);}
.cart-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--gray-50);transition:background .1s;}
.cart-item:hover{background:var(--gray-25);}
.cart-item:last-child{border-bottom:none;}
.ci-name{font-size:12px;font-weight:700;color:var(--gray-900);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-price{font-size:11px;color:var(--gray-500);margin-top:1px;}
.ci-qty{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ci-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;font-size:14px;font-weight:700;color:var(--gray-600);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.ci-btn:hover{background:var(--gray-50);}
.ci-btn.minus:hover{background:#fef2f2;border-color:#fecaca;color:#dc2626;}
.ci-btn.plus:hover{background:var(--green-50);border-color:var(--green-200);color:var(--green-700);}
.ci-qty-val{width:28px;text-align:center;font-size:12px;font-weight:700;}
.ci-total{font-family:var(--font-display);font-size:13px;font-weight:800;color:var(--gray-900);width:52px;text-align:right;flex-shrink:0;}
.ci-del{width:18px;height:18px;color:var(--gray-300);cursor:pointer;flex-shrink:0;transition:color .15s;}
.ci-del:hover{color:#ef4444;}

/* Cart empty */
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;color:var(--gray-300);text-align:center;}
.cart-empty svg{width:32px;height:32px;margin-bottom:8px;}
.cart-empty p{font-size:11px;}

/* Bill summary */
.pos-summary{padding:10px 12px;border-top:1px solid var(--gray-100);flex-shrink:0;background:#fafafa;}
.sum-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--gray-600);}
.sum-row.total{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--gray-900);padding-top:7px;border-top:1px solid var(--gray-150,#dedede);margin-top:4px;}
.sum-row.due{color:#dc2626;font-weight:700;}
.disc-row{display:flex;align-items:center;gap:6px;}
.disc-inp{width:60px;height:24px;border:1px solid var(--gray-200);border-radius:4px;text-align:center;font-size:11px;font-family:var(--font-body);}
.disc-inp:focus{outline:none;border-color:var(--green-400);}
.disc-type{height:24px;border:1px solid var(--gray-200);border-radius:4px;font-size:11px;font-family:var(--font-body);}

/* Payment section */
.pos-pay{padding:10px 12px;flex-shrink:0;border-top:1px solid var(--gray-100);}
.pay-methods{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;}
.pay-btn{padding:7px 4px;border:1.5px solid var(--gray-150,#dedede);border-radius:6px;font-size:10px;font-weight:700;color:var(--gray-500);cursor:pointer;text-align:center;transition:all .15s;background:#fff;}
.pay-btn:hover{border-color:var(--gray-300);}
.pay-btn.on{border-color:var(--green-700);background:var(--green-700);color:#fff;}
.pay-btn svg{width:14px;height:14px;display:block;margin:0 auto 3px;}
.pay-split-row{display:flex;gap:5px;margin-bottom:8px;display:none;}
.pay-split-row.show{display:flex;}
.pay-split-inp{flex:1;height:30px;border:1px solid var(--gray-200);border-radius:5px;padding:0 8px;font-size:12px;}
.pay-split-inp:focus{outline:none;border-color:var(--green-400);}

/* UPI QR */
.upi-qr-box{display:none;background:var(--gray-25);border:1px solid var(--gray-100);border-radius:7px;padding:10px;margin-bottom:8px;text-align:center;}
.upi-qr-box.show{display:block;}
.upi-qr-id{font-family:monospace;font-size:12px;font-weight:700;color:var(--green-700);margin-top:4px;}
.upi-ref-row{display:flex;gap:5px;margin-top:6px;}

/* Action buttons */
.pos-actions{display:grid;grid-template-columns:1fr 1fr 2fr;gap:6px;padding:8px 12px;flex-shrink:0;}
.pos-btn{height:42px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.pos-btn svg{width:14px;height:14px;}
.pos-btn.hold{background:var(--gray-100);color:var(--gray-700);}
.pos-btn.hold:hover{background:var(--gray-200);}
.pos-btn.clear{background:#fef2f2;color:#dc2626;}
.pos-btn.clear:hover{background:#fecaca;}
.pos-btn.charge{background:var(--green-700);color:#fff;font-size:14px;}
.pos-btn.charge:hover{background:var(--green-600);}
.pos-btn.charge:disabled{opacity:.5;cursor:not-allowed;}

/* Hold drawer */
.hold-drawer{position:fixed;right:0;top:var(--topbar-h);bottom:0;width:280px;background:#fff;border-left:1px solid var(--gray-100);z-index:50;transform:translateX(100%);transition:transform .25s;box-shadow:-4px 0 20px rgba(0,0,0,.08);}
.hold-drawer.open{transform:translateX(0);}
.hd-hd{padding:12px 14px;border-bottom:1px solid var(--gray-100);font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
.hold-item{padding:10px 14px;border-bottom:1px solid var(--gray-50);cursor:pointer;transition:background .1s;}
.hold-item:hover{background:var(--gray-25);}
.hold-item-name{font-size:12px;font-weight:700;}
.hold-item-meta{font-size:10px;color:var(--gray-400);margin-top:2px;}

/* Invoice print modal */
.inv-print{font-family:'Courier New',monospace;font-size:12px;max-width:320px;margin:0 auto;padding:16px;}
.inv-print h2{font-family:var(--font-display);font-size:16px;text-align:center;margin-bottom:4px;}
.inv-print .inv-addr{text-align:center;font-size:11px;color:#666;margin-bottom:12px;line-height:1.5;}
.inv-divider{border-top:1px dashed #999;margin:8px 0;}
.inv-row{display:flex;justify-content:space-between;margin:3px 0;font-size:11px;}
.inv-item{margin:4px 0;}
.inv-item-name{font-weight:700;}
.inv-item-detail{display:flex;justify-content:space-between;color:#555;}
.inv-total-row{display:flex;justify-content:space-between;font-weight:700;}
.inv-grand{font-size:14px;font-weight:900;display:flex;justify-content:space-between;padding-top:6px;border-top:1px dashed #999;margin-top:6px;}
.inv-footer{text-align:center;margin-top:12px;font-size:10px;color:#888;}

/* Skeleton */
.sk{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:6px;}
@keyframes sk{to{background-position:-200% 0;}}

/* Mobile bill toggle */
.mob-bill-toggle{display:none;position:fixed;bottom:14px;right:14px;width:52px;height:52px;border-radius:99px;background:var(--green-700);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(3,71,50,.4);font-size:11px;font-weight:700;z-index:30;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
@media(max-width:900px){.mob-bill-toggle{display:flex;}}
.mob-bill-count{font-size:16px;font-weight:900;line-height:1;}

/* Shift panel modal */
.shift-modal{max-width:380px;width:100%;margin:auto;}
.shift-box{background:var(--gray-25);border:1px solid var(--gray-100);border-radius:8px;padding:14px;margin-bottom:12px;}
.shift-box-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400);margin-bottom:8px;}
.shift-stat{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--gray-100);}
.shift-stat:last-child{border-bottom:none;}
.shift-stat-val{font-weight:800;font-family:var(--font-display);}
</style>
</head>
<body>
<div class="admin-shell"><div id="adminShell"></div>
<div class="main-wrap" id="mainWrap">
<div class="page-content">

<!-- POS HEADER -->
<div class="pos-hd">
  <div class="pos-hd-l">
    <div class="pos-mode-seg">
      <button class="pos-mode-btn on" id="mode-sale" onclick="setMode('sale',this)">Sale</button>
      <button class="pos-mode-btn" id="mode-quote" onclick="setMode('quote',this)">Quote</button>
      <button class="pos-mode-btn" id="mode-return" onclick="setMode('return',this)">Return</button>
    </div>
    <span class="pos-shift" id="shiftInfo">Shift: Active</span>
  </div>
  <div class="pos-hd-r">
    <button class="btn btn-sm btn-outline" onclick="openHoldDrawer()">
      Held Bills <span id="holdCount" style="background:var(--green-700);color:#fff;border-radius:99px;padding:0 5px;font-size:10px;margin-left:3px;">0</span>
    </button>
    <button class="btn btn-sm btn-outline" onclick="openShiftModal()">Shift Report</button>
    <button class="btn btn-sm" style="background:var(--green-700);color:#fff;border-radius:6px;" onclick="openInvoiceList()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="12" height="12"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Invoices
    </button>
  </div>
</div>

<!-- MAIN POS BODY -->
<div class="pos-body" id="posBody">

  <!-- LEFT: Products -->
  <div class="pos-left">
    <!-- Search + barcode -->
    <div class="pos-search-bar">
      <div class="pos-search-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="pos-search-inp" id="prodSearch" type="search" placeholder="Search product, SKU, barcode…" oninput="searchProducts()" autofocus>
      </div>
      <button class="pos-barcode-btn" id="barcodeBtn" title="Barcode scanner active — just scan">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9V4a1 1 0 011-1h4M3 15v5a1 1 0 001 1h4m10-1h4a1 1 0 001-1v-4M21 9V4a1 1 0 00-1-1h-4M8 4v16M12 4v16M16 4v16"/></svg>
      </button>
      <button class="btn btn-sm" style="background:var(--gray-100);color:var(--gray-600);height:36px;border-radius:7px;" onclick="quickAddProduct()">+ Manual</button>
    </div>

    <!-- Category tabs -->
    <div class="pos-cats" id="posCats">
      <div class="pos-cat on" onclick="filterCat('',this)">All</div>
    </div>

    <!-- Product grid -->
    <div class="pos-products" id="posProducts">
      <div class="pcard"><div class="sk" style="height:160px;border-radius:8px;"></div></div>
      <div class="pcard"><div class="sk" style="height:160px;border-radius:8px;"></div></div>
      <div class="pcard"><div class="sk" style="height:160px;border-radius:8px;"></div></div>
      <div class="pcard"><div class="sk" style="height:160px;border-radius:8px;"></div></div>
      <div class="pcard"><div class="sk" style="height:160px;border-radius:8px;"></div></div>
      <div class="pcard"><div class="sk" style="height:160px;border-radius:8px;"></div></div>
    </div>
  </div>

  <!-- RIGHT: Bill panel -->
  <div class="pos-right" id="posBill">

    <!-- Customer -->
    <div class="pos-cust-strip">
      <div class="pos-cust-row">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14" style="color:var(--gray-400);flex-shrink:0;"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input class="pos-cust-inp" id="custSearch" placeholder="Customer name or phone…" oninput="searchCustomer()">
        <button class="btn btn-sm btn-outline" style="height:32px;padding:0 8px;font-size:11px;" onclick="openQuickCust()">+ New</button>
      </div>
      <div class="pos-cust-found" id="custFound"></div>
    </div>

    <!-- Cart -->
    <div class="pos-cart" id="posCart">
      <div class="cart-empty">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <p>Cart is empty<br>Tap a product to add</p>
      </div>
    </div>

    <!-- Summary -->
    <div class="pos-summary">
      <div class="sum-row"><span>Items</span><span id="sumItems">0</span></div>
      <div class="sum-row"><span>Subtotal</span><span id="sumSub">₹0</span></div>
      <div class="sum-row">
        <div class="disc-row">
          <span>Discount</span>
          <input class="disc-inp" id="discVal" type="number" value="0" min="0" oninput="calcTotals()" placeholder="0">
          <select class="disc-type" id="discType" onchange="calcTotals()" style="padding:0 4px;">
            <option value="pct">%</option>
            <option value="flat">₹</option>
          </select>
        </div>
        <span id="sumDisc" style="color:#ef4444;">-₹0</span>
      </div>
      <div class="sum-row"><span>Tax (GST)</span><span id="sumTax">₹0</span></div>
      <div class="sum-row total"><span>TOTAL</span><span id="sumTotal">₹0</span></div>
      <div class="sum-row due" id="sumDueRow" style="display:none;"><span>Due</span><span id="sumDue">₹0</span></div>
    </div>

    <!-- Payment -->
    <div class="pos-pay">
      <div class="pay-methods">
        <div class="pay-btn on" id="pm-cash" onclick="setPayMethod('cash',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>
          Cash
        </div>
        <div class="pay-btn" id="pm-upi" onclick="setPayMethod('upi',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          UPI
        </div>
        <div class="pay-btn" id="pm-card" onclick="setPayMethod('card',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Card
        </div>
        <div class="pay-btn" id="pm-split" onclick="setPayMethod('split',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Split
        </div>
      </div>
      <!-- UPI QR box -->
      <div class="upi-qr-box" id="upiBox">
        <div style="font-size:11px;font-weight:700;color:var(--gray-700);">Scan to Pay via UPI</div>
        <div id="upiQR" style="margin:6px 0;"></div>
        <div class="upi-qr-id">8301879406@ybl</div>
        <div class="upi-ref-row">

<script src="../assets/js/shell.js"></script>
<script>
'use strict';

// ── STATE ──────────────────────────────────────────────────
let allProducts=[], allCats=[], allCustomers=[];
let cart=[], currentCustomer=null, currentMode='sale';
let payMethod='cash', heldBills=[], splitMode=false;
let filteredProds=[], currentCatId='';
let barcodeBuffer='', barcodeTimer=null;
let invNum=0;

// ── INIT ───────────────────────────────────────────────────
(async()=>{
  await AdminShell.init('POS','pos');
  await Promise.all([loadProducts(),loadCats(),loadCustomers()]);
  setupBarcodeListener();
  loadHeldBills();
  updateShiftInfo();
})();

async function loadProducts(){
  const{data}=await db.from('products')
    .select('id,name,sku,price,mrp,stock_qty,category_id,category:categories(name),images:product_images(url,is_primary)')
    .eq('is_active',true).order('name');
  allProducts=data||[];filteredProds=allProducts;
  renderProducts(allProducts);
}

async function loadCats(){
  const{data}=await db.from('categories').select('id,name').eq('is_active',true).order('sort_order');
  allCats=data||[];
  const el=document.getElementById('posCats');
  el.innerHTML='<div class="pos-cat on" onclick="filterCat(\'\',this)">All</div>'+
    allCats.map(c=>`<div class="pos-cat" onclick="filterCat('${c.id}',this)">${c.name}</div>`).join('');
}

async function loadCustomers(){
  const{data}=await db.from('customers').select('id,name,phone,loyalty_points,loyalty_tier').order('name');
  allCustomers=data||[];
}

// ── PRODUCT RENDER ─────────────────────────────────────────
function renderProducts(prods){
  const el=document.getElementById('posProducts');
  if(!prods.length){
    el.innerHTML='<div class="pos-empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No products found</p></div>';
    return;
  }
  el.innerHTML=prods.map(p=>{
    const img=p.images?.find(i=>i.is_primary)?.url||p.images?.[0]?.url||'';
    const qty=p.stock_qty||0;
    const sc=qty===0?'out':qty<=5?'low':'ok';
    const slbl=qty===0?'Out of Stock':qty<=5?`${qty} left`:`${qty} in stock`;
    return`<div class="pcard ${qty===0?'out':''}" onclick="${qty>0?`addToCart('${p.id}')`:''}">
      <div class="pcard-img">
        ${img?`<img src="${img}" alt="${p.name}" loading="lazy">`:`<svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>`}
      </div>
      <div class="pcard-body">
        <div class="pcard-name">${p.name}</div>
        ${p.sku?`<div class="pcard-sku">${p.sku}</div>`:''}
        <div class="pcard-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
        ${p.mrp&&p.mrp>p.price?`<div class="pcard-mrp">₹${Number(p.mrp).toLocaleString('en-IN')}</div>`:''}
        <span class="pcard-stock ${sc}">${slbl}</span>
      </div>
      ${qty>0?`<button class="pcard-add" onclick="event.stopPropagation();addToCart('${p.id}')">Add +</button>`:''}
    </div>`;
  }).join('');
}

function filterCat(catId,el){
  currentCatId=catId;
  document.querySelectorAll('.pos-cat').forEach(c=>c.classList.remove('on'));el.classList.add('on');
  const q=document.getElementById('prodSearch').value.toLowerCase();
  filterAndRender(q,catId);
}

function searchProducts(){
  const q=document.getElementById('prodSearch').value.toLowerCase();
  filterAndRender(q,currentCatId);
  // Barcode auto-add: if exact SKU match
  if(q.length>=4){
    const exact=allProducts.find(p=>p.sku?.toLowerCase()===q);
    if(exact){addToCart(exact.id);document.getElementById('prodSearch').value='';return;}
  }
}

function filterAndRender(q,catId){
  let list=allProducts;
  if(catId) list=list.filter(p=>p.category_id===catId);
  if(q) list=list.filter(p=>p.name.toLowerCase().includes(q)||p.sku?.toLowerCase().includes(q));
  renderProducts(list);
}

// ── BARCODE SCANNER ────────────────────────────────────────
function setupBarcodeListener(){
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if(e.key==='Enter'){
      if(barcodeBuffer.length>=3){
        const found=allProducts.find(p=>p.sku===barcodeBuffer||(p.barcode&&p.barcode===barcodeBuffer));
        if(found){addToCart(found.id);toast('Barcode scanned: '+found.name);}
        else toast('No product found for: '+barcodeBuffer,true);
        barcodeBuffer='';
      }return;
    }
    if(e.key.length===1){
      barcodeBuffer+=e.key;
      clearTimeout(barcodeTimer);
      barcodeTimer=setTimeout(()=>{barcodeBuffer='';},300);
    }
  });
}

// ── CART ───────────────────────────────────────────────────
function addToCart(productId){
  const p=allProducts.find(x=>x.id===productId);if(!p)return;
  const existing=cart.find(i=>i.id===productId);
  if(existing){
    if(existing.qty>=p.stock_qty){toast('Max stock reached',true);return;}
    existing.qty++;existing.total=existing.qty*existing.price;
  }else{
    cart.push({id:p.id,name:p.name,sku:p.sku||'',price:parseFloat(p.price),qty:1,total:parseFloat(p.price),stock:p.stock_qty});
  }
  renderCart();calcTotals();
  // Flash animation on button
  const btn=event?.target;if(btn){btn.textContent='✓';setTimeout(()=>{btn.textContent='Add +';},600);}
}

function removeFromCart(idx){cart.splice(idx,1);renderCart();calcTotals();}

function changeQty(idx,delta){
  const item=cart[idx];if(!item)return;
  const newQty=item.qty+delta;
  if(newQty<=0){removeFromCart(idx);return;}
  if(newQty>item.stock){toast('Insufficient stock',true);return;}
  item.qty=newQty;item.total=item.qty*item.price;
  renderCart();calcTotals();
}

function renderCart(){
  const el=document.getElementById('posCart');
  document.getElementById('mobBillCount').textContent=cart.length;
  if(!cart.length){
    el.innerHTML='<div class="cart-empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><p>Cart is empty<br>Tap a product to add</p></div>';
    document.getElementById('chargeBtn').disabled=true;
    document.getElementById('chargeBtn').textContent='Charge ₹0';
    return;
  }
  el.innerHTML=cart.map((item,i)=>`
    <div class="cart-item">
      <div style="min-width:0;flex:1;">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">₹${Number(item.price).toLocaleString('en-IN')} each${item.sku?` · ${item.sku}`:''}</div>
      </div>
      <div class="ci-qty">
        <button class="ci-btn minus" onclick="changeQty(${i},-1)">−</button>
        <span class="ci-qty-val">${item.qty}</span>
        <button class="ci-btn plus" onclick="changeQty(${i},1)">+</button>
      </div>
      <div class="ci-total">₹${Number(item.total).toLocaleString('en-IN')}</div>
      <svg class="ci-del" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" onclick="removeFromCart(${i})"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    </div>`).join('');
}

function calcTotals(){
  const subtotal=cart.reduce((s,i)=>s+i.total,0);
  const discVal=parseFloat(document.getElementById('discVal').value)||0;
  const discType=document.getElementById('discType').value;
  const discAmt=discType==='pct'?subtotal*(discVal/100):Math.min(discVal,subtotal);
  const afterDisc=subtotal-discAmt;
  const taxAmt=afterDisc*0.05; // 5% GST
  const total=afterDisc+taxAmt;

  document.getElementById('sumItems').textContent=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('sumSub').textContent='₹'+subtotal.toLocaleString('en-IN');
  document.getElementById('sumDisc').textContent='-₹'+discAmt.toFixed(2);
  document.getElementById('sumTax').textContent='₹'+taxAmt.toFixed(2);
  document.getElementById('sumTotal').textContent='₹'+total.toFixed(2);

  if(cart.length>0){
    document.getElementById('chargeBtn').disabled=false;
    document.getElementById('chargeBtn').textContent='Charge ₹'+total.toFixed(2);
  }
  updateUpiQR(total);
  calcChange();
  return{subtotal,discAmt,taxAmt,total,discVal,discType};
}

function calcChange(){
  const totalStr=document.getElementById('sumTotal').textContent.replace('₹','').replace(/,/g,'');
  const total=parseFloat(totalStr)||0;
  const paid=parseFloat(document.getElementById('cashPaid').value)||0;
  if(paid>0&&paid>=total){
    document.getElementById('changeAmt').textContent='Change: ₹'+(paid-total).toFixed(2);
  }else{
    document.getElementById('changeAmt').textContent='';
  }
}

function calcSplit(){
  const totalStr=document.getElementById('sumTotal').textContent.replace('₹','').replace(/,/g,'');
  const total=parseFloat(totalStr)||0;
  const cash=parseFloat(document.getElementById('splitCash').value)||0;
  const upi=parseFloat(document.getElementById('splitUPI').value)||0;
  const due=total-cash-upi;
  const row=document.getElementById('sumDueRow');
  if(due>0.01){row.style.display='flex';document.getElementById('sumDue').textContent='₹'+due.toFixed(2);}
  else row.style.display='none';
}

// ── PAYMENT ────────────────────────────────────────────────
function setPayMethod(method,el){
  payMethod=method;
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  document.getElementById('upiBox').classList.toggle('show',method==='upi');
  document.getElementById('splitRow').classList.toggle('show',method==='split');
  document.getElementById('cashPaidRow').style.display=method==='cash'?'flex':'none';
}

function updateUpiQR(amount){
  const box=document.getElementById('upiQR');
  const upiStr=`upi://pay?pa=8301879406@ybl&pn=WellFix+Appliances&am=${amount.toFixed(2)}&cu=INR`;
  // Simple QR using public API
  box.innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(upiStr)}" style="width:100px;height:100px;" alt="UPI QR">`;
}

// ── CHARGE ─────────────────────────────────────────────────
async function chargeBill(){
  if(!cart.length){toast('Cart is empty',true);return;}
  const{subtotal,discAmt,taxAmt,total,discVal,discType}=calcTotals();
  const btn=document.getElementById('chargeBtn');
  btn.textContent='Processing…';btn.disabled=true;

  // Generate invoice number
  const inv=await generateInvoiceNumber();
  const ref=payMethod==='upi'?document.getElementById('upiRef').value:
             payMethod==='split'?`Cash+UPI Split`:'';

  const payload={
    invoice_number:inv,
    invoice_type:currentMode==='return'?'return':'sale',
    customer_id:currentCustomer?.id||null,
    customer_name:currentCustomer?.name||document.getElementById('custSearch').value||'Walk-in Customer',
    customer_phone:currentCustomer?.phone||null,
    subtotal,discount_amount:discAmt,
    discount_pct:discType==='pct'?discVal:0,
    tax_amount:taxAmt,tax_pct:5,
    total,paid_amount:total,due_amount:0,
    payment_method:payMethod,
    payment_reference:ref||null,
    payment_status:'paid',
    cashier:AdminShell.user?.profile?.name||'Admin',
    status:'completed',
  };

  try{
    const{data:inv_data,error}=await db.from('pos_invoices').insert(payload).select().single();
    if(error)throw error;

    // Insert items
    const items=cart.map(i=>({invoice_id:inv_data.id,product_id:i.id,product_name:i.name,sku:i.sku,quantity:i.qty,unit_price:i.price,total_price:i.total}));
    await db.from('pos_invoice_items').insert(items);

    // Deduct stock
    for(const i of cart){
      const{data:p}=await db.from('products').select('stock_qty').eq('id',i.id).single();
      if(p)await db.from('products').update({stock_qty:Math.max(0,(p.stock_qty||0)-i.qty)}).eq('id',i.id);
    }

    // Update customer loyalty (1 pt per ₹100)
    if(currentCustomer?.id){
      const pts=Math.floor(total/100);
      const newTier=total>=50000?'platinum':total>=20000?'gold':total>=5000?'silver':'bronze';
      await db.from('customers').update({
        loyalty_points:(currentCustomer.loyalty_points||0)+pts,
        total_orders:db.rpc?undefined:undefined,
        last_order_at:new Date().toISOString(),
      }).eq('id',currentCustomer.id);
    }

    // Also create an order record
    const orderNum='WF-'+Date.now().toString().slice(-6);
    await db.from('orders').insert({
      order_number:orderNum,
      customer_name:payload.customer_name,
      customer_phone:payload.customer_phone||null,
      total,subtotal,
      payment_method:payMethod,
      payment_status:'paid',
      status:'delivered',
      notes:'POS Invoice: '+inv,
    });

    toast('Invoice '+inv+' — Billed ₹'+total.toFixed(2));
    printReceipt(inv_data,cart,payload);
    clearCart();
    currentCustomer=null;
    document.getElementById('custSearch').value='';
    document.getElementById('custFound').style.display='none';
  }catch(e){
    toast('Billing error: '+e.message,true);
  }finally{
    btn.disabled=false;calcTotals();
  }
}

async function generateInvoiceNumber(){
  const{count}=await db.from('pos_invoices').select('*',{count:'exact',head:true});
  const n=(count||0)+1;
  const d=new Date();
  const yr=d.getFullYear().toString().slice(-2);
  const mo=String(d.getMonth()+1).padStart(2,'0');
  return `WF-POS-${yr}${mo}-${String(n).padStart(4,'0')}`;
}

// ── RECEIPT PRINT ──────────────────────────────────────────
function printReceipt(inv,cartItems,meta){
  const win=window.open('','_blank','width=380,height=600');
  win.document.write(`<html><head><title>Invoice ${inv.invoice_number}</title><style>
    body{font-family:'Courier New',monospace;font-size:12px;padding:16px;max-width:300px;}
    h2{text-align:center;font-size:16px;margin:0;}

    .d{border-top:1px dashed #999;margin:8px 0;}
    .r{display:flex;justify-content:space-between;margin:3px 0;}
    .b{font-weight:900;font-size:14px;}
    @media print{button{display:none;}}
  </style></head><body>
    <h2>WellFix Appliances</h2>
    <div class="c">Kerala, India · 8590004349<br>wellfixappliances@gmail.com<br>GST: WF2025KERALA01</div>
    <div class="d"></div>
    <div class="r"><span>Invoice</span><span><b>${inv.invoice_number}</b></span></div>
    <div class="r"><span>Date</span><span>${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span></div>
    <div class="r"><span>Customer</span><span>${meta.customer_name}</span></div>
    <div class="r"><span>Payment</span><span>${(meta.payment_method||'cash').toUpperCase()}</span></div>
    <div class="d"></div>
    ${cartItems.map(i=>`<div><b>${i.name}</b><div class="r"><span>${i.qty} × ₹${i.price.toLocaleString('en-IN')}</span><span>₹${i.total.toLocaleString('en-IN')}</span></div></div>`).join('')}
    <div class="d"></div>
    <div class="r"><span>Subtotal</span><span>₹${meta.subtotal.toLocaleString('en-IN')}</span></div>
    ${meta.discount_amount>0?`<div class="r"><span>Discount</span><span>-₹${meta.discount_amount.toFixed(2)}</span></div>`:''}
    <div class="r"><span>GST (5%)</span><span>₹${meta.tax_amount.toFixed(2)}</span></div>
    <div class="d"></div>
    <div class="r b"><span>TOTAL</span><span>₹${meta.total.toFixed(2)}</span></div>
    <div class="d"></div>
    <div class="c" style="margin-top:12px;">Thank you for shopping at WellFix!<br>UPI: 8301879406@ybl<br>Returns accepted within 7 days</div>
    <button onclick="window.print()" style="margin-top:14px;width:100%;padding:8px;background:#034732;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-size:13px;">Print Receipt</button>
  </body></html>`);
  win.document.close();
}

// ── HOLD / RESUME ──────────────────────────────────────────
function holdBill(){
  if(!cart.length){toast('Cart is empty',true);return;}
  const held={id:Date.now(),items:[...cart],customer:currentCustomer,time:new Date().toLocaleTimeString()};
  heldBills.push(held);
  clearCart();
  document.getElementById('holdCount').textContent=heldBills.length;
  renderHoldList();
  toast('Bill held');
}

function resumeBill(id){
  const idx=heldBills.findIndex(b=>b.id===id);if(idx<0)return;
  const held=heldBills.splice(idx,1)[0];
  cart=held.items;currentCustomer=held.customer;
  if(currentCustomer){
    document.getElementById('custSearch').value=currentCustomer.name;
    document.getElementById('custFound').textContent=`${currentCustomer.name} · ${currentCustomer.phone} · ${currentCustomer.loyalty_points||0} pts`;
    document.getElementById('custFound').style.display='block';
  }
  renderCart();calcTotals();
  document.getElementById('holdCount').textContent=heldBills.length;
  renderHoldList();closeHoldDrawer();
}

function renderHoldList(){
  const el=document.getElementById('holdList');
  if(!heldBills.length){el.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--gray-400);">No held bills</div>';return;}
  el.innerHTML=heldBills.map(b=>`
    <div class="hold-item" onclick="resumeBill(${b.id})">
      <div class="hold-item-name">${b.customer?.name||'Walk-in'} · ${b.items.length} items</div>
      <div class="hold-item-meta">₹${b.items.reduce((s,i)=>s+i.total,0).toLocaleString('en-IN')} · Held at ${b.time}</div>
    </div>`).join('');
}

function loadHeldBills(){
  const saved=localStorage.getItem('wf_held_bills');
  if(saved)try{heldBills=JSON.parse(saved);}catch(e){}
  document.getElementById('holdCount').textContent=heldBills.length;
  renderHoldList();
}

function clearCart(){
  cart=[];renderCart();calcTotals();
  document.getElementById('discVal').value=0;
  localStorage.setItem('wf_held_bills',JSON.stringify(heldBills));
}

// ── CUSTOMER ───────────────────────────────────────────────
function searchCustomer(){
  const q=document.getElementById('custSearch').value.toLowerCase();
  if(q.length<2){document.getElementById('custFound').style.display='none';currentCustomer=null;return;}
  const found=allCustomers.find(c=>c.name.toLowerCase().includes(q)||c.phone?.includes(q));
  if(found){
    currentCustomer=found;
    document.getElementById('custFound').textContent=`${found.name} · ${found.phone} · ${found.loyalty_points||0} pts · ${found.loyalty_tier||'bronze'}`;
    document.getElementById('custFound').style.display='block';
  }else{
    currentCustomer=null;
    document.getElementById('custFound').style.display='none';
  }
}

// ── QUICK CUSTOMER ─────────────────────────────────────────
function openQuickCust(){document.getElementById('qcOverlay').style.display='flex';}
function closeQC(){document.getElementById('qcOverlay').style.display='none';}
async function saveQC(){
  const name=document.getElementById('qcName').value.trim();
  const phone=document.getElementById('qcPhone').value.trim();
  if(!name||!phone){toast('Name and phone required',true);return;}
  const{data,error}=await db.from('customers').insert({name,phone,email:document.getElementById('qcEmail').value||null,source:'pos'}).select().single();
  if(error){toast('Error: '+error.message,true);return;}
  allCustomers.push(data);
  currentCustomer=data;
  document.getElementById('custSearch').value=name;
  document.getElementById('custFound').textContent=`${name} · ${phone} · New Customer`;
  document.getElementById('custFound').style.display='block';
  closeQC();toast('Customer added');
}

// ── MANUAL ITEM ────────────────────────────────────────────
function openManualItem(){document.getElementById('qaOverlay').style.display='flex';}
function closeQA(){document.getElementById('qaOverlay').style.display='none';}
function quickAddProduct(){document.getElementById('qaOverlay').style.display='flex';}
function addManualItem(){
  const name=document.getElementById('qaName').value.trim();
  const price=parseFloat(document.getElementById('qaPrice').value)||0;
  const qty=parseInt(document.getElementById('qaQty').value)||1;
  if(!name||!price){toast('Name and price required',true);return;}
  cart.push({id:'manual-'+Date.now(),name,sku:'MANUAL',price,qty,total:price*qty,stock:9999});
  renderCart();calcTotals();closeQA();
  document.getElementById('qaName').value='';document.getElementById('qaPrice').value='';document.getElementById('qaQty').value=1;
}

async function openShiftModal(){
  const today=new Date();today.setHours(0,0,0,0);
  const{data:invs}=await db.from('pos_invoices').select('total,payment_method').gte('created_at',today.toISOString()).eq('status','completed');
  const invList=invs||[];
  const totalRev=invList.reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  const cashRev=invList.filter(i=>i.payment_method==='cash').reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  const upiRev=invList.filter(i=>i.payment_method==='upi').reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  document.getElementById('shiftBody').innerHTML=`
    <div class="shift-box">
      <div class="shift-box-title">Today's Summary</div>
      <div class="shift-stat"><span>Total Invoices</span><span class="shift-stat-val">${invList.length}</span></div>
      <div class="shift-stat"><span>Total Revenue</span><span class="shift-stat-val" style="color:var(--green-700);">₹${totalRev.toLocaleString('en-IN')}</span></div>
      <div class="shift-stat"><span>Cash Collection</span><span class="shift-stat-val">₹${cashRev.toLocaleString('en-IN')}</span></div>
      <div class="shift-stat"><span>UPI Collection</span><span class="shift-stat-val">₹${upiRev.toLocaleString('en-IN')}</span></div>
    </div>`;
  document.getElementById('shiftOverlay').style.display='flex';
}

document.addEventListener('keydown',e=>{

    if(e.key==='Enter'){e.preventDefault();chargeBill();}
    if(e.key==='h'){e.preventDefault();holdBill();}
