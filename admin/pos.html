<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Point of Sale — WellFix</title>
<link rel="icon" href="../frontend/assets/images/WELLFIX-FAVICON.png">
<link rel="stylesheet" href="assets/css/admin.css">
<style>
/* ═══════════════════════════════════════════════════════
   WELLFIX POS — NEXT-GEN BILLING SYSTEM
   Scoped entirely — zero impact on other admin pages
   ═══════════════════════════════════════════════════════ */
/* POS full-screen overrides */
#mainWrap{padding:0!important;margin-left:0!important;width:100vw!important;}
.topbar{display:none!important;}
.sidebar{display:none!important;}
.mobile-bottom-nav{display:none!important;}
.sidebar-overlay{display:none!important;}
#posRoot{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
  min-height:0;
  width:100%;
}

/* ── TOP BAR ── */
.pos-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border-bottom:1px solid var(--gray-100);flex-shrink:0;flex-wrap:wrap;}
.pos-bar-l{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
.pos-bar-r{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pos-seg{display:flex;background:var(--gray-50);border:1px solid var(--gray-150,#dedede);border-radius:6px;padding:2px;}
.pos-seg-btn{padding:5px 14px;border-radius:4px;font-size:11px;font-weight:700;color:var(--gray-500);cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;}
.pos-seg-btn.on{background:#fff;color:var(--gray-900);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.pos-invoice-num{font-family:monospace;font-size:11px;font-weight:700;color:var(--green-700);background:var(--green-50);border:1px solid var(--green-100);border-radius:4px;padding:3px 8px;}
.pos-back-btn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--gray-500);background:var(--gray-50);border:1px solid var(--gray-200);border-radius:5px;padding:5px 10px;cursor:pointer;transition:all .15s;text-decoration:none;}
.pos-back-btn:hover{color:var(--gray-900);border-color:var(--gray-300);}
.pos-back-btn svg{width:12px;height:12px;}

/* ── LAYOUT ── */
.pos-layout{display:grid;grid-template-columns:1fr 380px;flex:1;overflow:hidden;min-height:0;height:0;}
@media(max-width:960px){.pos-layout{grid-template-columns:1fr;}}

/* ── LEFT PANEL ── */
.pos-left{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--gray-100);}

/* Search */
.pos-search-strip{padding:10px 12px;background:#fff;border-bottom:1px solid var(--gray-100);display:flex;gap:6px;align-items:center;flex-shrink:0;}
.pos-srch-wrap{position:relative;flex:1;}
.pos-srch-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--gray-400);fill:none;stroke-width:2;pointer-events:none;}
.pos-srch{width:100%;height:36px;border:1.5px solid var(--gray-200);border-radius:7px;padding:0 10px 0 32px;font-size:12px;font-family:var(--font-body);background:var(--gray-25);transition:border .15s;}
.pos-srch:focus{outline:none;border-color:var(--green-500);background:#fff;}
.pos-scan-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--green-700);background:var(--green-50);border:1px solid var(--green-200);border-radius:4px;padding:3px 7px;flex-shrink:0;}
.pos-scan-badge svg{width:12px;height:12px;}

/* Category pills */
.pos-cat-strip{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--gray-50);}
.pos-cat-strip::-webkit-scrollbar{display:none;}
.pos-pill{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-150,#dedede);background:#fff;color:var(--gray-500);transition:all .12s;white-space:nowrap;flex-shrink:0;}
.pos-pill.on{border-color:var(--green-700);background:var(--green-700);color:#fff;}

/* Products */
.pos-prods{flex:1;overflow-y:auto;padding:10px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;align-content:start;overscroll-behavior:contain;}
.pos-prods::-webkit-scrollbar{width:4px;}
.pos-prods::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:99px;}

.pc{background:#fff;border:1.5px solid var(--gray-100);border-radius:9px;overflow:hidden;cursor:pointer;transition:all .12s;user-select:none;position:relative;}
.pc:hover{border-color:var(--green-400);box-shadow:0 2px 10px rgba(5,107,75,.1);}
.pc:active{transform:scale(.96);}
.pc.out{opacity:.4;cursor:not-allowed;pointer-events:none;}
.pc-img{width:100%;aspect-ratio:1;background:var(--gray-25);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:contain;padding:5px;}
.pc-img-ico{width:24px;height:24px;color:var(--gray-200);}
.pc-body{padding:6px 8px 7px;}
.pc-name{font-size:10px;font-weight:700;color:var(--gray-900);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pc-price{font-family:var(--font-display);font-size:12px;font-weight:800;color:var(--green-700);margin-top:3px;}
.pc-stock{font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;display:inline-block;margin-top:2px;}
.pc-stock.ok{background:#f0fdf4;color:#15803d;}
.pc-stock.low{background:#fff7ed;color:#c2410c;}
.pc-stock.out{background:#fef2f2;color:#dc2626;}
.pc-add{position:absolute;bottom:0;left:0;right:0;height:24px;background:var(--green-700);color:#fff;border:none;font-size:10px;font-weight:700;cursor:pointer;opacity:0;transition:opacity .12s;}
.pc:hover .pc-add{opacity:1;}

/* ── RIGHT PANEL ── */
.pos-right{display:flex;flex-direction:column;background:#fff;overflow:hidden;}

/* Customer row */
.pos-cust{padding:8px 12px;border-bottom:1px solid var(--gray-100);flex-shrink:0;}
.pos-cust-inner{display:flex;gap:6px;align-items:center;}
.pos-cust-inp{flex:1;height:32px;border:1.5px solid var(--gray-200);border-radius:6px;padding:0 10px;font-size:11px;background:var(--gray-25);}
.pos-cust-inp:focus{outline:none;border-color:var(--green-400);}
.pos-cust-tag{font-size:10px;font-weight:700;color:var(--green-700);background:var(--green-50);border:1px solid var(--green-100);border-radius:4px;padding:2px 6px;margin-top:4px;display:none;}

/* Cart */
.pos-cart{flex:1;overflow-y:auto;overscroll-behavior:contain;}
.pos-cart::-webkit-scrollbar{width:3px;}
.pos-cart::-webkit-scrollbar-thumb{background:var(--gray-100);}
.ci{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--gray-50);transition:background .1s;}
.ci:hover{background:var(--gray-25);}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:11px;font-weight:700;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-sub{font-size:10px;color:var(--gray-400);margin-top:1px;}
.ci-qty{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.ciq-btn{width:20px;height:20px;border-radius:4px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;font-size:12px;font-weight:700;color:var(--gray-600);display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1;}
.ciq-btn:hover{background:var(--gray-100);}
.ciq-val{width:24px;text-align:center;font-size:11px;font-weight:800;}
.ci-amt{font-family:var(--font-display);font-size:12px;font-weight:800;width:48px;text-align:right;flex-shrink:0;}
.ci-x{width:14px;height:14px;color:var(--gray-300);cursor:pointer;flex-shrink:0;}
.ci-x:hover{color:#ef4444;}
.cart-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;color:var(--gray-300);text-align:center;}
.cart-empty-state svg{width:32px;height:32px;margin-bottom:8px;}
.cart-empty-state p{font-size:11px;line-height:1.6;}

/* Summary */
.pos-sum{padding:10px 12px;border-top:1px solid var(--gray-100);background:var(--gray-25);flex-shrink:0;}
.sr{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--gray-600);padding:2px 0;}
.sr.grand{font-family:var(--font-display);font-size:15px;font-weight:800;color:var(--gray-900);padding-top:6px;border-top:1px solid var(--gray-200);margin-top:4px;}
.disc-ctrl{display:flex;align-items:center;gap:5px;}
.disc-num{width:52px;height:22px;border:1px solid var(--gray-200);border-radius:4px;text-align:center;font-size:11px;padding:0 3px;}
.disc-num:focus{outline:none;border-color:var(--green-400);}
.disc-sel{height:22px;border:1px solid var(--gray-200);border-radius:4px;font-size:10px;padding:0 3px;}

/* Payment */
.pos-pay{padding:8px 12px;border-top:1px solid var(--gray-100);flex-shrink:0;}
.pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:8px;}
.pay-opt{padding:6px 4px;border:1.5px solid var(--gray-150,#dedede);border-radius:7px;font-size:10px;font-weight:700;color:var(--gray-500);cursor:pointer;text-align:center;background:#fff;transition:all .12s;}
.pay-opt:hover{border-color:var(--gray-300);}
.pay-opt.on{border-color:var(--green-700);background:var(--green-700);color:#fff;}
.pay-opt svg{width:13px;height:13px;display:block;margin:0 auto 2px;stroke:currentColor;fill:none;stroke-width:2;}

/* UPI box */
.upi-box{display:none;background:var(--gray-25);border:1px solid var(--gray-100);border-radius:7px;padding:10px 12px;text-align:center;margin-bottom:8px;}
.upi-box.show{display:block;}
.upi-qr-img{width:90px;height:90px;margin:4px auto;}
.upi-id{font-family:monospace;font-size:11px;font-weight:700;color:var(--green-700);margin-top:3px;}

/* Cash row */
.cash-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.cash-inp{flex:1;height:30px;border:1.5px solid var(--gray-200);border-radius:5px;padding:0 8px;font-size:12px;font-family:var(--font-body);}
.cash-inp:focus{outline:none;border-color:var(--green-400);}
.change-tag{font-size:11px;font-weight:700;color:var(--green-700);min-width:70px;text-align:right;white-space:nowrap;}

/* Ref input */
.ref-inp{width:100%;height:28px;border:1px solid var(--gray-200);border-radius:5px;padding:0 8px;font-size:11px;margin-bottom:8px;font-family:var(--font-body);display:none;}
.ref-inp.show{display:block;}
.ref-inp:focus{outline:none;border-color:var(--green-400);}

/* Action strip */
.pos-actions{display:grid;grid-template-columns:1fr 1fr 2fr;gap:6px;padding:8px 12px;flex-shrink:0;border-top:1px solid var(--gray-50);}
.pa{height:40px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;font-family:var(--font-body);}
.pa svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
.pa.hold{background:var(--gray-100);color:var(--gray-700);}
.pa.hold:hover{background:var(--gray-200);}
.pa.clr{background:#fef2f2;color:#dc2626;}
.pa.clr:hover{background:#fecaca;}
.pa.charge{background:var(--green-700);color:#fff;font-size:13px;font-family:var(--font-display);}
.pa.charge:hover{background:var(--green-600);}
.pa.charge:disabled{opacity:.45;cursor:not-allowed;}

/* ── HELD BILLS DRAWER ── */
.hold-drw{position:fixed;top:var(--topbar-h,56px);right:0;bottom:0;width:300px;background:#fff;border-left:1px solid var(--gray-100);z-index:90;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);box-shadow:-6px 0 24px rgba(0,0,0,.08);}
.hold-drw.open{transform:translateX(0);}
.hold-drw-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--gray-100);}
.hold-drw-title{font-family:var(--font-display);font-size:13px;font-weight:700;}
.hold-item{padding:10px 14px;border-bottom:1px solid var(--gray-50);cursor:pointer;transition:background .1s;}
.hold-item:hover{background:var(--gray-25);}
.hold-item-name{font-size:12px;font-weight:700;color:var(--gray-900);}
.hold-item-meta{font-size:10px;color:var(--gray-400);margin-top:2px;}

/* ── INVOICE LIST ── */
.inv-tbl-sm{width:100%;border-collapse:collapse;font-size:12px;}
.inv-tbl-sm th{padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray-400);border-bottom:1px solid var(--gray-100);text-align:left;}
.inv-tbl-sm td{padding:7px 12px;border-bottom:1px solid var(--gray-50);}

/* ── MOBILE ── */
.mob-cart-fab{display:none;position:fixed;bottom:16px;right:16px;width:54px;height:54px;border-radius:99px;background:var(--green-700);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(3,71,50,.35);flex-direction:column;align-items:center;justify-content:center;gap:0;z-index:40;font-family:var(--font-display);}
.mob-cart-fab-n{font-size:17px;font-weight:800;line-height:1;}
.mob-cart-fab-l{font-size:9px;font-weight:600;opacity:.8;}
@media(max-width:960px){.mob-cart-fab{display:flex;}.pos-right{display:none;}.pos-layout.bill-view .pos-left{display:none;}.pos-layout.bill-view .pos-right{display:flex;}}

/* ── QUICK CUSTOMER MODAL ── */
.qmod{max-width:340px;width:100%;margin:auto;}

/* ── SHIFT ── */
.sstat{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--gray-50);font-size:12px;}
.sstat:last-child{border-bottom:none;}
.sstat-v{font-weight:800;font-family:var(--font-display);}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:5px;}
@keyframes sk{to{background-position:-200% 0;}}
</style>
</head>
<body>
<div class="admin-shell"><div id="adminShell"></div>
<div class="main-wrap" id="mainWrap">
<div id="posRoot">

<!-- TOP BAR — minimal, nothing clips -->
<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:#fff;border-bottom:1px solid var(--gray-100);flex-shrink:0;flex-wrap:wrap;">
  <!-- Back button -->
  <a href="dashboard.html" style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--gray-500);background:var(--gray-50);border:1px solid var(--gray-200);border-radius:5px;padding:4px 9px;text-decoration:none;flex-shrink:0;">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="11" height="11"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
  <!-- Mode selector -->
  <div style="display:flex;background:var(--gray-50);border:1px solid var(--gray-150,#dedede);border-radius:6px;padding:2px;gap:1px;flex-shrink:0;">
    <button class="pos-seg-btn on" id="mb-sale" onclick="setMode('sale',this)">Sale</button>
    <button class="pos-seg-btn" id="mb-quote" onclick="setMode('quote',this)">Quotation</button>
    <button class="pos-seg-btn" id="mb-return" onclick="setMode('return',this)">Return</button>
    <button class="pos-seg-btn" id="mb-refund" onclick="setMode('refund',this)">Refund</button>
  </div>
  <!-- Invoice number -->
  <span id="invNumDisplay" style="font-family:monospace;font-size:11px;font-weight:700;color:var(--green-700);background:var(--green-50);border:1px solid var(--green-100);border-radius:4px;padding:3px 8px;flex-shrink:0;">…</span>
  <!-- Right actions -->
  <div style="display:flex;align-items:center;gap:6px;margin-left:auto;flex-wrap:wrap;">
    <button class="btn btn-sm btn-outline" onclick="toggleHoldDrawer()">Held <span id="holdCnt" style="font-size:10px;font-weight:800;color:var(--green-700);">0</span></button>
    <button class="btn btn-sm btn-outline" onclick="openShift()">Shift</button>
    <button class="btn btn-sm btn-outline" onclick="openInvList()">Invoices</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="pos-layout" id="posLayout">

  <!-- LEFT -->
  <div class="pos-left">
    <div class="pos-search-strip">
      <div class="pos-srch-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="pos-srch" id="posSearch" type="search" placeholder="Search product, SKU or scan barcode…" oninput="onSearch()" autocomplete="off">
      </div>
      <div class="pos-scan-badge">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9V4a1 1 0 011-1h4M3 15v5a1 1 0 001 1h4m10-1h4a1 1 0 001-1v-4M21 9V4a1 1 0 00-1-1h-4M8 4v16M12 4v16M16 4v16"/></svg>
        Scanner Active
      </div>
      <button class="btn btn-sm btn-outline" style="height:36px;font-size:11px;white-space:nowrap;" onclick="openManual()">+ Manual</button>
    </div>
    <div class="pos-cat-strip" id="posCats"><div class="pos-pill on" onclick="filterCat('',this)">All</div></div>
    <div class="pos-prods" id="posProds">
      <div class="pc"><div class="sk" style="height:170px;border-radius:8px;"></div></div>
      <div class="pc"><div class="sk" style="height:170px;border-radius:8px;"></div></div>
      <div class="pc"><div class="sk" style="height:170px;border-radius:8px;"></div></div>
      <div class="pc"><div class="sk" style="height:170px;border-radius:8px;"></div></div>
      <div class="pc"><div class="sk" style="height:170px;border-radius:8px;"></div></div>
      <div class="pc"><div class="sk" style="height:170px;border-radius:8px;"></div></div>
    </div>
  </div>

  <!-- RIGHT: BILL -->
  <div class="pos-right" id="posBillPanel">
    <div class="pos-cust">
      <div class="pos-cust-inner">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="13" height="13" style="color:var(--gray-400);flex-shrink:0;"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input class="pos-cust-inp" id="custInp" placeholder="Customer name or phone…" oninput="onCustSearch()" autocomplete="off">
        <button class="btn btn-sm btn-outline" style="height:30px;padding:0 8px;font-size:10px;flex-shrink:0;" onclick="openQC()">+ New</button>
      </div>
      <div class="pos-cust-tag" id="custTag"></div>
    </div>

    <div class="pos-cart" id="posCart">
      <div class="cart-empty-state">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <p>Cart is empty<br>Tap any product to add</p>
      </div>
    </div>

    <div class="pos-sum">
      <div class="sr"><span>Items</span><span id="sItems">0</span></div>
      <div class="sr"><span>Subtotal</span><span id="sSub">₹0</span></div>
      <div class="sr">
        <div class="disc-ctrl">
          <span>Discount</span>
          <input class="disc-num" id="discN" type="number" value="0" min="0" oninput="calc()">
          <select class="disc-sel" id="discT" onchange="calc()"><option value="pct">%</option><option value="flat">₹</option></select>
        </div>
        <span id="sDisc" style="color:#ef4444;">-₹0</span>
      </div>
      <div class="sr" id="gstRow">
        <div style="display:flex;align-items:center;gap:5px;">
          <label class="tog" style="cursor:pointer;" title="Toggle GST">
            <input type="checkbox" id="gstToggle" checked onchange="calc()" style="display:none;">
            <span class="tog-tr"></span>
          </label>
          <span>GST</span>
          <select id="gstRate" onchange="calc()" style="height:20px;border:1px solid var(--gray-200);border-radius:3px;font-size:10px;padding:0 3px;">
            <option value="0">0%</option>
            <option value="5" selected>5%</option>
            <option value="12">12%</option>
            <option value="18">18%</option>
            <option value="28">28%</option>
          </select>
        </div>
        <span id="sTax">₹0</span>
      </div>
      <div class="sr grand"><span>TOTAL</span><span id="sTotal">₹0.00</span></div>
    </div>

    <div class="pos-pay">
      <div class="pay-grid">
        <div class="pay-opt on" id="po-cash" onclick="setPay('cash',this)">
          <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>Cash
        </div>
        <div class="pay-opt" id="po-upi" onclick="setPay('upi',this)">
          <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>UPI
        </div>
        <div class="pay-opt" id="po-card" onclick="setPay('card',this)">
          <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Card
        </div>

<script>
'use strict';

// ── STATE ──────────────────────────────────────────────────
let allProds=[], allCats=[], allCusts=[];
let cart=[], cust=null, payMethod='cash', mode='sale';
let held=[], filtProds=[], catId='';
let bbuf='', btimer=null;
const UPI='8301879406@ybl';

// ── BOOT ──────────────────────────────────────────────────
(async()=>{
  await AdminShell.init('Point of Sale','pos');

  // POS needs full screen — collapse sidebar automatically
  const sidebar = document.getElementById('sidebar');
  const topbar  = document.getElementById('topbar');
  const mainWrap = document.getElementById('mainWrap');
  if(sidebar && window.innerWidth > 900) {
    sidebar.classList.add('is-collapsed');
    if(topbar) topbar.classList.add('is-expanded');
    if(mainWrap) mainWrap.classList.add('is-expanded');
  }
  if(sidebar && window.innerWidth <= 900) {
    sidebar.classList.remove('is-mobile-open');
  }

  genInvNum();
  await Promise.all([loadProds(),loadCats(),loadCusts()]);
  setupScanner();
  restoreHeld();
})();

async function loadProds(){
  const{data}=await db.from('products')
    .select('id,name,sku,price,mrp,stock_qty,low_stock_threshold,category_id,images:product_images(url,is_primary)')
    .eq('is_active',true).order('name');
  allProds=data||[];filtProds=allProds;
  renderProds(allProds);
}
async function loadCats(){
  const{data}=await db.from('categories').select('id,name').eq('is_active',true).order('sort_order');
  allCats=data||[];
  const el=document.getElementById('posCats');
  el.innerHTML='<div class="pos-pill on" onclick="filterCat(\'\',this)">All</div>'+
    allCats.map(c=>`<div class="pos-pill" onclick="filterCat('${c.id}',this)">${c.name}</div>`).join('');
}
async function loadCusts(){
  const{data}=await db.from('customers').select('id,name,phone,loyalty_points,loyalty_tier').order('name');
  allCusts=data||[];
}
async function genInvNum(){
  // Use timestamp + random to guarantee uniqueness
  const d=new Date();
  const ts=d.getTime().toString().slice(-6);
  const rand=Math.random().toString(36).slice(2,5).toUpperCase();
  const code=`WF-${d.getFullYear().toString().slice(-2)}${String(d.getMonth()+1).padStart(2,'0')}-${ts}${rand}`;
  document.getElementById('invNumDisplay').textContent=code;
  return code;
}

// ── PRODUCTS ──────────────────────────────────────────────
function renderProds(list){
  const el=document.getElementById('posProds');
  if(!list.length){
    el.innerHTML='<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--gray-300);font-size:12px;">No products found</div>';
    return;
  }
  el.innerHTML=list.map(p=>{
    const img=p.images?.find(i=>i.is_primary)?.url||p.images?.[0]?.url||'';
    const qty=p.stock_qty||0, thr=p.low_stock_threshold||5;
    const sc=qty===0?'out':qty<=thr?'low':'ok';
    const sl=qty===0?'Out':qty<=thr?qty+' left':qty+'';
    return`<div class="pc${qty===0?' out':''}" onclick="${qty>0?`addItem('${p.id}')`:''}" id="pc-${p.id}">
      <div class="pc-img">
        ${img?`<img src="${img}" loading="lazy" alt="">`:`<svg class="pc-img-ico" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>`}
      </div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div class="pc-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
        <span class="pc-stock ${sc}">${sl}</span>
      </div>
      ${qty>0?`<button class="pc-add" onclick="event.stopPropagation();addItem('${p.id}')">+ Add</button>`:''}
    </div>`;
  }).join('');
}

function filterCat(id,el){
  catId=id;
  document.querySelectorAll('.pos-pill').forEach(p=>p.classList.remove('on'));el.classList.add('on');
  applyFilter();
}
function onSearch(){applyFilter();}
function applyFilter(){
  const q=document.getElementById('posSearch').value.toLowerCase();
  // Barcode exact match
  if(q.length>=3){const m=allProds.find(p=>p.sku?.toLowerCase()===q);if(m){addItem(m.id);document.getElementById('posSearch').value='';return;}}
  let l=allProds;
  if(catId)l=l.filter(p=>p.category_id===catId);
  if(q)l=l.filter(p=>p.name.toLowerCase().includes(q)||p.sku?.toLowerCase().includes(q));
  renderProds(l);
}

// ── BARCODE SCANNER ───────────────────────────────────────
function setupScanner(){
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
    if(e.key==='Enter'){
      if(bbuf.length>=3){
        const m=allProds.find(p=>p.sku===bbuf);
        if(m){addItem(m.id);toast('Scanned: '+m.name);}
        else toast('Not found: '+bbuf,true);
        bbuf='';
      }return;
    }
    if(e.key.length===1){bbuf+=e.key;clearTimeout(btimer);btimer=setTimeout(()=>{bbuf='';},300);}
  });
}

// ── CART ──────────────────────────────────────────────────
function addItem(id){
  const p=allProds.find(x=>x.id===id);if(!p)return;
  const ex=cart.find(i=>i.id===id);
  if(ex){if(ex.qty>=p.stock_qty){toast('Max stock',true);return;}ex.qty++;ex.total=ex.qty*ex.price;}
  else cart.push({id:p.id,name:p.name,sku:p.sku||'',price:+p.price,qty:1,total:+p.price,stock:p.stock_qty||0});
  renderCart();calc();
}
function removeItem(i){cart.splice(i,1);renderCart();calc();}
function qtyChange(i,d){
  const item=cart[i];if(!item)return;
  const nq=item.qty+d;
  if(nq<=0){removeItem(i);return;}
  if(nq>item.stock){toast('Max stock',true);return;}
  item.qty=nq;item.total=nq*item.price;
  renderCart();calc();
}

function renderCart(){
  const el=document.getElementById('posCart');
  document.getElementById('mobN').textContent=cart.length;
  if(!cart.length){
    el.innerHTML='<div class="cart-empty-state"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><p>Cart is empty<br>Tap any product to add</p></div>';
    document.getElementById('chargeBtn').disabled=true;
    document.getElementById('chargeBtn').textContent='Charge ₹0';
    return;
  }
  el.innerHTML=cart.map((item,i)=>`
    <div class="ci">
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-sub">₹${item.price.toLocaleString('en-IN')} × ${item.qty}${item.sku?' · '+item.sku:''}</div>
      </div>
      <div class="ci-qty">
        <button class="ciq-btn" onclick="qtyChange(${i},-1)">−</button>
        <span class="ciq-val">${item.qty}</span>
        <button class="ciq-btn" onclick="qtyChange(${i},1)">+</button>
      </div>
      <div class="ci-amt">₹${item.total.toLocaleString('en-IN')}</div>
      <svg class="ci-x" onclick="removeItem(${i})" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>`).join('');
}

// ── TOTALS ────────────────────────────────────────────────
function calc(){
  const sub=cart.reduce((s,i)=>s+i.total,0);
  const dn=parseFloat(document.getElementById('discN').value)||0;
  const dt=document.getElementById('discT').value;
  const da=dt==='pct'?sub*(dn/100):Math.min(dn,sub);
  const afterD=sub-da;
  const gstRate=parseFloat(document.getElementById('gstRate')?.value||'5')/100;
  const applyGST=document.getElementById('gstToggle')?.checked!==false;
  const tax=applyGST?afterD*gstRate:0;
  const tot=afterD+tax;
  document.getElementById('sItems').textContent=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('sSub').textContent='₹'+sub.toLocaleString('en-IN');
  document.getElementById('sDisc').textContent='-₹'+da.toFixed(2);
  const gstPct=parseFloat(document.getElementById('gstRate')?.value||'5');
  const gstOn=document.getElementById('gstToggle')?.checked!==false;
  document.getElementById('sTax').textContent=gstOn?'₹'+tax.toFixed(2):'Off';
  document.getElementById('gstRow').style.opacity=gstOn?'1':'0.5';
  document.getElementById('sTotal').textContent='₹'+tot.toFixed(2);
  if(cart.length){
    document.getElementById('chargeBtn').disabled=false;
    document.getElementById('chargeBtn').textContent='Charge ₹'+tot.toFixed(2);
  }
  if(payMethod==='upi'){
    document.getElementById('upiQRimg').innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=${encodeURIComponent('upi://pay?pa='+UPI+'&pn=WellFix+Appliances&am='+tot.toFixed(2)+'&cu=INR')}" style="width:90px;height:90px;" alt="UPI QR">`;
  }
  calcChange();
  return{sub,da,tax,tot,dn,dt};
}
function calcChange(){
  const tot=parseFloat((document.getElementById('sTotal').textContent||'₹0').replace('₹','').replace(/,/g,''))||0;
  const given=parseFloat(document.getElementById('cashGiven').value)||0;
  document.getElementById('changeTxt').textContent=given>=tot&&given>0?'Change: ₹'+(given-tot).toFixed(2):'';
}

// ── PAYMENT ───────────────────────────────────────────────
function setPay(m,el){
  payMethod=m;
  document.querySelectorAll('.pay-opt').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  document.getElementById('upiBox').classList.toggle('show',m==='upi');
  document.getElementById('cashRow').style.display=m==='cash'?'flex':'none';
  document.getElementById('refInp').classList.toggle('show',m==='upi'||m==='card');
  if(m==='upi')calc();
}

// ── CHARGE ────────────────────────────────────────────────
async function chargeBill(){
  if(!cart.length){toast('Cart is empty',true);return;}
  const{sub,da,tax,tot}=calc();
  const invCode=await genInvNum();
  const btn=document.getElementById('chargeBtn');
  const origText=btn.textContent;
  btn.textContent='Processing…';btn.disabled=true;

  try{
    const custName=cust?.name||document.getElementById('custInp').value||'Walk-in Customer';
    const gstPct=parseFloat(document.getElementById('gstRate')?.value||'5');
    const gstOn=document.getElementById('gstToggle')?.checked!==false;

    // Mode-specific invoice type + payment status
    const typeMap={sale:'sale',quote:'quotation',return:'return',refund:'refund'};
    const statusMap={sale:'completed',quote:'draft',return:'returned',refund:'completed'};
    const payStatusMap={sale:'paid',quote:'pending',return:'refunded',refund:'refunded'};

    const payload={
      invoice_number:invCode,
      invoice_type:typeMap[mode]||'sale',
      customer_id:cust?.id||null,
      customer_name:custName,
      customer_phone:cust?.phone||null,
      subtotal:sub,
      discount_amount:da,
      tax_amount:gstOn?tax:0,
      tax_pct:gstOn?gstPct:0,
      total:tot,
      paid_amount:mode==='quote'?0:tot,
      due_amount:mode==='quote'?tot:0,
      payment_method:payMethod,
      payment_reference:document.getElementById('refInp').value||null,
      payment_status:payStatusMap[mode]||'paid',
      cashier:AdminShell.user?.profile?.full_name||AdminShell.user?.email||'Admin',
      status:statusMap[mode]||'completed',
    };

    const{data:inv,error}=await db.from('pos_invoices').insert(payload).select().single();
    if(error)throw new Error(error.message);

    // Save items
    const{error:itemErr}=await db.from('pos_invoice_items').insert(
      cart.map(i=>({invoice_id:inv.id,product_id:i.id||null,product_name:i.name,sku:i.sku||null,quantity:i.qty,unit_price:i.price,total_price:i.total}))
    );
    if(itemErr)throw new Error(itemErr.message);

    // Stock: deduct on sale, restore on return
    if(mode==='sale'){
      for(const i of cart){
        if(!i.id||i.id.startsWith('m'))continue;
        const{data:p}=await db.from('products').select('stock_qty').eq('id',i.id).single();
        if(p)await db.from('products').update({stock_qty:Math.max(0,(p.stock_qty||0)-i.qty)}).eq('id',i.id);
      }
    } else if(mode==='return'){
      for(const i of cart){
        if(!i.id||i.id.startsWith('m'))continue;
        const{data:p}=await db.from('products').select('stock_qty').eq('id',i.id).single();
        if(p)await db.from('products').update({stock_qty:(p.stock_qty||0)+i.qty}).eq('id',i.id);
      }
    }

    // Loyalty points — only on sale
    if(mode==='sale'&&cust?.id){
      const pts=Math.floor(tot/100);
      await db.from('customers').update({
        loyalty_points:(cust.loyalty_points||0)+pts,
        last_order_at:new Date().toISOString()
      }).eq('id',cust.id);
    }

    // Create order record only for sales
    if(mode==='sale'){
      await db.from('orders').insert({
        order_number:invCode,
        customer_name:custName,
        customer_phone:cust?.phone||null,
        total:tot,subtotal:sub,
        payment_method:payMethod,
        payment_status:'paid',
        status:'delivered',
        notes:'POS Invoice: '+invCode
      });
    }

    // Open receipt/print
    openReceipt(inv,cart,payload,mode);
    const msgs={sale:'Invoice '+invCode+' — ₹'+tot.toFixed(2),quote:'Quotation '+invCode+' saved',return:'Return '+invCode+' processed',refund:'Refund '+invCode+' processed'};
    toast(msgs[mode]||'Done');
    clearBill();
    genInvNum();

  }catch(e){
    toast('Error: '+e.message,true);
    btn.disabled=false;
    btn.textContent=origText;
  }
  finally{
    if(!btn.disabled){btn.disabled=false;btn.textContent=origText;}
    calc();
  }
}

// ── RECEIPT ───────────────────────────────────────────────
function openReceipt(inv,items,meta,billMode='sale'){
  const w=window.open('','_blank','width=380,height=620');
  w.document.write(`<!DOCTYPE html><html><head><title>${inv.invoice_number}</title><style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Courier New',monospace;font-size:12px;padding:16px;max-width:300px;}
    h2{font-size:16px;text-align:center;font-weight:900;margin-bottom:2px;}
    .c{text-align:center;font-size:10px;color:#666;line-height:1.6;margin-bottom:10px;}
    .d{border-top:1px dashed #bbb;margin:8px 0;}
    .r{display:flex;justify-content:space-between;margin:2px 0;font-size:11px;}
    .g{font-size:14px;font-weight:900;}
    .it{margin:4px 0;}
    .it-n{font-weight:700;font-size:11px;}
    .it-d{display:flex;justify-content:space-between;color:#555;font-size:10px;}
    .ft{text-align:center;font-size:10px;color:#888;margin-top:12px;line-height:1.7;}
    @media print{button{display:none;}}
  </style></head><body>
    <h2>${billMode==='quote'?'QUOTATION':billMode==='return'?'RETURN NOTE':billMode==='refund'?'REFUND RECEIPT':'TAX INVOICE'}</h2>
    <div style="text-align:center;font-size:10px;color:#888;margin-bottom:6px;">WellFix Appliances</div>
    <div class="c">Kerala, India · 8590004349<br>${UPI}</div>
    <div class="d"></div>
    <div class="r"><span>Invoice</span><b>${inv.invoice_number}</b></div>
    <div class="r"><span>Date</span><span>${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span></div>
    <div class="r"><span>Customer</span><span>${meta.customer_name}</span></div>
    <div class="r"><span>Payment</span><span>${meta.payment_method.toUpperCase()}</span></div>
    <div class="d"></div>
    ${items.map(i=>`<div class="it"><div class="it-n">${i.name}</div><div class="it-d"><span>${i.qty} × ₹${i.price.toLocaleString('en-IN')}</span><span>₹${i.total.toLocaleString('en-IN')}</span></div></div>`).join('')}
    <div class="d"></div>
    <div class="r"><span>Subtotal</span><span>₹${meta.subtotal.toLocaleString('en-IN')}</span></div>
    ${meta.discount_amount>0?`<div class="r"><span>Discount</span><span>-₹${meta.discount_amount.toFixed(2)}</span></div>`:''}
    <div class="r"><span>GST (5%)</span><span>₹${meta.tax_amount.toFixed(2)}</span></div>
    <div class="d"></div>
    <div class="r g"><span>TOTAL</span><span>₹${meta.total.toFixed(2)}</span></div>
    <div class="ft">Thank you for shopping at WellFix!<br>Returns accepted within 7 days<br>warranty@wellfixappliances.com</div>
    <div style="margin-top:14px;"><button onclick="window.print()" style="width:100%;padding:9px;background:#034732;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-size:13px;">Print Receipt</button></div>
  </body></html>`);w.document.close();
}

// ── HOLD ──────────────────────────────────────────────────
function holdBill(){
  if(!cart.length){toast('Cart is empty',true);return;}
  held.push({id:Date.now(),items:[...cart],cust,time:new Date().toLocaleTimeString()});
  saveHeld();clearBill();renderHeld();
  toast('Bill held');
}
function resumeHeld(id){
  const idx=held.findIndex(b=>b.id===id);if(idx<0)return;
  const b=held.splice(idx,1)[0];
  cart=b.items;cust=b.cust;
  if(cust){document.getElementById('custInp').value=cust.name;showCustTag();}
  renderCart();calc();saveHeld();renderHeld();toggleHoldDrawer();
}
function renderHeld(){
  document.getElementById('holdCnt').textContent=held.length;
  const el=document.getElementById('holdDrwList');
  el.innerHTML=held.length?held.map(b=>`
    <div class="hold-item" onclick="resumeHeld(${b.id})">
      <div class="hold-item-name">${b.cust?.name||'Walk-in'} · ${b.items.length} items</div>
      <div class="hold-item-meta">₹${b.items.reduce((s,i)=>s+i.total,0).toLocaleString('en-IN')} · ${b.time}</div>
    </div>`).join(''):'<div style="padding:20px;text-align:center;font-size:12px;color:var(--gray-400);">No held bills</div>';
}
function saveHeld(){localStorage.setItem('wf_held',JSON.stringify(held));}
function restoreHeld(){try{const s=localStorage.getItem('wf_held');if(s){held=JSON.parse(s);renderHeld();}}catch(e){}}

// ── CLEAR ─────────────────────────────────────────────────
function clearBill(){
  cart=[];cust=null;
  document.getElementById('custInp').value='';
  document.getElementById('custTag').style.display='none';
  document.getElementById('discN').value=0;
  document.getElementById('cashGiven').value='';
  document.getElementById('refInp').value='';
  renderCart();calc();
}

// ── CUSTOMER ──────────────────────────────────────────────
function onCustSearch(){
  const q=document.getElementById('custInp').value.toLowerCase();
  if(q.length<2){cust=null;document.getElementById('custTag').style.display='none';return;}
  const f=allCusts.find(c=>c.name.toLowerCase().includes(q)||(c.phone||'').includes(q));
  if(f){cust=f;showCustTag();}
  else{cust=null;document.getElementById('custTag').style.display='none';}
}
function showCustTag(){
  const el=document.getElementById('custTag');
  el.textContent=`${cust.name} · ${cust.phone||''} · ${cust.loyalty_points||0} pts · ${cust.loyalty_tier||'bronze'}`;
  el.style.display='block';
}
function openQC(){document.getElementById('qcOvl').style.display='flex';}
function closeQC(){document.getElementById('qcOvl').style.display='none';}
async function saveQC(){
  const n=document.getElementById('qcN').value.trim(),p=document.getElementById('qcP').value.trim();
  if(!n||!p){toast('Name and phone required',true);return;}
  const{data,error}=await db.from('customers').insert({name:n,phone:p,email:document.getElementById('qcE').value||null,source:'pos'}).select().single();
  if(error){toast('Error: '+error.message,true);return;}
  allCusts.push(data);cust=data;
  document.getElementById('custInp').value=n;showCustTag();
  closeQC();toast('Customer saved');
}

// ── MANUAL ────────────────────────────────────────────────
function openManual(){document.getElementById('manOvl').style.display='flex';}
function closeManual(){document.getElementById('manOvl').style.display='none';}
function addManual(){
  const n=document.getElementById('manN').value.trim();
  const p=parseFloat(document.getElementById('manP').value)||0;
  const q=parseInt(document.getElementById('manQ').value)||1;
  if(!n||!p){toast('Name and price required',true);return;}
  cart.push({id:'m'+Date.now(),name:n,sku:'MNL',price:p,qty:q,total:p*q,stock:99999});
  renderCart();calc();closeManual();
  document.getElementById('manN').value='';document.getElementById('manP').value='';document.getElementById('manQ').value=1;
}

// ── MODE ──────────────────────────────────────────────────
function setMode(m,el){
  mode=m;
  document.querySelectorAll('.pos-seg-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  clearBill();
  // Update charge button label per mode
  const chargeBtn=document.getElementById('chargeBtn');
  const modeLabels={sale:'Charge',quote:'Save Quote',return:'Process Return',refund:'Process Refund'};
  chargeBtn.textContent=modeLabels[m]||'Charge';
  // Show/hide GST for returns
  document.getElementById('gstRow').style.display=m==='return'?'none':'flex';
  toast({sale:'Sale mode',quote:'Quotation mode — no stock deducted',return:'Return mode — stock will be restored',refund:'Refund mode — mark payment refunded'}[m]||'');
}

// ── SHIFT ─────────────────────────────────────────────────
async function openShift(){
  const t=new Date();t.setHours(0,0,0,0);
  const{data:invs}=await db.from('pos_invoices').select('total,payment_method').gte('created_at',t.toISOString()).eq('status','completed');
  const list=invs||[];
  const rev=list.reduce((s,i)=>s+(+i.total||0),0);
  const cash=list.filter(i=>i.payment_method==='cash').reduce((s,i)=>s+(+i.total||0),0);
  const upi=list.filter(i=>i.payment_method==='upi').reduce((s,i)=>s+(+i.total||0),0);
  const cardRev=list.filter(i=>i.payment_method==='card').reduce((s,i)=>s+(+i.total||0),0);
  const splitRev=list.filter(i=>i.payment_method==='split').reduce((s,i)=>s+(+i.total||0),0);
  document.getElementById('shiftBody').innerHTML=`
    <div style="background:var(--gray-25);border-radius:8px;padding:14px;margin-bottom:12px;">
      <div class="sstat"><span>Total Invoices</span><span class="sstat-v">${list.length}</span></div>
      <div class="sstat"><span>Total Revenue</span><span class="sstat-v" style="color:var(--green-700);font-size:18px;">₹${rev.toLocaleString('en-IN')}</span></div>
      <div class="sstat"><span>Cash</span><span class="sstat-v">₹${cash.toLocaleString('en-IN')}</span></div>
      <div class="sstat"><span>UPI</span><span class="sstat-v">₹${upi.toLocaleString('en-IN')}</span></div>
      <div class="sstat"><span>Card</span><span class="sstat-v">₹${cardRev.toLocaleString('en-IN')}</span></div>
      ${splitRev?`<div class="sstat"><span>Split</span><span class="sstat-v">₹${splitRev.toLocaleString('en-IN')}</span></div>`:''}
    </div>
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400);margin-bottom:8px;">Recent Bills</div>
    ${list.slice(0,5).map(i=>`
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-50);font-size:12px;">
        <div>
          <div style="font-weight:700;color:var(--green-700);">${i.invoice_number}</div>
          <div style="font-size:10px;color:var(--gray-400);">${i.customer_name||'Walk-in'} · ${(i.payment_method||'').toUpperCase()}</div>
        </div>
        <div style="font-weight:800;font-family:var(--font-display);">₹${Number(i.total).toLocaleString('en-IN')}</div>
      </div>`).join('')}
    ${!list.length?'<div style="text-align:center;color:var(--gray-400);font-size:12px;padding:12px;">No bills yet today</div>':''}`;
  document.getElementById('shiftOvl').style.display='flex';
}
function closeShift(){document.getElementById('shiftOvl').style.display='none';}

// ── INVOICE LIST ──────────────────────────────────────────
async function openInvList(){
  document.getElementById('invOvl').style.display='flex';
  const{data}=await db.from('pos_invoices').select('*').order('created_at',{ascending:false}).limit(60);
  const list=data||[];
  document.getElementById('invListBody').innerHTML=list.length?`
    <table class="inv-tbl-sm">
      <thead><tr><th>Invoice</th><th>Customer</th><th>Total</th><th>Method</th><th>Date</th></tr></thead>
      <tbody>${list.map(i=>`<tr>
        <td style="font-weight:700;color:var(--green-700);">${i.invoice_number}</td>
        <td>${i.customer_name||'Walk-in'}</td>
        <td style="font-weight:700;">₹${Number(i.total).toLocaleString('en-IN')}</td>
        <td style="text-transform:uppercase;font-size:10px;font-weight:700;">${i.payment_method}</td>
        <td style="font-size:11px;color:var(--gray-400);">${new Date(i.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
      </tr>`).join('')}</tbody>
    </table>`:`<div style="padding:30px;text-align:center;color:var(--gray-400);font-size:12px;">No invoices yet</div>`;
}
function closeInvList(){document.getElementById('invOvl').style.display='none';}

function exportInvoicesCSV(){
  const rows=[['Invoice','Customer','Phone','Total','Method','Status','Date']];
  // Export from current list
  document.querySelectorAll('#invListBody tbody tr').forEach(tr=>{
    const cells=[...tr.querySelectorAll('td')].map(td=>td.textContent.trim());
    rows.push(cells);
  });
  const a=document.createElement('a');a.href='data:text/csv,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download='pos-invoices.csv';a.click();
}

// ── HOLD DRAWER ───────────────────────────────────────────
function toggleHoldDrawer(){document.getElementById('holdDrw').classList.toggle('open');}

// ── MOBILE ────────────────────────────────────────────────
function toggleMobileView(){
  const lay=document.getElementById('posLayout');
  lay.classList.toggle('bill-view');
}

// ── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey){
    if(e.key==='Enter'){e.preventDefault();chargeBill();}
    if(e.key==='h'){e.preventDefault();holdBill();}
    if(e.key==='k'){e.preventDefault();document.getElementById('posSearch').focus();}
    if(e.key==='Escape'){clearBill();}
  }
});
</script>
