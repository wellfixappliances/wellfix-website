<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orders — WellFix Admin</title>
<link rel="icon" href="../assets/images/WELLFIX-FAVICON.png">
<link rel="stylesheet" href="assets/css/admin.css">
<style>
/* ══════════════════════════════════════
   ORDERS MODULE — ENTERPRISE DESIGN
   ══════════════════════════════════════ */

/* KPI row */
.o-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:900px){.o-kpi{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.o-kpi{grid-template-columns:1fr 1fr;gap:8px;}}
.ok{background:#fff;border:1px solid var(--gray-100);border-radius:10px;padding:13px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04);position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .2s;}
.ok:hover{box-shadow:0 3px 10px rgba(0,0,0,.07);}
.ok::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:10px 0 0 10px;}
.ok.gn::before{background:#22c55e;}.ok.bl::before{background:#3b82f6;}.ok.am::before{background:#f59e0b;}.ok.rd::before{background:#ef4444;}
.ok-val{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--gray-900);line-height:1;letter-spacing:-.4px;}
.ok-lbl{font-size:11px;color:var(--gray-400);margin-top:3px;font-weight:500;}
.ok-sub{font-size:10px;color:var(--gray-400);margin-top:2px;}

/* Status pills / tabs */
.status-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.stab{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--gray-150,#dedede);background:#fff;color:var(--gray-500);transition:all .15s;white-space:nowrap;}
.stab:hover{border-color:var(--gray-300);color:var(--gray-700);}
.stab.on{border-color:var(--green-700);background:var(--green-700);color:#fff;}
.stab-cnt{background:rgba(255,255,255,.25);border-radius:99px;padding:0 5px;font-size:10px;margin-left:3px;}
.stab.on .stab-cnt{background:rgba(255,255,255,.3);}
.stab:not(.on) .stab-cnt{background:var(--gray-100);color:var(--gray-500);}

/* Toolbar */
.o-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--gray-100);gap:8px;flex-wrap:wrap;}
.o-tl,.o-tr{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

/* Bulk bar */
.bulk-b{display:none;align-items:center;gap:8px;padding:8px 14px;background:var(--green-50);border-bottom:1px solid var(--green-100);}
.bulk-b.show{display:flex;}
.bk-cnt{font-size:12px;font-weight:700;color:var(--green-700);}

/* Table */
.o-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.o-tbl thead th{position:sticky;top:0;z-index:2;background:#fff;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);border-bottom:1px solid var(--gray-100);text-align:left;white-space:nowrap;box-shadow:0 1px 0 var(--gray-100);}
.o-tbl td{padding:8px 12px;border-bottom:1px solid var(--gray-50);vertical-align:middle;color:var(--gray-700);}
.o-tbl tr:last-child td{border-bottom:none;}
.o-tbl tbody tr{cursor:pointer;transition:background .1s;}
.o-tbl tbody tr:hover td{background:var(--gray-25);}
.o-num{font-family:var(--font-display);font-weight:800;color:var(--green-700);font-size:12px;}

/* Payment badge */
.pay-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;}
.pay-cod{background:#fff7ed;color:#c2410c;}
.pay-upi{background:#eff6ff;color:#1d4ed8;}
.pay-whatsapp{background:#f0fdf4;color:#15803d;}

/* Pay status */
.ps{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.ps.paid{background:#f0fdf4;color:#16a34a;}
.ps.pending{background:#fef3c7;color:#92400e;}
.ps.pv{background:#fff7ed;color:#c2410c;}
.ps.failed{background:#fef2f2;color:#dc2626;}
.ps.refunded{background:#f5f3ff;color:#7c3aed;}

/* Row actions */
.ra-wrap{display:flex;gap:3px;opacity:0;transition:opacity .15s;}
tr:hover .ra-wrap{opacity:1;}
.ra{width:26px;height:26px;border-radius:5px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ra:hover{background:var(--gray-50);}
.ra svg{width:12px;height:12px;stroke:var(--gray-500);fill:none;stroke-width:2;}
.ra.danger:hover{background:#fef2f2;border-color:#fecaca;}
.ra.danger:hover svg{stroke:#dc2626;}
.ra.green:hover{background:var(--green-50);border-color:var(--green-300);}
.ra.green:hover svg{stroke:var(--green-600);}

/* Mobile cards */
@media(max-width:768px){
  .o-tbl-wrap{display:none;}
  .o-cards{display:block;}
}
@media(min-width:769px){.o-cards{display:none;}}
.o-card{background:#fff;border:1px solid var(--gray-100);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow .2s;}
.o-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.07);}
.o-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.o-card-customer{font-weight:700;font-size:13px;color:var(--gray-900);}
.o-card-phone{font-size:11px;color:var(--gray-400);margin-top:2px;}
.o-card-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.o-card-stat{text-align:center;padding:6px;background:var(--gray-25);border-radius:6px;}
.o-card-stat-val{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--gray-900);}
.o-card-stat-lbl{font-size:9px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;}
.o-card-ft{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--gray-50);}

/* Detail modal */
.o-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.o-detail-grid{grid-template-columns:1fr;}}
.o-detail-sec{margin-bottom:16px;}
.o-detail-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--gray-100);}
.o-item-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-50);}
.o-item-row:last-child{border-bottom:none;}
.o-item-thumb{width:38px;height:38px;border-radius:7px;overflow:hidden;background:var(--gray-50);border:1px solid var(--gray-100);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.o-item-thumb img{width:100%;height:100%;object-fit:contain;padding:2px;}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:12px;padding:8px 0;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.tl-line{width:2px;background:var(--gray-100);margin:2px 0 2px 4px;min-height:20px;}
.tl-text{font-size:12px;color:var(--gray-700);}
.tl-time{font-size:10px;color:var(--gray-400);margin-top:1px;}

/* Status flow */
.status-flow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.sf-btn{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;border:1.5px solid var(--gray-200);background:#fff;cursor:pointer;color:var(--gray-600);transition:all .15s;}
.sf-btn:hover{border-color:var(--green-400);color:var(--green-700);}
.sf-btn.current{border-color:var(--green-700);background:var(--green-700);color:#fff;cursor:default;}
.sf-btn.done{border-color:var(--green-200);background:var(--green-50);color:var(--green-700);}

/* Payment verify */
.verify-box{background:var(--gray-25);border:1px solid var(--gray-100);border-radius:8px;padding:14px;margin-bottom:12px;}

/* Dropdown */
.drop-m{position:relative;display:inline-block;}
.drop-l{display:none;position:absolute;right:0;top:100%;margin-top:4px;background:#fff;border:1px solid var(--gray-150,#dedede);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.1);min-width:190px;z-index:200;overflow:hidden;}
.drop-l.open{display:block;}
.di{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;font-weight:500;color:var(--gray-700);cursor:pointer;transition:background .1s;}
.di:hover{background:var(--gray-50);}
.di svg{width:13px;height:13px;stroke:var(--gray-400);fill:none;stroke-width:2;}
.di.danger:hover{background:#fef2f2;color:#dc2626;}
.di.danger:hover svg{stroke:#dc2626;}
.d-sep{height:1px;background:var(--gray-100);margin:4px 0;}

/* Pager */
.pager{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--gray-100);}
.pager-info{font-size:11px;color:var(--gray-400);}
.pager-btn{height:28px;min-width:28px;padding:0 8px;border:1px solid var(--gray-200);border-radius:5px;background:#fff;font-size:12px;font-weight:600;color:var(--gray-600);cursor:pointer;}
.pager-btn:hover:not(:disabled){background:var(--gray-50);}
.pager-btn:disabled{opacity:.4;cursor:default;}
.pager-btn.on{background:var(--green-700);color:#fff;border-color:var(--green-700);}

/* Invoice */
.invoice-wrap{font-family:var(--font-body);background:#fff;border-radius:10px;padding:24px;}
.inv-header{display:flex;justify-content:space-between;margin-bottom:24px;}
.inv-title{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--gray-900);}
.inv-meta{font-size:12px;color:var(--gray-500);margin-top:3px;}
.inv-table{width:100%;border-collapse:collapse;font-size:12px;margin:16px 0;}
.inv-table th{padding:7px 10px;background:var(--gray-50);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray-400);text-align:left;}
.inv-table td{padding:7px 10px;border-bottom:1px solid var(--gray-50);}
.inv-totals{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-top:12px;}
.inv-total-row{display:flex;gap:24px;font-size:13px;}
.inv-grand{font-family:var(--font-display);font-size:18px;font-weight:800;}

/* Skeleton */
.sk{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:5px;}
@keyframes sk{to{background-position:-200% 0;}}

/* Empty */
.empty-o{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;}
.empty-o svg{width:40px;height:40px;opacity:.15;color:var(--gray-500);margin-bottom:12px;}
.empty-o h3{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--gray-600);margin-bottom:4px;}
.empty-o p{font-size:12px;color:var(--gray-400);}

/* Mobile sticky */
@media(max-width:768px){
  .mobile-sticky{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-100);padding:10px 14px;display:flex;gap:8px;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.08);}
}
@media(min-width:769px){.mobile-sticky{display:none;}}
</style>
</head>
<body>
<div class="admin-shell">
<div id="adminShell"></div>
<div class="main-wrap" id="mainWrap">
<div class="page-content">

<!-- HEADER -->
<div class="pg-hd">
  <div>
    <h1>Orders</h1>
    <p style="font-size:12px;color:var(--gray-400);margin-top:2px;" id="orderSub">Loading…</p>
  </div>
  <div class="pg-hd__actions">
    <div class="drop-m" id="exportMenu">
      <button class="btn btn-outline" onclick="toggleDrop('exportMenu')">Export</button>
      <div class="drop-l" id="exportMenuList">
        <div class="di" onclick="exportOrders('all');closeDrop('exportMenu')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Export All CSV</div>
        <div class="di" onclick="exportOrders('filtered');closeDrop('exportMenu')"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export Filtered CSV</div>
        <div class="di" onclick="exportOrders('selected');closeDrop('exportMenu')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Export Selected</div>
        <div class="d-sep"></div>
        <div class="di" onclick="exportPendingPayments();closeDrop('exportMenu')">Pending Payments Report</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="openNewOrder()">+ New Order</button>
  </div>
</div>

<!-- KPI -->
<div class="o-kpi" id="oKpi">
  <div class="ok gn"><div class="sk" style="height:54px;"></div></div>
  <div class="ok bl"><div class="sk" style="height:54px;"></div></div>
  <div class="ok am"><div class="sk" style="height:54px;"></div></div>
  <div class="ok rd"><div class="sk" style="height:54px;"></div></div>
</div>

<!-- STATUS TABS -->
<div class="status-tabs" id="statusTabs"></div>

<!-- MAIN CARD -->
<div class="card" style="padding:0;">

  <!-- Toolbar -->
  <div class="o-toolbar">
    <div class="o-tl">
      <div class="filter-search" style="margin:0;">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="oSearch" placeholder="Order ID, customer, phone…" oninput="debounceFilter()" style="width:200px;">
      </div>
      <select class="filter-select" id="fPay" onchange="filterOrders()" style="height:34px;font-size:12px;">
        <option value="">All Payment</option>
        <option value="cod">COD</option>
        <option value="upi">UPI</option>
        <option value="whatsapp">WhatsApp</option>
      </select>
      <select class="filter-select" id="fPayStatus" onchange="filterOrders()" style="height:34px;font-size:12px;">
        <option value="">All Pay Status</option>
        <option value="pending">Pending</option>
        <option value="pending_verification">Verify Queue</option>
        <option value="paid">Paid</option>
        <option value="failed">Failed</option>
        <option value="refunded">Refunded</option>
      </select>
      <select class="filter-select" id="fSort" onchange="filterOrders()" style="height:34px;font-size:12px;">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="value_desc">Highest Value</option>
        <option value="value_asc">Lowest Value</option>
        <option value="pending_first">Pending First</option>
      </select>
    </div>
    <div class="o-tr">
      <span id="filtCount" style="font-size:11px;color:var(--gray-400);"></span>
      <span id="filtRevenue" style="font-size:11px;font-weight:700;color:var(--green-700);"></span>
    </div>
  </div>

  <!-- Bulk bar -->
  <div class="bulk-b" id="bulkBar">
    <input type="checkbox" id="chkAll" onchange="toggleAll(this)" style="cursor:pointer;">
    <span class="bk-cnt" id="bulkCnt">0 selected</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn btn-sm btn-outline" onclick="bulkConfirm()">Confirm</button>
      <button class="btn btn-sm btn-outline" onclick="bulkMarkPaid()">Mark Paid</button>
      <button class="btn btn-sm btn-outline" onclick="bulkExport()">Export</button>
      <button class="btn btn-sm" style="background:var(--red-100);color:var(--red-600);" onclick="bulkCancel()">Cancel</button>
    </div>
    <button class="btn btn-sm btn-outline" onclick="clearSel()" style="margin-left:auto;">Clear</button>
  </div>

  <!-- DESKTOP TABLE -->
  <div class="o-tbl-wrap" style="overflow-x:auto;">
    <table class="o-tbl">
      <thead><tr>
        <th style="width:36px;padding:8px;"><input type="checkbox" id="chkAllH" onchange="toggleAll(this)"></th>
        <th>Order</th>
        <th>Customer</th>
        <th>Items</th>
        <th style="min-width:90px;">Total</th>
        <th>Payment</th>
        <th>Pay Status</th>
        <th>Status</th>
        <th>Date</th>
        <th style="width:100px;text-align:right;">Actions</th>
      </tr></thead>
      <tbody id="ordersTbody"></tbody>
    </table>
  </div>

  <!-- MOBILE CARDS -->
  <div class="o-cards" id="ordersCards" style="padding:12px;"></div>

  <!-- Pager -->
  <div class="pager">
    <span class="pager-info" id="pagerInfo"></span>
    <div style="display:flex;gap:4px;" id="pagerBtns"></div>
  </div>
</div>

<!-- MOBILE STICKY -->
<div class="mobile-sticky">
  <button class="btn btn-outline" style="flex:1;" onclick="filterOrders()">Refresh</button>
  <button class="btn btn-primary" style="flex:1;" onclick="exportOrders('filtered')">Export</button>
</div>

<!-- ══════════════════════════════════
     ORDER DETAIL MODAL
══════════════════════════════════ -->
<div class="modal-overlay" id="oDetailOverlay" onclick="if(event.target===this)closeDetail()" style="display:none;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;">
<div class="modal" id="oDetailModal" style="max-width:760px;width:100%;margin:auto;max-height:90vh;overflow-y:auto;">
  <div class="modal-hd">
    <h3 id="detailTitle">Order Details</h3>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-sm btn-outline" onclick="printInvoice()" id="printBtn" style="display:none;">Print Invoice</button>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
  </div>
  <div class="modal-body" id="detailBody"></div>
  <div class="modal-ft" id="detailFt"></div>
</div>
</div>

</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../backend/config/supabase.js"></script>
<script src="assets/js/shell.js"></script>
<script>
'use strict';
const PAID=['confirmed','processing','packed','shipped','out_for_delivery','delivered'];
const ALL_STATUSES=['pending','confirmed','processing','packed','shipped','out_for_delivery','delivered','cancelled','return_requested','returned','refunded'];
const STATUS_LABELS={pending:'Pending',confirmed:'Confirmed',processing:'Processing',packed:'Packed',shipped:'Shipped',out_for_delivery:'Out for Delivery',delivered:'Delivered',cancelled:'Cancelled',return_requested:'Return Req.',returned:'Returned',refunded:'Refunded'};
const STATUS_COLORS={pending:'#f59e0b',confirmed:'#3b82f6',processing:'#8b5cf6',packed:'#06b6d4',shipped:'#0ea5e9',out_for_delivery:'#f97316',delivered:'#22c55e',cancelled:'#ef4444',return_requested:'#ec4899',returned:'#ec4899',refunded:'#9ca3af'};

let allOrders=[],filteredOrders=[],selectedIds=new Set();
let currentStatus='',page=0;const PER=20;
let filtTimer=null,currentOrderId=null;

(async()=>{
  await AdminShell.init('Orders','orders');
  await loadOrders();
  document.addEventListener('click',e=>{if(!e.target.closest('.drop-m'))document.querySelectorAll('.drop-l').forEach(d=>d.classList.remove('open'));});
})();

async function loadOrders(){
  document.getElementById('ordersTbody').innerHTML=`<tr><td colspan="10" style="text-align:center;padding:30px;"><div class="spinner" style="margin:0 auto;"></div></td></tr>`;
  const{data}=await db.from('orders')
    .select('id,order_number,customer_name,customer_phone,customer_email,total,subtotal,discount,delivery_charge,tax,status,payment_method,payment_status,payment_reference,shipping_address,shipping_city,shipping_district,shipping_pincode,notes,admin_notes,tracking_id,courier,assigned_to,created_at,items:order_items(id,product_id,product_name,product_image,quantity,unit_price,total_price)')
    .order('created_at',{ascending:false})
    .limit(300);
  allOrders=data||[];
  renderKPIs();renderStatusTabs();filterOrders();
}

function renderKPIs(){
  const today=new Date();today.setHours(0,0,0,0);
  const todayOrders=allOrders.filter(o=>new Date(o.created_at)>=today);
  const todayRev=todayOrders.filter(o=>PAID.includes(o.status)).reduce((s,o)=>s+(parseFloat(o.total)||0),0);
  const pending=allOrders.filter(o=>o.status==='pending').length;
  const pendPayVal=allOrders.filter(o=>o.payment_status==='pending_verification').reduce((s,o)=>s+(parseFloat(o.total)||0),0);
  const cancelled=allOrders.filter(o=>o.status==='cancelled').length;
  document.getElementById('orderSub').textContent=`${allOrders.length} total · ${allOrders.filter(o=>PAID.includes(o.status)).length} confirmed`;
  document.getElementById('oKpi').innerHTML=[
    {cls:'gn',val:formatCurrency(todayRev),lbl:"Today's Revenue",sub:`${todayOrders.length} orders today`},
    {cls:'bl',val:allOrders.length,lbl:'Total Orders',sub:`${allOrders.filter(o=>o.status==='delivered').length} delivered`},
    {cls:'am',val:pending,lbl:'Pending Orders',sub:`${formatCurrency(pendPayVal)} verify queue`},
    {cls:'rd',val:cancelled,lbl:'Cancelled',sub:`${allOrders.filter(o=>o.status==='returned').length} returned`},
  ].map(k=>`<div class="ok ${k.cls}"><div class="ok-val">${k.val}</div><div class="ok-lbl">${k.lbl}</div><div class="ok-sub">${k.sub}</div></div>`).join('');
}

function renderStatusTabs(){
  const counts={};allOrders.forEach(o=>{counts[o.status]=(counts[o.status]||0)+1;});
  const total=allOrders.length;
  const tabs=[
    {key:'',label:'All',cnt:total},
    {key:'pending',label:'Pending',cnt:counts.pending||0},
    {key:'confirmed',label:'Confirmed',cnt:counts.confirmed||0},
    {key:'processing',label:'Processing',cnt:counts.processing||0},
    {key:'shipped',label:'Shipped',cnt:counts.shipped||0},
    {key:'delivered',label:'Delivered',cnt:counts.delivered||0},
    {key:'cancelled',label:'Cancelled',cnt:counts.cancelled||0},
    {key:'pending_verification',label:'Verify Pay',cnt:allOrders.filter(o=>o.payment_status==='pending_verification').length},
  ];
  document.getElementById('statusTabs').innerHTML=tabs.map(t=>`
    <div class="stab ${currentStatus===t.key?'on':''}" onclick="setStatus('${t.key}')">
      ${t.label}<span class="stab-cnt">${t.cnt}</span>
    </div>`).join('');
}

function setStatus(s){currentStatus=s;page=0;renderStatusTabs();filterOrders();}
function debounceFilter(){clearTimeout(filtTimer);filtTimer=setTimeout(filterOrders,250);}

function filterOrders(){
  const q=document.getElementById('oSearch').value.toLowerCase();
  const pay=document.getElementById('fPay').value;
  const paySt=document.getElementById('fPayStatus').value;
  const sort=document.getElementById('fSort').value;

  let list=allOrders.filter(o=>{
    if(currentStatus==='pending_verification'&&o.payment_status!=='pending_verification') return false;
    if(currentStatus&&currentStatus!=='pending_verification'&&o.status!==currentStatus) return false;
    if(pay&&o.payment_method!==pay) return false;
    if(paySt&&o.payment_status!==paySt) return false;
    if(q&&!o.order_number?.toLowerCase().includes(q)&&!o.customer_name?.toLowerCase().includes(q)&&!(o.customer_phone||'').includes(q)) return false;
    return true;
  });

  if(sort==='oldest')list=[...list].reverse();
  else if(sort==='value_desc')list=[...list].sort((a,b)=>(parseFloat(b.total)||0)-(parseFloat(a.total)||0));
  else if(sort==='value_asc')list=[...list].sort((a,b)=>(parseFloat(a.total)||0)-(parseFloat(b.total)||0));
  else if(sort==='pending_first')list=[...list].sort((a,b)=>a.status==='pending'?-1:b.status==='pending'?1:0);

  filteredOrders=list;page=0;
  const rev=list.filter(o=>PAID.includes(o.status)).reduce((s,o)=>s+(parseFloat(o.total)||0),0);
  document.getElementById('filtCount').textContent=`${list.length} orders`;
  document.getElementById('filtRevenue').textContent=list.length?`Rev: ${formatCurrency(rev)}`:'';
  renderTable();renderCards();renderPager();
}

  const labels={pending:'Pending',pending_verification:'Verify',paid:'Paid',failed:'Failed',refunded:'Refunded',cod_pending:'COD Due'};

function renderPager(){
  const total=filteredOrders.length,pages=Math.ceil(total/PER);
  document.getElementById('pagerInfo').textContent=total?`${page*PER+1}–${Math.min((page+1)*PER,total)} of ${total}`:'';

  if(pages<=1){el.innerHTML='';return;}
  let h=`<button class="pager-btn" onclick="goPage(${Math.max(0,page-1)})" ${page===0?'disabled':''}>←</button>`;
  for(let i=0;i<Math.min(pages,7);i++)h+=`<button class="pager-btn ${i===page?'on':''}" onclick="goPage(${i})">${i+1}</button>`;
  h+=`<button class="pager-btn" onclick="goPage(${Math.min(pages-1,page+1)})" ${page>=pages-1?'disabled':''}>→</button>`;
  el.innerHTML=h;
}

  for(const id of selectedIds){

// STATUS CHANGE
async function changeStatus(id,status){
  if(status==='cancelled'&&!confirm('Cancel this order? Stock will be restored.')) return;
  const o=allOrders.find(x=>x.id===id);
  const old=o?.status;
  await db.from('orders').update({status}).eq('id',id);
  await logAction(id,'Status changed',old,status);
  // Restore stock on cancel
  if(status==='cancelled'&&o?.items?.length){
    for(const item of o.items){
      if(item.product_id&&item.quantity){
        const{data:p}=await db.from('products').select('stock_qty').eq('id',item.product_id).single();
        if(p)await db.from('products').update({stock_qty:(p.stock_qty||0)+(item.quantity||1)}).eq('id',item.product_id);
      }
    }
  }
  if(o)o.status=status;
  toast('Status updated to: '+STATUS_LABELS[status]);
  renderStatusTabs();filterOrders();
  // Re-open with fresh data
  viewOrder(id);
}

// PAYMENT
async function verifyPayment(id){
  await db.from('orders').update({payment_status:'paid',status:'confirmed'}).eq('id',id);
  await logAction(id,'Payment verified','pending_verification','paid');
  const o=allOrders.find(x=>x.id===id);if(o){o.payment_status='paid';o.status='confirmed';}
  toast('Payment verified — order confirmed');
  renderStatusTabs();filterOrders();viewOrder(id);
}
async function rejectPayment(id){
  await db.from('orders').update({payment_status:'failed'}).eq('id',id);
  await logAction(id,'Payment rejected','pending_verification','failed');
  const o=allOrders.find(x=>x.id===id);if(o)o.payment_status='failed';
  toast('Payment rejected');renderStatusTabs();filterOrders();viewOrder(id);
}
async function processRefund(id){
  if(!confirm('Mark this order as refunded?'))return;
  await db.from('orders').update({payment_status:'refunded',status:'refunded'}).eq('id',id);
  await logAction(id,'Refund processed','paid','refunded');
  const o=allOrders.find(x=>x.id===id);if(o){o.payment_status='refunded';o.status='refunded';}
  toast('Refund processed');renderStatusTabs();filterOrders();viewOrder(id);
}
async function quickVerify(id){
  await verifyPayment(id);
  // Reload
  const{data}=await db.from('orders').select('*,items:order_items(*)').eq('id',id).single();
  const idx=allOrders.findIndex(x=>x.id===id);if(idx>=0&&data)allOrders[idx]=data;
  renderTable();renderCards();
}
async function savePayRef(id){
  const ref=document.getElementById('payRefInput')?.value||'';
  await db.from('orders').update({payment_reference:ref}).eq('id',id);
  const o=allOrders.find(x=>x.id===id);if(o)o.payment_reference=ref;
  toast('Reference saved');
}
async function saveTracking(id){
  const courier=document.getElementById('courierInput')?.value||'';
  const tracking=document.getElementById('trackingInput')?.value||'';
  await db.from('orders').update({courier,tracking_id:tracking,status:'shipped'}).eq('id',id);
  await logAction(id,'Tracking added',null,tracking);
  const o=allOrders.find(x=>x.id===id);if(o){o.courier=courier;o.tracking_id=tracking;o.status='shipped';}
  toast('Tracking saved — status set to Shipped');filterOrders();viewOrder(id);
}
async function saveAdminNotes(id){
  const n=document.getElementById('adminNotesInput')?.value||'';
  await db.from('orders').update({admin_notes:n}).eq('id',id);
  const o=allOrders.find(x=>x.id===id);if(o)o.admin_notes=n;
  toast('Notes saved');
}

// DELETE
async function deleteOrder(id){
  if(!confirm('Delete this order permanently?'))return;
  await db.from('order_items').delete().eq('order_id',id);
  await db.from('order_logs').delete().eq('order_id',id);
  await db.from('orders').delete().eq('id',id);
  allOrders=allOrders.filter(x=>x.id!==id);
  toast('Order deleted');closeDetail();renderStatusTabs();filterOrders();
}

// LOG
async function logAction(orderId,action,oldVal,newVal,note){
  const o=allOrders.find(x=>x.id===orderId);
  try{await db.from('order_logs').insert({order_id:orderId,order_number:o?.order_number,action,old_value:oldVal,new_value:newVal,note:note||null,done_by:'Admin'});}catch(e){}
}

// WHATSAPP
function openWA(phone,name,orderNum){
  const num=(phone||'').replace(/\D/g,'');
  if(!num){toast('No phone number',true);return;}
  const msg=`Hi ${name||''}! Your WellFix order ${orderNum} has been received. Thank you for shopping with us!`;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
}

// NEW ORDER (manual)
function openNewOrder(){
  // Simple redirect to ensure it's known this creates a manual order
  toast('Use the website checkout or add products directly to create an order');
}

      <div style="text-align:right;"><div style="font-weight:700;font-size:16px;">WellFix Appliances</div><div class="meta">Kerala, India · 8590004349<br>wellfixappliances@gmail.com</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;background:#f9fafb;padding:14px;border-radius:8px;">

    </tbody></table>
    <div style="text-align:right;">
      <div class="total-row"><span style="color:#666;">Subtotal</span><span>₹${Number(subtotal).toLocaleString('en-IN')}</span></div>
      ${disc>0?`<div class="total-row"><span style="color:#ef4444;">Discount</span><span style="color:#ef4444;">−₹${Number(disc).toLocaleString('en-IN')}</span></div>`:''}
      ${del>0?`<div class="total-row"><span style="color:#666;">Delivery</span><span>₹${Number(del).toLocaleString('en-IN')}</span></div>`:''}
      <div class="total-row grand" style="margin-top:8px;padding-top:8px;border-top:2px solid #111;"><span>Total</span><span>₹${Number(o.total).toLocaleString('en-IN')}</span></div>
    </div>
    <div style="margin-top:24px;text-align:center;color:#999;font-size:11px;">Thank you for shopping with WellFix Appliances · UPI: 8301879406@ybl</div>
    <button onclick="window.print()" style="margin-top:20px;padding:10px 20px;background:#034732;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;">Print Invoice</button>
  </body></html>`);win.document.close();

// EXPORT
function doCSVExport(orders){
  const rows=[['Order','Customer','Phone','Items','Subtotal','Discount','Delivery','Total','Payment','Pay Status','Status','District','Date']];
  orders.forEach(o=>{
    const cnt=(o.items||[]).length;
    rows.push([o.order_number,o.customer_name||'',o.customer_phone||'',cnt,o.subtotal||o.total||0,o.discount||0,o.delivery_charge||0,o.total||0,(o.payment_method||'').toUpperCase(),o.payment_status||'',o.status||'',o.shipping_district||'',new Date(o.created_at).toLocaleDateString()]);
  });
  const a=document.createElement('a');a.href='data:text/csv,'+encodeURIComponent(rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n'));a.download='wellfix-orders.csv';a.click();toast('Exported');
}
function exportOrders(mode){
  if(mode==='all')doCSVExport(allOrders);
  else if(mode==='filtered')doCSVExport(filteredOrders);
  else if(mode==='selected')doCSVExport(allOrders.filter(o=>selectedIds.has(o.id)));
}
function exportPendingPayments(){
  const pend=allOrders.filter(o=>o.payment_status==='pending_verification');
  doCSVExport(pend);
  toast(`${pend.length} pending payment orders exported`);
}

// DROPDOWN
function toggleDrop(id){const el=document.getElementById(id+'List');document.querySelectorAll('.drop-l').forEach(d=>{if(d!==el)d.classList.remove('open');});el.classList.toggle('open');}
function closeDrop(id){document.getElementById(id+'List').classList.remove('open');}
