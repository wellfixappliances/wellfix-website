<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Customers — WellFix Admin</title>
<link rel="icon" href="../assets/images/WELLFIX-FAVICON.png">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
<div class="admin-shell"><div id="adminShell"></div>
<div class="main-wrap" id="mainWrap"><div class="page-content">

<div class="pg-hd">
  <div><h1>Customers</h1><p id="custCount">Loading...</p></div>
  <div class="pg-hd__actions">
    <button class="btn btn-outline" onclick="syncFromOrders()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="13" height="13"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      Sync from Orders
    </button>
    <button class="btn btn-primary" onclick="openModal()">+ Add Customer</button>
  </div>
</div>

<div class="card">
  <div class="filter-bar">
    <div class="filter-search">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="custSearch" placeholder="Search name, phone, email…" oninput="filterCustomers()">
    </div>
    <select class="filter-select" id="custSource" onchange="filterCustomers()">
      <option value="">All Sources</option>
      <option value="website">Website</option>
      <option value="manual">Manual</option>
      <option value="whatsapp">WhatsApp</option>
    </select>
    <select class="filter-select" id="custLocation" onchange="filterCustomers()">
      <option value="">All Locations</option>
    </select>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Customer</th><th>Phone</th><th>Location</th><th>Orders</th><th>Total Spent</th><th>Source</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody id="custTbody"></tbody>
    </table>
  </div>
</div>

<!-- Customer Detail Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModal()"></div>
<div class="modal" id="modal" style="display:none;max-width:560px;">
  <div class="modal-hd"><h3 id="modalTitle">Add Customer</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-grid form-2">
      <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="fName" placeholder="Customer name"></div>
      <div class="form-group"><label class="form-label">Phone *</label><input class="form-input" id="fPhone" type="tel" placeholder="+91 98765 43210"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="fEmail" type="email" placeholder="email@example.com"></div>
      <div class="form-group"><label class="form-label">Source</label>
        <select class="form-input" id="fSource">
          <option value="manual">Manual Entry</option>
          <option value="website">Website Order</option>
          <option value="whatsapp">WhatsApp</option>
          <option value="walk-in">Walk-in</option>
          <option value="referral">Referral</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Address</label><textarea class="form-textarea" id="fAddress" style="min-height:50px;"></textarea></div>
      <div class="form-group"><label class="form-label">City</label><input class="form-input" id="fCity"></div>
      <div class="form-group"><label class="form-label">District</label>
        <select class="form-input" id="fDistrict">
          <option value="">Select</option>
          <option>Thrissur</option><option>Ernakulam</option><option>Calicut</option>
          <option>Trivandrum</option><option>Palakkad</option><option>Malappuram</option>
          <option>Kannur</option><option>Kollam</option><option>Kottayam</option><option>Idukki</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Notes</label><textarea class="form-textarea" id="fNotes" placeholder="Any notes about this customer…" style="min-height:50px;"></textarea></div>
    </div>
  </div>
  <div class="modal-ft">
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn" id="deleteBtn" style="background:var(--red-100);color:var(--red-600);display:none;" onclick="deleteCustomer()">Delete</button>
    <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
  </div>
</div>

<!-- Customer History Modal -->
<div class="modal-overlay" id="histOverlay" style="display:none;" onclick="closeHist()"></div>
<div class="modal" id="histModal" style="display:none;max-width:600px;">
  <div class="modal-hd"><h3 id="histTitle">Customer History</h3><button class="modal-close" onclick="closeHist()">✕</button></div>
  <div class="modal-body" id="histBody"></div>
</div>

</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../backend/config/supabase.js"></script>
<script src="assets/js/shell.js"></script>
<script>
let allCustomers = [], editId = null;

async function load() {
  const { data, count } = await db.from('customers').select('*', {count:'exact'}).order('created_at',{ascending:false});
  allCustomers = data || [];
  document.getElementById('custCount').textContent = `${count||allCustomers.length} registered customers`;
  
  // Populate location filter
  const districts = [...new Set(allCustomers.map(c=>c.district).filter(Boolean))];
  const locSel = document.getElementById('custLocation');
  locSel.innerHTML = '<option value="">All Locations</option>' + districts.map(d=>`<option value="${d}">${d}</option>`).join('');
  
  filterCustomers();
}

function filterCustomers() {
  const q = document.getElementById('custSearch').value.toLowerCase();
  const src = document.getElementById('custSource').value;
  const loc = document.getElementById('custLocation').value;
  let filtered = allCustomers.filter(c => {
    if (src && c.source !== src) return false;
    if (loc && c.district !== loc) return false;
    if (q && !`${c.name||''} ${c.phone||''} ${c.email||''}`.toLowerCase().includes(q)) return false;
    return true;
  });
  renderCustomers(filtered);
}

function renderCustomers(list) {
  const tbody = document.getElementById('custTbody');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--gray-400);">No customers found</td></tr>'; return; }
  tbody.innerHTML = list.map(c => `
    <tr>
      <td>
        <div class="td-bold">${c.name||'—'}</div>
        ${c.email?`<div style="font-size:11px;color:var(--gray-400);">${c.email}</div>`:''}
      </td>
      <td>${c.phone||'—'}</td>
      <td>${c.district||c.city||'—'}</td>
      <td style="font-weight:700;">${c.orders_count||0}</td>
      <td style="font-weight:700;color:var(--green-700);">${formatCurrency(c.total_spent||0)}</td>
      <td><span style="font-size:11px;background:var(--gray-100);padding:2px 8px;border-radius:99px;font-weight:600;">${c.source||'website'}</span></td>
      <td>${formatDate(c.created_at)}</td>
      <td>
        <div style="display:flex;gap:4px;">
          <button class="btn-icon" onclick="viewHistory('${c.id}','${c.name}')" title="Order History">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </button>
          <button class="btn-icon" onclick="editCustomer('${c.id}')" title="Edit">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>
          </button>
        </div>
      </td>
    </tr>`).join('');
}

function openModal(id=null) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Customer' : 'Add Customer';
  document.getElementById('deleteBtn').style.display = id ? 'block' : 'none';
  if (id) {
    const c = allCustomers.find(x=>x.id===id);
    document.getElementById('fName').value = c.name||'';
    document.getElementById('fPhone').value = c.phone||'';
    document.getElementById('fEmail').value = c.email||'';
    document.getElementById('fSource').value = c.source||'manual';
    document.getElementById('fAddress').value = c.address||'';
    document.getElementById('fCity').value = c.city||'';
    document.getElementById('fDistrict').value = c.district||'';
    document.getElementById('fNotes').value = c.notes||'';
  } else {
    ['fName','fPhone','fEmail','fAddress','fCity','fNotes'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('fSource').value='manual';
  }
  document.getElementById('modalOverlay').style.display='block';
  document.getElementById('modal').style.display='block';
}
function editCustomer(id){openModal(id);}
function closeModal(){document.getElementById('modalOverlay').style.display='none';document.getElementById('modal').style.display='none';}

async function saveCustomer() {
  const name=document.getElementById('fName').value.trim();
  const phone=document.getElementById('fPhone').value.trim();
  if(!name||!phone){toast('Name and phone required',true);return;}
  const payload={name,phone,email:document.getElementById('fEmail').value,source:document.getElementById('fSource').value,address:document.getElementById('fAddress').value,city:document.getElementById('fCity').value,district:document.getElementById('fDistrict').value,notes:document.getElementById('fNotes').value};
  if(editId) await db.from('customers').update(payload).eq('id',editId);
  else await db.from('customers').insert(payload);
  toast(editId?'Customer updated!':'Customer added!');
  closeModal(); load();
}

async function deleteCustomer() {
  if(!confirm('Delete this customer?'))return;
  await db.from('customers').delete().eq('id',editId);
  toast('Customer deleted'); closeModal(); load();
}

async function syncFromOrders() {
  const btn = event.target;
  btn.textContent = 'Syncing…'; btn.disabled=true;
  const {data:orders} = await db.from('orders').select('customer_name,customer_phone,customer_email,shipping_address,shipping_city,shipping_district,created_at').order('created_at',{ascending:false});
  let created=0;
  for(const o of (orders||[])){
    if(!o.customer_phone) continue;
    const {data:existing}=await db.from('customers').select('id').eq('phone',o.customer_phone.replace(/[\s+\-]/g,'').slice(-10)).single();
    if(!existing){
      await db.from('customers').insert({name:o.customer_name,phone:o.customer_phone,email:o.customer_email,address:o.shipping_address,city:o.shipping_city,district:o.shipping_district,source:'website',created_at:o.created_at});
      created++;
    }
  }
  toast(`Synced! ${created} new customers added from orders.`);
  btn.textContent='Sync from Orders'; btn.disabled=false;
  load();
}

async function viewHistory(customerId, name) {
  document.getElementById('histTitle').textContent = name + ' — Order History';
  document.getElementById('histBody').innerHTML = '<div style="text-align:center;padding:20px;"><div class="spinner" style="margin:0 auto;"></div></div>';
  document.getElementById('histOverlay').style.display='block';
  document.getElementById('histModal').style.display='block';
  const {data:orders}=await db.from('orders').select('order_number,total,status,payment_status,created_at').eq('customer_phone', allCustomers.find(c=>c.id===customerId)?.phone||'NONE').order('created_at',{ascending:false});
  if(!orders?.length){document.getElementById('histBody').innerHTML='<p style="text-align:center;padding:20px;color:var(--gray-400);">No orders found</p>';return;}
  const total=orders.reduce((s,o)=>s+(parseFloat(o.total)||0),0);
  document.getElementById('histBody').innerHTML=`
    <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
      <div style="background:var(--green-50);padding:12px 16px;border-radius:var(--r-md);flex:1;min-width:100px;"><div style="font-size:11px;color:var(--gray-500);">TOTAL ORDERS</div><div style="font-size:20px;font-weight:800;">${orders.length}</div></div>
      <div style="background:var(--green-50);padding:12px 16px;border-radius:var(--r-md);flex:1;min-width:100px;"><div style="font-size:11px;color:var(--gray-500);">TOTAL SPENT</div><div style="font-size:20px;font-weight:800;">${formatCurrency(total)}</div></div>
    </div>
    <div class="tbl-wrap"><table><thead><tr><th>Order</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
    <tbody>${orders.map(o=>`<tr><td class="td-bold">${o.order_number}</td><td>${formatCurrency(o.total)}</td><td>${renderBadge(o.status)}</td><td>${formatDate(o.created_at)}</td></tr>`).join('')}</tbody></table></div>`;
}
function closeHist(){document.getElementById('histOverlay').style.display='none';document.getElementById('histModal').style.display='none';}

(async()=>{ await AdminShell.init('Customers','customers'); load(); })();
</script></body></html>
