<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Checkout — WellFix Appliances</title>
  <link rel="icon" href="../assets/images/WELLFIX-FAVICON.png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .checkout-page { padding: var(--sp-5) 0 var(--sp-12); }
    .checkout-layout { display: grid; grid-template-columns: 1fr 360px; gap: var(--sp-6); align-items: start; }
    @media(max-width:900px){ .checkout-layout { grid-template-columns: 1fr; } }
    .checkout-card { background: var(--color-surface); border: 1.5px solid var(--color-border); border-radius: var(--r-lg); margin-bottom: var(--sp-4); overflow: hidden; }
    .checkout-card__header { padding: var(--sp-4) var(--sp-5); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: var(--sp-3); }
    .checkout-card__num { width: 26px; height: 26px; background: var(--color-primary); color: #fff; border-radius: 99px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .checkout-card__title { font-family: var(--font-display); font-size: var(--text-base); font-weight: var(--weight-bold); }
    .checkout-card__body { padding: var(--sp-5); }
    .form-grid { display: grid; gap: var(--sp-3); }
    .form-grid-2 { grid-template-columns: 1fr 1fr; }
    @media(max-width:600px){ .form-grid-2 { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: var(--text-xs); font-weight: var(--weight-bold); color: var(--color-text-2); text-transform: uppercase; letter-spacing: .03em; }
    .form-label .req { color: var(--color-danger); }
    .form-input, .form-select { border: 1.5px solid var(--color-border-strong); border-radius: var(--r-sm); padding: 0 12px; height: 42px; font-size: var(--text-base); color: var(--color-text); background: var(--color-surface); width: 100%; outline: none; transition: border-color .2s; }
    .form-input:focus, .form-select:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(3,71,50,.07); }
    .form-textarea { border: 1.5px solid var(--color-border-strong); border-radius: var(--r-sm); padding: 10px 12px; font-size: var(--text-base); color: var(--color-text); width: 100%; outline: none; resize: vertical; min-height: 80px; transition: border-color .2s; }
    .form-textarea:focus { border-color: var(--color-primary); }

    /* Payment methods */
    .payment-option { display: flex; align-items: center; gap: var(--sp-3); padding: 14px; border: 1.5px solid var(--color-border); border-radius: var(--r-md); cursor: pointer; transition: all .2s; margin-bottom: var(--sp-2); }
    .payment-option:hover { border-color: var(--color-primary); }
    .payment-option.is-selected { border-color: var(--color-primary); background: var(--green-50); }
    .payment-option input { width: 18px; height: 18px; accent-color: var(--color-primary); flex-shrink: 0; }
    .payment-option__icon { width: 40px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .payment-option__info { flex: 1; }
    .payment-option__name { font-size: var(--text-base); font-weight: var(--weight-semi); }
    .payment-option__desc { font-size: var(--text-xs); color: var(--color-text-3); }

    /* Order items */
    .order-item { display: flex; gap: var(--sp-3); padding: var(--sp-3) 0; border-bottom: 1px solid var(--color-border); align-items: center; }
    .order-item:last-child { border-bottom: none; }
    .order-item__img { width: 50px; height: 50px; object-fit: contain; background: var(--gray-25); border-radius: var(--r-sm); border: 1px solid var(--color-border); padding: 4px; flex-shrink: 0; }
    .order-item__name { font-size: var(--text-sm); font-weight: var(--weight-semi); flex: 1; }
    .order-item__price { font-size: var(--text-base); font-weight: var(--weight-bold); flex-shrink: 0; }

    /* Success screen */
    .order-success { text-align: center; padding: var(--sp-10) var(--sp-4); background: var(--color-surface); border: 1.5px solid var(--color-border); border-radius: var(--r-lg); }
    .order-success__icon { width: 64px; height: 64px; background: var(--green-50); border-radius: 99px; display: flex; align-items: center; justify-content: center; margin: 0 auto var(--sp-4); }
    .order-success__icon svg { width: 32px; height: 32px; color: var(--green-600); }
  </style>
</head>
<body>

<div class="topbar"><div class="container topbar__inner"><div class="topbar__center">Secure Checkout · <strong>+91 85900 04349</strong></div></div></div>

<header class="site-header">
  <div class="container site-header__inner">
    <a href="../index.html" class="logo"><img src="../assets/images/WELLFIX-MAIN-LOGO.png" alt="WellFix" class="logo__img" onerror="this.style.display='none'"></a>
    <div style="flex:1;text-align:center;font-size:var(--text-sm);color:rgba(255,255,255,.7);">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Secure Checkout
    </div>
    <a href="cart.html" style="font-size:var(--text-sm);color:rgba(255,255,255,.7);">← Back to Cart</a>
  </div>
</header>

<main class="checkout-page" id="checkoutMain">
  <div class="container">
    <div id="checkoutForm">
      <div class="checkout-layout">
        <div>
          <!-- Delivery Info -->
          <div class="checkout-card">
            <div class="checkout-card__header">
              <div class="checkout-card__num">1</div>
              <div class="checkout-card__title">Delivery Information</div>
            </div>
            <div class="checkout-card__body">
              <div class="form-grid form-grid-2">
                <div class="form-group" style="grid-column:1/-1;">
                  <label class="form-label">Full Name <span class="req">*</span></label>
                  <input class="form-input" id="custName" placeholder="Your full name">
                </div>
                <div class="form-group">
                  <label class="form-label">Phone Number <span class="req">*</span></label>
                  <input class="form-input" id="custPhone" type="tel" placeholder="+91 98765 43210">
                </div>
                <div class="form-group">
                  <label class="form-label">Email (optional)</label>
                  <input class="form-input" id="custEmail" type="email" placeholder="your@email.com">
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                  <label class="form-label">Delivery Address <span class="req">*</span></label>
                  <textarea class="form-textarea" id="custAddress" placeholder="House no, street, area…" rows="2"></textarea>
                </div>
                <div class="form-group">
                  <label class="form-label">City <span class="req">*</span></label>
                  <input class="form-input" id="custCity" placeholder="e.g. Thrissur">
                </div>
                <div class="form-group">
                  <label class="form-label">District</label>
                  <select class="form-select" id="custDistrict">
                    <option value="">Select District</option>
                    <option>Thrissur</option><option>Ernakulam</option><option>Calicut</option>
                    <option>Trivandrum</option><option>Palakkad</option><option>Malappuram</option>
                    <option>Kannur</option><option>Kollam</option><option>Kottayam</option>
                    <option>Idukki</option><option>Wayanad</option><option>Kasaragod</option>
                    <option>Alappuzha</option><option>Pathanamthitta</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Pincode</label>
                  <input class="form-input" id="custPincode" placeholder="680001" maxlength="6">
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                  <label class="form-label">Order Notes (optional)</label>
                  <textarea class="form-textarea" id="custNotes" placeholder="Any special instructions…" rows="2"></textarea>
                </div>
              </div>
            </div>
          </div>

          <!-- Payment Method -->
          <div class="checkout-card">
            <div class="checkout-card__header">
              <div class="checkout-card__num">2</div>
              <div class="checkout-card__title">Payment Method</div>
            </div>
            <div class="checkout-card__body">
              <label class="payment-option is-selected" id="pay-cod" onclick="selectPayment('cod')">
                <input type="radio" name="payment" value="cod" checked>
                <div class="payment-option__icon">💵</div>
                <div class="payment-option__info">
                  <div class="payment-option__name">Cash on Delivery (COD)</div>
                  <div class="payment-option__desc">Pay when your order arrives</div>
                </div>
              </label>
              <label class="payment-option" id="pay-upi" onclick="selectPayment('upi')">
                <input type="radio" name="payment" value="upi">
                <div class="payment-option__icon">📱</div>
                <div class="payment-option__info">
                  <div class="payment-option__name">UPI / Online Payment</div>
                  <div class="payment-option__desc">Pay via WhatsApp after order is confirmed</div>
                </div>
              </label>
              <label class="payment-option" id="pay-whatsapp" onclick="selectPayment('whatsapp')">
                <input type="radio" name="payment" value="whatsapp">
                <div class="payment-option__icon">
                  <svg fill="currentColor" viewBox="0 0 24 24" style="width:22px;height:22px;color:#25d366;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.978-1.413A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
                </div>
                <div class="payment-option__info">
                  <div class="payment-option__name">Order via WhatsApp</div>
                  <div class="payment-option__desc">Place order directly on WhatsApp</div>
                </div>
              </label>
            </div>
          </div>
        </div>

        <!-- Order Summary -->
        <div>
          <div style="background:var(--color-surface);border:1.5px solid var(--color-border);border-radius:var(--r-lg);overflow:hidden;position:sticky;top:80px;">
            <div style="padding:var(--sp-4) var(--sp-5);border-bottom:1px solid var(--color-border);">
              <div style="font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-bold);">Order Summary</div>
            </div>
            <div style="padding:var(--sp-4) var(--sp-5);" id="checkoutSummary">
              <!-- Rendered by JS -->
            </div>
            <div style="padding:var(--sp-4) var(--sp-5);border-top:1px solid var(--color-border);">
              <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;" onclick="placeOrder()" id="placeOrderBtn">
                Place Order →
              </button>
              <div style="text-align:center;font-size:var(--text-xs);color:var(--color-text-3);margin-top:var(--sp-2);">
                By ordering you agree to our terms of service
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Success screen (hidden initially) -->
    <div id="successScreen" style="display:none;max-width:560px;margin:0 auto;">
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../backend/config/supabase.js"></script>
<script src="../assets/js/app.js"></script>
<script>
let cart = [];
let selectedPayment = 'cod';

document.addEventListener('DOMContentLoaded', () => {
  cart = JSON.parse(localStorage.getItem('wf_cart') || '[]');
  if (!cart.length) { window.location.href = 'cart.html'; return; }
  renderCheckoutSummary();
  updateCartUI();
});

function renderCheckoutSummary() {
  const subtotal = cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
  const shipping = subtotal >= 999 ? 0 : 60;
  const couponData = JSON.parse(sessionStorage.getItem('wf_coupon') || 'null');
  const discount = couponData?.discount || 0;
  const total = subtotal + shipping - discount;

  document.getElementById('checkoutSummary').innerHTML = `
    ${cart.map(item => `
      <div class="order-item">
        ${item.img ? `<img class="order-item__img" src="${item.img}" alt="${item.name}">` : `<div class="order-item__img" style="display:flex;align-items:center;justify-content:center;font-size:22px;">📦</div>`}
        <div class="order-item__name">${item.name} <span style="color:var(--color-text-3);">x${item.qty||1}</span></div>
        <div class="order-item__price">₹${Number(item.price * (item.qty||1)).toLocaleString('en-IN')}</div>
      </div>`).join('')}
    <div style="border-top:1px solid var(--color-border);margin-top:var(--sp-3);padding-top:var(--sp-3);">
      <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);color:var(--color-text-2);margin-bottom:6px;"><span>Subtotal</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);color:${shipping===0?'var(--green-600)':'var(--color-text-2)'};margin-bottom:6px;"><span>Delivery</span><span>${shipping===0?'FREE':'₹'+shipping}</span></div>
      ${discount > 0 ? `<div style="display:flex;justify-content:space-between;font-size:var(--text-sm);color:var(--green-600);margin-bottom:6px;"><span>Coupon (${couponData.code})</span><span>-₹${discount.toLocaleString('en-IN')}</span></div>` : ''}
      <div style="display:flex;justify-content:space-between;font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);margin-top:8px;padding-top:10px;border-top:1.5px solid var(--color-border);"><span>Total</span><span>₹${total.toLocaleString('en-IN')}</span></div>
    </div>`;
}

function selectPayment(method) {
  selectedPayment = method;
  ['cod','upi','whatsapp'].forEach(m => {
    document.getElementById('pay-' + m)?.classList.toggle('is-selected', m === method);
  });
}

async function placeOrder() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const address = document.getElementById('custAddress').value.trim();
  const city = document.getElementById('custCity').value.trim();

  if (!name || !phone || !address || !city) {
    alert('Please fill in all required fields: Name, Phone, Address, City');
    return;
  }

  if (selectedPayment === 'whatsapp') {
    const subtotal = cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
    const shipping = subtotal >= 999 ? 0 : 60;
    const items = cart.map(i => `- ${i.name} x${i.qty||1} = ₹${(i.price*(i.qty||1)).toLocaleString('en-IN')}`).join('\n');
    const msg = `Hi WellFix! I want to place an order:\n\n${items}\n\nSubtotal: ₹${subtotal.toLocaleString('en-IN')}\nDelivery: ${shipping===0?'FREE':'₹'+shipping}\nTotal: ₹${(subtotal+shipping).toLocaleString('en-IN')}\n\nDelivery to:\n${name}\n${phone}\n${address}, ${city}`;
    window.open(`https://wa.me/918590004349?text=${encodeURIComponent(msg)}`, '_blank');
    return;
  }

  const btn = document.getElementById('placeOrderBtn');
  btn.disabled = true;
  btn.textContent = 'Placing Order…';

  try {
    const subtotal = cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
    const shipping = subtotal >= 999 ? 0 : 60;
    const couponData = JSON.parse(sessionStorage.getItem('wf_coupon') || 'null');
    const discount = couponData?.discount || 0;
    const total = subtotal + shipping - discount;

    const orderNum = 'WF-' + Date.now().toString().slice(-6);

    const { data: order, error } = await db.from('orders').insert({
      order_number: orderNum,
      customer_name: name,
      customer_phone: phone,
      customer_email: document.getElementById('custEmail').value || null,
      shipping_address: address,
      shipping_city: city,
      shipping_district: document.getElementById('custDistrict').value || null,
      shipping_pincode: document.getElementById('custPincode').value || null,
      status: 'pending',
      payment_method: selectedPayment,
      payment_status: selectedPayment === 'cod' ? 'pending' : 'pending',
      subtotal,
      discount,
      shipping_fee: shipping,
      total,
      coupon_code: couponData?.code || null,
      notes: document.getElementById('custNotes').value || null,
    }).select().single();

    if (error) throw error;

    // Insert order items
    await db.from('order_items').insert(cart.map(i => ({
      order_id: order.id,
      product_id: i.id,
      product_name: i.name,
      product_image: i.img || null,
      quantity: i.qty || 1,
      unit_price: i.price,
      total_price: i.price * (i.qty || 1),
    })));

    // Clear cart
    localStorage.removeItem('wf_cart');
    sessionStorage.removeItem('wf_coupon');

    showSuccess(order, total);

  } catch (err) {
    alert('Error placing order: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Place Order →';
  }
}

function showSuccess(order, total) {
  document.getElementById('checkoutForm').style.display = 'none';
  const screen = document.getElementById('successScreen');
  screen.style.display = 'block';
  screen.innerHTML = `
    <div class="order-success">
      <div class="order-success__icon">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 style="font-family:var(--font-display);font-size:var(--text-3xl);font-weight:800;margin-bottom:8px;">Order Placed!</h2>
      <div style="font-size:var(--text-lg);color:var(--color-text-2);margin-bottom:4px;">Order ID: <strong>${order.order_number}</strong></div>
      <div style="font-size:var(--text-2xl);font-weight:800;color:var(--color-primary);font-family:var(--font-display);margin-bottom:var(--sp-4);">₹${total.toLocaleString('en-IN')}</div>
      <p style="color:var(--color-text-2);margin-bottom:var(--sp-5);">Thank you! We will contact you at <strong>${document.getElementById('custPhone').value}</strong> to confirm your order and delivery details.</p>
      <div style="display:flex;gap:var(--sp-3);justify-content:center;flex-wrap:wrap;">
        <a href="https://wa.me/918590004349?text=Hi! My order ${order.order_number} - can I get an update?" target="_blank" class="btn btn-gold">Track on WhatsApp</a>
        <a href="../index.html" class="btn btn-secondary">Continue Shopping</a>
      </div>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
