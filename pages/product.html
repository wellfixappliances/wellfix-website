<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title id="pageTitle">Product — WellFix Appliances</title>
  <link rel="icon" href="../assets/images/WELLFIX-FAVICON.png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .product-page { padding: var(--sp-5) 0 var(--sp-12); }
    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-8); align-items: start; }
    @media(max-width:768px){ .product-layout { grid-template-columns: 1fr; gap: var(--sp-4); } }

    /* Image gallery */
    .product-gallery { position: sticky; top: 80px; }
    .product-main-img { width: 100%; aspect-ratio: 1; background: var(--gray-25); border-radius: var(--r-xl); overflow: hidden; border: 1.5px solid var(--color-border); display: flex; align-items: center; justify-content: center; margin-bottom: var(--sp-3); }
    .product-main-img img { width: 100%; height: 100%; object-fit: contain; padding: 24px; }
    .product-thumbs { display: flex; gap: var(--sp-2); overflow-x: auto; scrollbar-width: none; }
    .product-thumbs::-webkit-scrollbar { display: none; }
    .product-thumb { width: 72px; height: 72px; border-radius: var(--r-md); border: 1.5px solid var(--color-border); overflow: hidden; cursor: pointer; flex-shrink: 0; transition: border-color .2s; }
    .product-thumb:hover, .product-thumb.is-active { border-color: var(--color-primary); }
    .product-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 5px; }

    /* Product info */
    .product-brand { font-size: var(--text-sm); font-weight: var(--weight-bold); color: var(--color-primary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .product-name { font-family: var(--font-display); font-size: var(--text-4xl); font-weight: var(--weight-bold); color: var(--color-text); line-height: 1.2; margin-bottom: var(--sp-3); }
    @media(max-width:768px){ .product-name { font-size: var(--text-2xl); } }
    .product-price-row { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-4); flex-wrap: wrap; }
    .product-price { font-family: var(--font-display); font-size: var(--text-5xl); font-weight: 800; color: var(--color-text); }
    .product-mrp { font-size: var(--text-xl); text-decoration: line-through; color: var(--color-text-3); }
    .product-disc { background: var(--red-100); color: var(--red-600); font-size: var(--text-sm); font-weight: var(--weight-bold); padding: 3px 10px; border-radius: 99px; }
    .product-warranty { display: inline-flex; align-items: center; gap: 5px; background: var(--green-50); color: var(--green-700); border: 1px solid var(--green-100); border-radius: 99px; padding: 5px 12px; font-size: var(--text-xs); font-weight: var(--weight-semi); margin-bottom: var(--sp-4); }
    .product-warranty svg { width: 13px; height: 13px; }

    /* Qty */
    .add-to-cart-row { display: flex; gap: var(--sp-3); align-items: center; margin-bottom: var(--sp-4); flex-wrap: wrap; }
    .qty-control { display: flex; align-items: center; border: 1.5px solid var(--color-border-strong); border-radius: var(--r-md); overflow: hidden; }
    .qty-btn { width: 40px; height: 46px; background: var(--gray-50); border: none; cursor: pointer; font-size: 18px; font-weight: 700; color: var(--color-text); transition: background .15s; }
    .qty-btn:hover { background: var(--green-50); color: var(--color-primary); }
    .qty-num { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; font-size: var(--text-lg); font-weight: var(--weight-semi); border-left: 1px solid var(--color-border); border-right: 1px solid var(--color-border); }
    .btn-add-cart { flex: 1; min-width: 160px; height: 46px; }
    .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 8px; height: 46px; background: #25d366; color: #fff; border-radius: var(--r-md); font-size: var(--text-base); font-weight: var(--weight-semi); padding: 0 20px; transition: background .2s; text-decoration: none; white-space: nowrap; }
    .btn-whatsapp:hover { background: #1da855; }

    /* Tabs */
    .product-tabs { border-bottom: 1.5px solid var(--color-border); margin-bottom: var(--sp-4); display: flex; gap: 0; }
    .product-tab { padding: 10px 18px; font-size: var(--text-base); font-weight: var(--weight-semi); color: var(--color-text-3); border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s; margin-bottom: -1.5px; }
    .product-tab:hover { color: var(--color-text); }
    .product-tab.is-active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .product-tab-panel { display: none; }
    .product-tab-panel.is-active { display: block; }

    /* Specs */
    .spec-table { width: 100%; border-collapse: collapse; }
    .spec-table tr:nth-child(even) { background: var(--gray-25); }
    .spec-table td { padding: 10px 14px; font-size: var(--text-sm); border-bottom: 1px solid var(--color-border); }
    .spec-table td:first-child { font-weight: var(--weight-semi); color: var(--color-text-2); width: 40%; }

    /* Reviews */
    .review-item { padding: var(--sp-4) 0; border-bottom: 1px solid var(--color-border); }
    .review-item:last-child { border-bottom: none; }
    .review-stars { color: var(--gold-400); font-size: 16px; letter-spacing: -1px; }
    .review-author { font-size: var(--text-sm); font-weight: var(--weight-semi); color: var(--color-text); margin-top: 4px; }
    .review-date { font-size: var(--text-xs); color: var(--color-text-3); }
    .review-text { font-size: var(--text-sm); color: var(--color-text-2); margin-top: 6px; line-height: 1.6; }

    /* Related */
    .related-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: var(--sp-3); }
    @media(min-width:640px){ .related-grid { grid-template-columns: repeat(4,1fr); } }

    /* Skeleton */
    .skel { background: linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--r-sm); }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>

<script>
let product = null;
let qty = 1;
let currentImg = 0;

document.addEventListener('DOMContentLoaded', async () => {
  updateCartUI();
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { window.location.href = 'products.html'; return; }
  await loadProduct(id);
});

async function loadProduct(id) {
  const { data, error } = await db.from('products')
    .select('*, images:product_images(*), brand:brands(*), category:categories(*)')
    .eq('id', id).single();

  if (error || !data) { window.location.href = 'products.html'; return; }
  product = data;

  document.getElementById('pageTitle').textContent = `${product.name} — WellFix Appliances`;
  document.getElementById('breadcrumbName').textContent = product.name.length > 40 ? product.name.substring(0,40)+'…' : product.name;

  const primaryImg = product.images?.find(i => i.is_primary)?.url || product.images?.[0]?.url;
  const disc = product.mrp && product.price ? Math.round(((product.mrp - product.price) / product.mrp) * 100) : 0;

  const thumbsHtml = (product.images||[]).map((img, i) => `
    <div class="product-thumb ${i===0?'is-active':''}" onclick="switchImg('${img.url}',this)">
      <img src="${img.url}" alt="${product.name}" loading="lazy">
    </div>`).join('');

  document.getElementById('productContent').innerHTML = `
    <div class="product-layout">
      <!-- Gallery -->
      <div class="product-gallery">
        <div class="product-main-img">
          ${primaryImg
            ? `<img id="mainImg" src="${primaryImg}" alt="${product.name}">`
            : `<div style="font-size:80px;text-align:center;">📦</div>`}
        </div>
        ${product.images?.length > 1 ? `<div class="product-thumbs">${thumbsHtml}</div>` : ''}
      </div>

      <!-- Info -->
      <div>
        <div class="product-brand">${product.brand?.name || ''}</div>
        <h1 class="product-name">${product.name}</h1>

        <div class="product-price-row">
          <span class="product-price">₹${Number(product.price).toLocaleString('en-IN')}</span>
          ${product.mrp ? `<span class="product-mrp">₹${Number(product.mrp).toLocaleString('en-IN')}</span>` : ''}
          ${disc > 0 ? `<span class="product-disc">${disc}% off</span>` : ''}
        </div>

        ${product.warranty ? `
          <div class="product-warranty">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            ${product.warranty} Warranty
          </div>` : ''}

        ${product.short_description ? `<p style="color:var(--color-text-2);font-size:var(--text-base);line-height:1.6;margin-bottom:var(--sp-4);">${product.short_description}</p>` : ''}

        <!-- Stock -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:var(--sp-4);">
          <div style="width:8px;height:8px;border-radius:99px;background:${product.stock_qty > 0 ? 'var(--green-500)' : 'var(--red-500)'};"></div>
          <span style="font-size:var(--text-sm);font-weight:600;color:${product.stock_qty > 0 ? 'var(--green-700)' : 'var(--red-600)'};">
            ${product.stock_qty > 5 ? 'In Stock' : product.stock_qty > 0 ? `Only ${product.stock_qty} left` : 'Out of Stock'}
          </span>
        </div>

        <!-- Qty + Add to cart -->
        <div class="add-to-cart-row">
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <div class="qty-num" id="qtyNum">1</div>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <button class="btn btn-primary btn-add-cart" onclick="addToCart()" ${product.stock_qty <= 0 ? 'disabled' : ''}>
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ${product.stock_qty <= 0 ? 'Out of Stock' : 'Add to Cart'}
          </button>
        </div>

        <a href="https://wa.me/918590004349?text=Hi! I'm interested in ${encodeURIComponent(product.name)} - Price ₹${product.price}" target="_blank" class="btn-whatsapp" style="margin-bottom:var(--sp-5);">
          <svg fill="currentColor" viewBox="0 0 24 24" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.978-1.413A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
          Enquire on WhatsApp
        </a>

        <!-- Tabs -->
        <div class="product-tabs">
          <div class="product-tab is-active" onclick="switchTab('description',this)">Description</div>
          <div class="product-tab" onclick="switchTab('specs',this)">Specifications</div>
          <div class="product-tab" onclick="switchTab('reviews',this)">Reviews</div>
        </div>

        <div id="tab-description" class="product-tab-panel is-active">
          <div style="font-size:var(--text-base);line-height:1.8;color:var(--color-text-2);">
            ${product.description || product.short_description || 'No description available.'}
          </div>
        </div>

        <div id="tab-specs" class="product-tab-panel">
          ${product.specifications && Object.keys(product.specifications).length
            ? `<table class="spec-table">
                ${Object.entries(product.specifications).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
                ${product.warranty ? `<tr><td>Warranty</td><td>${product.warranty}</td></tr>` : ''}
                ${product.brand?.name ? `<tr><td>Brand</td><td>${product.brand.name}</td></tr>` : ''}
                ${product.category?.name ? `<tr><td>Category</td><td>${product.category.name}</td></tr>` : ''}
               </table>`
            : `<table class="spec-table">
                ${product.brand?.name ? `<tr><td>Brand</td><td>${product.brand.name}</td></tr>` : ''}
                ${product.category?.name ? `<tr><td>Category</td><td>${product.category.name}</td></tr>` : ''}
                ${product.warranty ? `<tr><td>Warranty</td><td>${product.warranty}</td></tr>` : ''}
                ${product.sku ? `<tr><td>SKU</td><td>${product.sku}</td></tr>` : ''}
               </table>`}
        </div>

        <div id="tab-reviews" class="product-tab-panel">
          <div id="reviewsList">Loading reviews…</div>
          <div style="margin-top:var(--sp-4);padding-top:var(--sp-4);border-top:1px solid var(--color-border);">
            <div style="font-size:var(--text-base);font-weight:600;margin-bottom:var(--sp-3);">Write a Review</div>
            <div style="display:flex;gap:var(--sp-3);flex-wrap:wrap;">
              <input style="flex:1;min-width:160px;height:38px;border:1.5px solid var(--color-border);border-radius:var(--r-sm);padding:0 12px;font-size:var(--text-sm);outline:none;" id="reviewName" placeholder="Your name">
              <select style="height:38px;border:1.5px solid var(--color-border);border-radius:var(--r-sm);padding:0 10px;font-size:var(--text-sm);outline:none;" id="reviewRating">
                <option value="5">★★★★★ 5 Stars</option>
                <option value="4">★★★★☆ 4 Stars</option>
                <option value="3">★★★☆☆ 3 Stars</option>
                <option value="2">★★☆☆☆ 2 Stars</option>
                <option value="1">★☆☆☆☆ 1 Star</option>
              </select>
            </div>
            <textarea style="width:100%;margin-top:var(--sp-2);border:1.5px solid var(--color-border);border-radius:var(--r-sm);padding:10px 12px;font-size:var(--text-sm);outline:none;resize:vertical;min-height:80px;" id="reviewText" placeholder="Share your experience…"></textarea>
            <button class="btn btn-primary btn-sm" style="margin-top:var(--sp-2);" onclick="submitReview()">Submit Review</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Related Products -->
    <div style="margin-top:var(--sp-8);">
      <div class="sec-hd"><div class="sec-hd__title">Related <span>Products</span></div></div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>`;

  // Load reviews
  loadReviews(product.id);
  // Load related
  loadRelated(product.category?.id, product.id);
}

function switchImg(url, thumb) {
  document.getElementById('mainImg').src = url;
  document.querySelectorAll('.product-thumb').forEach(t => t.classList.remove('is-active'));
  thumb.classList.add('is-active');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.product-tab').forEach(t => t.classList.remove('is-active'));
  document.querySelectorAll('.product-tab-panel').forEach(p => p.classList.remove('is-active'));
  document.getElementById('tab-' + tab).classList.add('is-active');
  btn.classList.add('is-active');
}

function changeQty(delta) {
  qty = Math.max(1, qty + delta);
  document.getElementById('qtyNum').textContent = qty;
}

function addToCart() {
  if (!product) return;
  const img = product.images?.find(i => i.is_primary)?.url || product.images?.[0]?.url;
  const cart = JSON.parse(localStorage.getItem('wf_cart') || '[]');
  const existing = cart.find(i => i.id === product.id);
  if (existing) existing.qty = (existing.qty || 1) + qty;
  else cart.push({ id: product.id, name: product.name, price: product.price, img: img || '', qty });
  localStorage.setItem('wf_cart', JSON.stringify(cart));
  updateCartUI();
  // Show toast
  let t = document.getElementById('wf-cart-toast');
  if (!t) { t = document.createElement('div'); t.id = 'wf-cart-toast'; t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;transition:opacity .3s;'; document.body.appendChild(t); }
  t.textContent = `✓ ${qty} item${qty>1?'s':''} added to cart`;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', 2500);
}

async function loadReviews(productId) {
  const { data } = await db.from('reviews').select('*').eq('product_id', productId).eq('is_approved', true).order('created_at', {ascending: false}).limit(10);
  const el = document.getElementById('reviewsList');
  if (!data?.length) { el.innerHTML = '<p style="color:var(--color-text-3);font-size:var(--text-sm);">No reviews yet. Be the first to review!</p>'; return; }
  el.innerHTML = data.map(r => `
    <div class="review-item">
      <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
        <div class="review-author">${r.customer_name}</div>
        <div class="review-date">${new Date(r.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
      </div>
      ${r.title ? `<div style="font-weight:600;font-size:var(--text-sm);margin-top:4px;">${r.title}</div>` : ''}
      <div class="review-text">${r.body || ''}</div>
    </div>`).join('');
}

async function loadRelated(categoryId, currentId) {
  if (!categoryId) return;
  const { data } = await db.from('products')
    .select('*, images:product_images(url,is_primary), brand:brands(name)')
    .eq('category_id', categoryId).eq('is_active', true)
    .neq('id', currentId).limit(4);
  const grid = document.getElementById('relatedGrid');
  if (!data?.length) { grid.parentElement.style.display = 'none'; return; }
  grid.innerHTML = data.map(p => {
    const img = p.images?.find(i => i.is_primary)?.url || p.images?.[0]?.url;
    const disc = p.mrp ? Math.round(((p.mrp-p.price)/p.mrp)*100) : 0;
    return `
      <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
        <div class="product-card__img-wrap">
          ${img ? `<img class="product-card__img" src="${img}" alt="${p.name}" loading="lazy">` : `<div class="product-card__img" style="display:flex;align-items:center;justify-content:center;font-size:36px;position:absolute;inset:0;">📦</div>`}
          ${p.badge ? `<div class="product-card__badges"><span class="badge badge--${p.badge}">${p.badge.toUpperCase()}</span></div>` : ''}
        </div>
        <div class="product-card__body">
          <div class="product-card__brand">${p.brand?.name||''}</div>
          <div class="product-card__name">${p.name}</div>
          <div class="product-card__price-row">
            <span class="product-card__price">₹${Number(p.price).toLocaleString('en-IN')}</span>
            ${p.mrp ? `<span class="product-card__mrp">₹${Number(p.mrp).toLocaleString('en-IN')}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function submitReview() {
  const name = document.getElementById('reviewName').value.trim();
  const text = document.getElementById('reviewText').value.trim();
  const rating = parseInt(document.getElementById('reviewRating').value);
  if (!name || !text) { alert('Please enter your name and review'); return; }
  await WF.reviews.submit({ product_id: product.id, customer_name: name, body: text, rating, is_approved: false });
  document.getElementById('reviewName').value = '';
  document.getElementById('reviewText').value = '';
  alert('Thank you! Your review has been submitted for approval.');
}
</script>
